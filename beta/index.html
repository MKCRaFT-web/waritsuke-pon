<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>割付ポンッ！ - v3.6.3.9 beta</title>

  <script src="https://unpkg.com/konva@9/konva.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

  <script src="../analytics.js"></script>
  <style>
    :root{
      --bg:#0f1115;
      --glass:rgba(24,28,36,0.66);
      --line:rgba(255,255,255,0.08);
      --text:#ffffff;
      --muted:rgba(255,255,255,0.68);
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
      --shadow:0 10px 28px rgba(0,0,0,0.22);
    }

    * {
      -webkit-tap-highlight-color: transparent;
      outline: none;
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Hiragino Sans", "Noto Sans JP", sans-serif;
      touch-action: none;
      overscroll-behavior: none;
      color: var(--text);
    }

    body {
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
      background:
        radial-gradient(circle at top right, rgba(10,132,255,0.14), transparent 26%),
        radial-gradient(circle at top left, rgba(139,92,246,0.10), transparent 20%),
        linear-gradient(180deg, #151922 0%, #0d1015 100%);
    }

    #container {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }

    .glass{
      background: var(--glass);
      backdrop-filter: blur(18px) saturate(1.15);
      -webkit-backdrop-filter: blur(18px) saturate(1.15);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .glassMini{
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(12px) saturate(1.1);
      -webkit-backdrop-filter: blur(12px) saturate(1.1);
    }

    #topBar{
      position: fixed;
      top: calc(6px + var(--safe-top));
      left: 10px;
      right: 10px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 6px;
      pointer-events: none;
    }

    #topMain{
      pointer-events: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      border-radius: 16px;
      padding: 6px 8px;
      min-height: 44px;
    }

    #brand{
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
      padding: 0 2px;
    }

    #stepTabs{
      flex: 1;
      display: flex;
      gap: 5px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    #stepTabs::-webkit-scrollbar{ display:none; }

    .stepTab{
      border: 0;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.78);
      padding: 7px 10px;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }

    .stepTab.active{
      background: #fff;
      color: #111827;
    }

    #menuBtn{
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 11px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 16px;
      font-weight: 900;
      flex: 0 0 auto;
    }

    #topSub{
      pointer-events: auto;
      display: flex;
      gap: 5px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    #topSub::-webkit-scrollbar{ display:none; }

    #estimateToggleBtn{
      flex: 0 0 auto;
    }

    #estimatePanel{
      pointer-events: auto;
      display: none;
      padding: 8px;
      border-radius: 16px;
    }

    .estimateGrid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .estimateItem{
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 8px 9px;
      min-height: 52px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .estimateLabel{
      font-size: 9px;
      color: rgba(255,255,255,0.68);
      font-weight: 700;
      line-height: 1.1;
    }

    .estimateValue{
      font-size: 13px;
      color: #fff;
      font-weight: 800;
      line-height: 1.15;
      word-break: break-word;
    }

    .miniChip{
      border-radius: 999px;
      padding: 5px 9px;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.78);
      font-size: 10px;
      white-space: nowrap;
    }

    #modePinned{
      position: fixed;
      top: calc(56px + var(--safe-top));
      right: 12px;
      z-index: 119;
      border-radius: 999px;
      padding: 6px 11px;
      font-size: 10px;
      font-weight: 800;
      color: #fff;
      pointer-events: none;
      background: rgba(0,0,0,0.34);
    }

    #menuSheet{
      position: fixed;
      top: calc(54px + var(--safe-top));
      right: 10px;
      z-index: 120;
      width: 200px;
      display: none;
      flex-direction: column;
      gap: 6px;
      padding: 8px;
      border-radius: 16px;
    }

    .menuItem{
      border: 0;
      border-radius: 12px;
      min-height: 38px;
      text-align: left;
      padding: 9px 11px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
    }

    #leftDock{
      position: fixed;
      left: 18px;
      bottom: calc(116px + var(--safe-bottom));
      z-index: 112;
      display: flex;
      flex-direction: column;
      gap: 6px;
      pointer-events: none;
      max-width: calc(100vw - 36px);
    }

    #leftDock.base-mini-mode{
      bottom: calc(116px + var(--safe-bottom));
    }

    #zoomHud{
      pointer-events: auto;
      display: none;
      gap: 6px;
      flex-wrap: nowrap;
      align-items: center;
      padding: 4px 6px;
      border-radius: 14px;
      touch-action: none;
      width: fit-content;
      max-width: calc(100vw - 36px);
      background: rgba(20,24,32,0.38);
      border: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(10px) saturate(1.05);
      -webkit-backdrop-filter: blur(10px) saturate(1.05);
      box-shadow: 0 8px 18px rgba(0,0,0,0.16);
    }

    #zoomHud button{
      border: 0;
      border-radius: 11px;
      min-width: 34px;
      height: 34px;
      background: rgba(255,255,255,0.09);
      color: #fff;
      font-size: 14px;
      font-weight: 900;
      padding: 0 9px;
    }

    #zoomHud #pointDoneBtn,
    #zoomHud #pointPrevBtn,
    #zoomHud #pointNextBtn,
    #zoomHud #gridReEditBtn{
      width: auto;
      font-size: 10px;
      min-width: auto;
      padding: 0 10px;
    }

    #zoomHud.base-mini{
      padding: 4px 6px;
      gap: 6px;
      border-radius: 14px;
    }

    #zoomHud.base-mini button{
      min-width: 34px;
      height: 34px;
      font-size: 14px;
      padding: 0 9px;
    }

    #zoomHud.base-mini #pointDoneBtn{
      font-size: 10px;
      padding: 0 10px;
    }

    #dpad{
      position: fixed;
      right: 18px;
      left: auto;
      bottom: calc(124px + var(--safe-bottom));
      z-index: 113;
      pointer-events: auto;
      display: none;
      padding: 0;
      border-radius: 0;
      touch-action: none;
      width: fit-content;
      max-width: calc(100vw - 36px);
      background: transparent;
      border: 0;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      box-shadow: none;
    }

    #dpad .pad{
      width: 108px;
      height: 108px;
      display: grid;
      grid-template-columns: 32px 32px 32px;
      grid-template-rows: 32px 32px 32px;
      gap: 6px;
      justify-content: center;
      align-content: center;
    }

    #dpad button{
      border: 1px solid rgba(20,20,20,0.68);
      border-radius: 11px;
      background: linear-gradient(180deg, rgba(232,236,242,0.92), rgba(162,171,183,0.92));
      color: #1f2937;
      font-size: 13px;
      font-weight: 900;
      min-width: 32px;
      min-height: 32px;
      box-shadow:
        0 5px 12px rgba(0,0,0,0.22),
        inset 0 1px 0 rgba(255,255,255,0.65);
      text-shadow: 0 1px 0 rgba(255,255,255,0.4);
    }

    #dpad .center{
      font-size: 10px;
      background: linear-gradient(180deg, rgba(62,70,82,0.96), rgba(34,40,49,0.96));
      color: #fff;
      border-color: rgba(255,255,255,0.14);
      text-shadow: none;
      box-shadow:
        0 5px 12px rgba(0,0,0,0.24),
        inset 0 1px 0 rgba(255,255,255,0.10);
    }

    #bottomBar{
      position: fixed;
      left: 10px;
      right: 10px;
      bottom: calc(8px + var(--safe-bottom));
      z-index: 90;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 5px 6px;
      border-radius: 16px;
      pointer-events: auto;
      max-height: 16vh;
      overflow-y: auto;
      overscroll-behavior: contain;
    }

    .panelSection{
      border-radius: 12px;
      padding: 5px 6px;
    }

    .panelResult{
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 2px;
    }

    .panelEdit{
      background: rgba(255,255,255,0.06);
      border-top: 1px solid rgba(255,255,255,0.16);
      padding-top: 7px;
    }

    #baseSummaryBar{
      display:none;
      border-radius: 12px;
      padding: 0;
      overflow: hidden;
      flex: 0 0 auto;
    }

    #baseSummaryToggle{
      width: 100%;
      border: 0;
      background: transparent;
      color: #fff;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 10px;
      font-weight: 800;
    }

    #baseSummaryText{
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: left;
    }

    #baseSummaryArrow{
      flex: 0 0 auto;
      opacity: 0.82;
    }

    #bottomInfo{
      display: none;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 5px;
      flex: 0 0 auto;
    }

    .infoMini{
      background: rgba(255,255,255,0.06);
      border-radius: 11px;
      padding: 6px 8px;
      min-height: 46px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .infoMiniLabel{
      font-size: 8px;
      color: var(--muted);
      font-weight: 700;
    }

    .infoMiniValue{
      font-size: 12px;
      font-weight: 800;
      color: #fff;
      line-height: 1.1;
    }

    .infoMiniSub{
      font-size: 8px;
      color: rgba(255,255,255,0.72);
      font-weight: 700;
      line-height: 1.15;
      margin-top: 2px;
    }

    #bottomActions{
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 0 0 auto;
    }

    #currentSectionLabel{
      font-size: 9px;
      color: var(--muted);
      font-weight: 700;
      padding-left: 2px;
    }

    .sectionCompact{
      display: none;
      flex-direction: column;
      gap: 4px;
    }

    .btn{
      border: 0;
      border-radius: 10px;
      min-height: 28px;
      padding: 5px 9px;
      font-size: 10px;
      font-weight: 800;
      width: 100%;
      color: #fff;
      background: rgba(255,255,255,0.1);
    }

    .btn:active{ transform: scale(0.985); }

    .btn-purple { background: linear-gradient(180deg, #8b5cf6, #7c3aed); }
    .btn-green { background: linear-gradient(180deg, #22c55e, #16a34a); }
    .btn-orange { background: linear-gradient(180deg, #f59e0b, #ea580c); }
    .btn-red { background: linear-gradient(180deg, #ef4444, #dc2626); }
    .btn-dark, .btn-black, .btn-gray { background: rgba(255,255,255,0.12); }

    .actionGrid2{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:5px;
    }

    .row{
      display:flex;
      gap:5px;
      align-items:center;
    }

    input {
      width: 100%;
      padding: 5px 8px;
      border-radius: 9px;
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 13px;
      min-height: 30px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      -webkit-user-select: text;
      user-select: text;
      -webkit-touch-callout: default;
    }

    label {
      font-size: 9px;
      font-weight: bold;
      display:block;
      margin-top:0;
      color: var(--muted);
    }

    #legacyBindArea{
      position: fixed;
      width: 0;
      height: 0;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
    }

    @media (max-width: 430px){
      #bottomBar{ max-height: 17vh; }
      #zoomHud, #dpad{ max-width: calc(100vw - 36px); }
      .infoMiniValue{ font-size: 11px; }
      #modePinned{ top: calc(56px + var(--safe-top)); right: 10px; }
    }
  </style>
</head>
<body>

  <div id="container"></div>

  <div id="topBar">
    <div id="topMain" class="glass">
      <div id="brand">割付ポン v3.6.3.9 beta</div>

      <div id="stepTabs">
        <button class="stepTab active" data-step="align">水平</button>
        <button class="stepTab" data-step="measure">縮尺</button>
        <button class="stepTab" data-step="poly">範囲</button>
        <button class="stepTab" data-step="grid">グリッド</button>
      </div>

      <button id="estimateToggleBtn" class="stepTab" type="button">積算</button>
      <button id="menuBtn" type="button">⋯</button>
    </div>

    <div id="topSub">
      <div class="miniChip" id="chipFile">図面: 読込前</div>
      <div class="miniChip" id="chipScale">縮尺: 未確定</div>
      <div class="miniChip" id="chipPoly">範囲: 未完了</div>
    </div>

    <div id="estimatePanel" class="glass">
      <div class="estimateGrid">
        <div class="estimateItem">
          <div class="estimateLabel">㎡数</div>
          <div class="estimateValue" id="chipArea">-</div>
        </div>
        <div class="estimateItem">
          <div class="estimateLabel">理論枚数</div>
          <div class="estimateValue" id="chipTiles">-</div>
        </div>
        <div class="estimateItem">
          <div class="estimateLabel">計算ロス率</div>
          <div class="estimateValue" id="chipLoss">-</div>
        </div>
        <div class="estimateItem">
          <div class="estimateLabel">端材候補</div>
          <div class="estimateValue" id="chipReuseCand">-</div>
        </div>
        <div class="estimateItem">
          <div class="estimateLabel">2枚取り</div>
          <div class="estimateValue" id="chipReusePair">-</div>
        </div>
        <div class="estimateItem">
          <div class="estimateLabel">実枚数</div>
          <div class="estimateValue" id="chipReuseTiles">-</div>
        </div>
      </div>
    </div>
  </div>

  <div id="modePinned" class="glassMini" aria-live="polite">モード: 待機</div>

  <div id="menuSheet" class="glass">
    <button class="menuItem" id="openFileBtn">図面を読み込む</button>
    <button class="menuItem" id="dangerToggleProxyBtn">危険小片 ON/OFF</button>
    <button class="menuItem" id="saveImageBtn">保存</button>
  </div>

  <div id="leftDock">
    <div id="zoomHud" class="glass">
      <button id="zoomInBtn">＋</button>
      <button id="zoomOutBtn">－</button>
      <button id="zoomResetBtn">⌂</button>
      <button id="pointPrevBtn">◀前点</button>
      <button id="pointNextBtn">次点▶</button>
      <button id="pointDoneBtn">点完了</button>
      <button id="gridReEditBtn">グリッド再調整</button>
    </div>
  </div>

  <div id="dpad" aria-label="微調整">
    <div class="pad">
      <div></div><button id="dUp">▲</button><div></div>
      <button id="dLeft">◀</button><button id="dCenter" class="center">1mm</button><button id="dRight">▶</button>
      <div></div><button id="dDown">▼</button><div></div>
    </div>
  </div>

  <div id="bottomBar" class="glass">
    <div id="baseSummaryBar" class="glassMini">
      <button id="baseSummaryToggle" type="button">
        <span id="baseSummaryText">基準点寸法: -</span>
        <span id="baseSummaryArrow">▼</span>
      </button>
    </div>

    <div id="resultPanel" class="panelSection panelResult">
    <div id="bottomInfo">
      <div class="infoMini">
        <div class="infoMiniLabel">X左</div>
        <div class="infoMiniValue" id="baseXLmmOut">-</div>
        <div class="infoMiniSub" id="baseXLtileOut">-</div>
      </div>
      <div class="infoMini">
        <div class="infoMiniLabel">X右</div>
        <div class="infoMiniValue" id="baseXRmmOut">-</div>
        <div class="infoMiniSub" id="baseXRtileOut">-</div>
      </div>
      <div class="infoMini">
        <div class="infoMiniLabel">Y上</div>
        <div class="infoMiniValue" id="baseYUmmOut">-</div>
        <div class="infoMiniSub" id="baseYUtileOut">-</div>
      </div>
      <div class="infoMini">
        <div class="infoMiniLabel">Y下</div>
        <div class="infoMiniValue" id="baseYDmmOut">-</div>
        <div class="infoMiniSub" id="baseYDtileOut">-</div>
      </div>
    </div>
    </div>

    <div id="editPanel" class="panelSection panelEdit">
    <div id="bottomActions">
      <div id="currentSectionLabel">水平合わせ</div>

      <div id="sectionAlign" class="sectionCompact" style="display:flex;">
        <button class="btn btn-purple" id="alignBtn">1. 水平合わせ</button>
        <button class="btn btn-green" id="applyAlignBtn">確定</button>
      </div>

      <div id="sectionMeasure" class="sectionCompact">
        <button class="btn btn-dark" id="measureBtn">2. 縮尺合わせ</button>
        <label>実寸(mm)</label>
        <input type="number" id="realDistInput" value="1000" />
        <button class="btn btn-green" id="applyScaleBtn">確定</button>
      </div>

      <div id="sectionPoly" class="sectionCompact">
        <button class="btn btn-orange" id="polyBtn">3. 施工範囲指定</button>
        <div class="actionGrid2">
          <button class="btn btn-red" id="undoBtn">1手戻し</button>
          <button class="btn btn-green" id="closePolyBtn">完了</button>
        </div>
        <button class="btn btn-gray" id="polyEditBtn">✏️ 範囲調整</button>
        <button class="btn btn-green" id="polyEditDoneBtn" style="display:none;">✅ 調整完了</button>
      </div>

      <div id="sectionGrid" class="sectionCompact">
        <label>タイル(mm)</label>
        <div class="row">
          <input type="number" id="tileWidthInput" value="300" />
          <input type="number" id="tileHeightInput" value="300" />
        </div>
        <label>危険小片しきい値(mm)</label>
        <div class="row">
          <input type="number" id="dangerMmVisibleInput" value="100" />
          <button class="btn btn-dark" id="dangerToggleInlineBtn" style="width:auto; white-space:nowrap; padding: 0 12px;">危険小片 ON</button>
        </div>
        <button class="btn btn-green" id="showGridBtn">4. グリッド生成</button>
        <button class="btn btn-dark" id="confirmGridBtn">5. グリッド確定</button>
        <button class="btn btn-purple" id="optBtn">🎯 最適割付</button>
        <button class="btn btn-dark" id="basePointBtn">6. 基準点</button>
      </div>
    </div>
    </div>
  </div>

  <div id="legacyBindArea">
    <input type="file" id="fileInput" accept="image/*,.pdf" />
    <div id="alignInputArea" style="display:none;"></div>
    <div id="measureInputArea" style="display:none;"></div>
    <div id="polyControls" style="display:none;"></div>
    <button id="lockBtn">図面ロック：OFF</button>
    <button id="dangerToggleBtn">危険小片：ON</button>
    <input type="number" id="dangerMmInput" value="100" />
  </div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js";

// GA4イベント送信用の共通ヘルパー
const trackAppEvent = (eventName, params = {}) => {
  window.WaritsukeAnalytics?.trackEvent(eventName, params);
};

const appVariant = window.location.pathname.includes("/beta/") ? "beta" : "stable";
let hasSentAppOpen = false;
const layoutTrackingState = {
  started: false,
  finished: false,
  sessionId: null
};
let layoutSessionSeq = 0;

const resetLayoutTracking = () => {
  layoutTrackingState.started = false;
  layoutTrackingState.finished = false;
  layoutTrackingState.sessionId = null;
};

const startLayoutTracking = () => {
  if (layoutTrackingState.started && !layoutTrackingState.finished) return;
  layoutTrackingState.started = true;
  layoutTrackingState.finished = false;
  layoutTrackingState.sessionId = `${Date.now()}-${++layoutSessionSeq}`;
  trackAppEvent("layout_started", {
    app_variant: appVariant,
    layout_session_id: layoutTrackingState.sessionId
  });
};

const finishLayoutTracking = () => {
  if (!layoutTrackingState.started || layoutTrackingState.finished) return;
  layoutTrackingState.finished = true;
  trackAppEvent("layout_finished", {
    app_variant: appVariant,

function roundToUnit(v, unit = POSITION_ROUND_UNIT) {
  return Math.round(v / unit) * unit;
}

function getStageSpaceThreshold(px) {
  return px / (stageScale || 1);
}

function distance2(a, b) {
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  return dx * dx + dy * dy;
}

function stagePxToMmX(px) {
  if (!mmPerLocalPx) return 0;
  const sx = photoGroup.scaleX() || 1;
  return (px / sx) * mmPerLocalPx;
}

function stagePxToMmY(px) {
  if (!mmPerLocalPx) return 0;
  const sy = photoGroup.scaleY() || 1;
  return (px / sy) * mmPerLocalPx;
}

function mmToStagePxX(mm){
  if (!mmPerLocalPx) return 0;
  const sx = photoGroup.scaleX() || 1;
  return (mm / mmPerLocalPx) * sx;
}

function mmToStagePxY(mm){
  if (!mmPerLocalPx) return 0;
  const sy = photoGroup.scaleY() || 1;
  return (mm / mmPerLocalPx) * sy;
}

function stageToPhotoLocal(stagePoint) {
  const inv = photoGroup.getTransform().copy().invert();
  return inv.point(stagePoint);
}

function photoLocalToStage(localPoint) {
  return photoGroup.getTransform().point(localPoint);
}

function getPointerPos(e){
  stage.setPointersPositions(e.evt);
  const p = stage.getPointerPosition();
  if (!p) return null;
  const sx = stage.scaleX() || 1;
  const sy = stage.scaleY() || 1;
  return { x: (p.x - stage.x()) / sx, y: (p.y - stage.y()) / sy };
}

function makePointKey(type, index) {
  return `${type}:${index}`;
}

function parsePointKey(key) {
  if (!key) return null;
  const parts = String(key).split(":");
  if (parts.length !== 2) return null;
  return { type: parts[0], index: Number(parts[1]) };
}

function getPointArrayByType(type) {
  if (type === "align") return model.alignPoints;
  if (type === "scale") return model.scalePoints;
  if (type === "poly") return model.polyPoints;
  return null;
}

function getModelPointByKey(key) {
  const info = parsePointKey(key);
  if (!info) return null;
  if (info.type === "base") return model.basePoint;
  const arr = getPointArrayByType(info.type);
  if (!arr) return null;
  return arr[info.index] || null;
}

function setModelPointByKey(key, point) {
  const info = parsePointKey(key);
  if (!info) return;
  if (info.type === "base") {
    model.basePoint = { x: point.x, y: point.y };
    return;
  }
  const arr = getPointArrayByType(info.type);
  if (!arr || !arr[info.index]) return;
  arr[info.index].x = point.x;
  arr[info.index].y = point.y;
}

function getPolyStagePointsFlat() {
  const pts = [];
  model.polyPoints.forEach((p) => {
    const s = photoLocalToStage(p);
    pts.push(s.x, s.y);
  });
  return pts;
}

function getBaseStagePoint() {
  if (!model.basePoint) return null;
  return photoLocalToStage(model.basePoint);
}


function getDynamicHitRadius() {
  return mode === "polyAdjust" ? HIT_RADIUS_POLY_ADJUST : HIT_RADIUS;
}

function polygonAreaLocalPx2(points) {
  if (!points || points.length < 3) return 0;
  let sum = 0;
  for (let i = 0; i < points.length; i++) {
    const a = points[i];
    const b = points[(i + 1) % points.length];
    sum += a.x * b.y - b.x * a.y;
  }
  return Math.abs(sum) / 2;
}

function getCurrentSafeBEstimate() {
  if (!gridGroup.visible() || !mmPerLocalPx) return null;

  const poly = getPolyStagePointsFlat();
  if (!poly || poly.length < 6) return null;

  const twMm = parseFloat(document.getElementById("tileWidthInput").value);
  const thMm = parseFloat(document.getElementById("tileHeightInput").value);
  if (!isFinite(twMm) || !isFinite(thMm) || twMm <= 0 || thMm <= 0) return null;

  const tileLocalW = twMm / mmPerLocalPx;
  const tileLocalH = thMm / mmPerLocalPx;
  const tileStageW = tileLocalW * (photoGroup.scaleX() || 1);
  const tileStageH = tileLocalH * (photoGroup.scaleY() || 1);
  if (!isFinite(tileStageW) || !isFinite(tileStageH) || tileStageW <= 0 || tileStageH <= 0) return null;

  const dangerMm = Math.max(0, parseFloat(document.getElementById("dangerMmInput").value || "0"));
  return calcSafeBEstimateFromGrid(poly, gridGroup.x(), gridGroup.y(), tileStageW, tileStageH, twMm, thMm, dangerMm);
}

function updateEstimateFromCurrentState(fullCount = null, partialCount = null, reuseCandidateCount = null, reusePairCount = null, reuseAdjustedTileCount = null) {
  const twMm = parseFloat(document.getElementById("tileWidthInput").value);
  const thMm = parseFloat(document.getElementById("tileHeightInput").value);

  // グリッド表示中は、毎回いまのグリッド位置から再計算する。
  // これで最適化後・ドラッグ後・確定後の再描画でも積算値が古いまま残らない。
  if (gridGroup.visible()) {
    const safeB = getCurrentSafeBEstimate();
    if (safeB) {
      fullCount = safeB.fullCount;
      partialCount = safeB.partialCount;
      reuseCandidateCount = safeB.reuseCandidateCount;
      reusePairCount = safeB.reusePairCount;
      reuseAdjustedTileCount = safeB.reuseAdjustedTileCount;
    }
  }

  if (!mmPerLocalPx || model.polyPoints.length < 3 || !isFinite(twMm) || !isFinite(thMm) || twMm <= 0 || thMm <= 0) {
    estimateState.areaM2 = null;
    estimateState.tileCount = null;
    estimateState.lossRate = null;
    estimateState.reuseCandidateCount = null;
    estimateState.reusePairCount = null;
    estimateState.reuseAdjustedTileCount = null;
    updateUiChips();
  syncDangerUi();
    return;
  }

  const areaLocalPx2 = polygonAreaLocalPx2(model.polyPoints);
  const areaMm2 = areaLocalPx2 * mmPerLocalPx * mmPerLocalPx;
  const areaM2 = areaMm2 / 1000000;
  const tileAreaM2 = (twMm * thMm) / 1000000;
  const theoryTiles = tileAreaM2 > 0 ? areaM2 / tileAreaM2 : null;

  let tileCount = theoryTiles;
  let lossRate = 0;

  if (fullCount != null && partialCount != null && isFinite(fullCount) && isFinite(partialCount)) {
    tileCount = fullCount + partialCount;
    lossRate = (theoryTiles && theoryTiles > 0) ? Math.max(0, ((tileCount - theoryTiles) / theoryTiles) * 100) : 0;
  }

  estimateState.areaM2 = areaM2;
  estimateState.tileCount = tileCount;
  estimateState.lossRate = lossRate;
  estimateState.reuseCandidateCount = reuseCandidateCount;
  estimateState.reusePairCount = reusePairCount;
  estimateState.reuseAdjustedTileCount = reuseAdjustedTileCount;
  updateUiChips();
}

function pickNearestPolyDot(stagePos) {
  const dots = uiLayer.find(".polyDot");
  if (!dots.length) return null;

  let best = null;
  let bestD2 = Infinity;
  dots.forEach((dot) => {
    const dx = dot.x() - stagePos.x;
    const dy = dot.y() - stagePos.y;
    const d2 = dx * dx + dy * dy;
    if (d2 < bestD2) {
      bestD2 = d2;
      best = dot;
    }
  });

  const threshold = getStageSpaceThreshold(PICK_NEAR_THRESHOLD_PX);
  if (best && bestD2 <= threshold * threshold) return best;
  return null;
}

function updateZoom(pos) {
  if (!bgImage.image()) return;

  zoomLayer.visible(true);

  let zX = pos.x;
  let zY = pos.y - 140;
  if (zX < 90) zX = 90;
  if (zX > stage.width() - 90) zX = stage.width() - 90;
  if (zY < 90) zY = pos.y + 140;

  zoomGroup.position({ x: zX, y: zY });

  const mag = 4.5;

  zoomContent.image(bgImage.image());
  zoomContent.width(bgImage.image().width);
  zoomContent.height(bgImage.image().height);

  zoomContent.offset({
    x: photoGroup.offsetX(),
    y: photoGroup.offsetY()
  });

  zoomContent.position({
    x: (photoGroup.x() - pos.x) * mag,
    y: (photoGroup.y() - pos.y) * mag
  });

  zoomContent.scale({
    x: photoGroup.scaleX() * mag,
    y: photoGroup.scaleY() * mag
  });

  zoomContent.rotation(photoGroup.rotation());

  zoomContent.clipFunc((ctx) => {
    ctx.arc(0, 0, 85, 0, Math.PI * 2);
  });

  zoomLayer.batchDraw();
}

function compensateUiScale() {
  const inv = 1 / (stageScale || 1);
  const allDots = [
    ...uiLayer.find(".alignDot"),
    ...uiLayer.find(".scaleDot"),
    ...uiLayer.find(".polyDot"),
    ...uiLayer.find(".baseDot")
  ];

  allDots.forEach((g) => {
    const hitCircle = g.findOne(".hitCircle");
    const crossH = g.findOne(".crossH");
    const crossV = g.findOne(".crossV");
    const dotCore = g.findOne(".dotCore");
    const pointLabel = g.findOne(".pointLabel");
    const isActive = activePointKey && g.getAttr("pointKey") === activePointKey;
    const activeColor = "#22d3ee";
    const baseColor = g.getAttr("baseColor") || "#ffffff";

    if (hitCircle) hitCircle.radius(getDynamicHitRadius() * inv);
    if (crossH) {
      crossH.points([-CROSS_HALF * inv, 0, CROSS_HALF * inv, 0]);
      crossH.stroke(isActive ? activeColor : baseColor);
      crossH.strokeWidth(Math.max(1, STROKE_THIN * inv));
    }
    if (crossV) {
      crossV.points([0, -CROSS_HALF * inv, 0, CROSS_HALF * inv]);
      crossV.stroke(isActive ? activeColor : baseColor);
      crossV.strokeWidth(Math.max(1, STROKE_THIN * inv));
    }
    if (dotCore) {
      dotCore.radius(Math.max(2.2, DOT_RADIUS * inv * (isActive ? 1.35 : 1)));
      dotCore.fill(isActive ? activeColor : baseColor);
      dotCore.strokeWidth(Math.max(0.8, 1 * inv));
    }
    if (pointLabel) {
      pointLabel.fontSize(Math.max(9, 11 * inv));
      pointLabel.fill(isActive ? "#67e8f9" : "rgba(255,255,255,0.96)");
    }
  });

  polyShape.strokeWidth(Math.max(1, STROKE_THIN * inv));
  alignLine.strokeWidth(Math.max(1, STROKE_THIN * inv));
  scaleLine.strokeWidth(Math.max(1, STROKE_THIN * inv));
  uiLayer.batchDraw();
}

function zoomAroundCenter(factor) {
  const oldScale = stageScale;
  let newScale = Math.max(1, Math.min(6, oldScale * factor));
  const cx = stage.width() / 2;
  const cy = stage.height() / 2;
  const worldPoint = { x: (cx - stagePos.x) / oldScale, y: (cy - stagePos.y) / oldScale };
  stageScale = newScale;
  stagePos = {
    x: cx - worldPoint.x * stageScale,
    y: cy - worldPoint.y * stageScale
  };
  applyStageView();
}

function updateAssistStatus() {

function isGridTargetNode(target){
  if (!target) return false;
  if (target === gridGroup) return true;
  if (typeof target.getParent === "function") {
    let p = target;
    while (p) {
      if (p === gridGroup) return true;
      p = p.getParent ? p.getParent() : null;
    }
  }
  return false;
}

function getNearbyStagePointsForType(type, excludeKey) {
  const out = [];
  if (type === "align" || type === "scale") {
    model.alignPoints.forEach((p, i) => {
      const key = makePointKey("align", i);
      if (key !== excludeKey) out.push(photoLocalToStage(p));
    });
    model.scalePoints.forEach((p, i) => {
      const key = makePointKey("scale", i);
      if (key !== excludeKey) out.push(photoLocalToStage(p));
    });
    if (model.basePoint && excludeKey !== "base:0") out.push(photoLocalToStage(model.basePoint));
  } else if (type === "poly") {
    model.polyPoints.forEach((p, i) => {
      const key = makePointKey("poly", i);
      if (key !== excludeKey) out.push(photoLocalToStage(p));
    });
  }
  return out;
}

function getPolyNeighborStagePoints(index) {
  const pts = [];
  const n = model.polyPoints.length;
  if (index < 0 || index >= n) return pts;
  if (n >= 2) {
    const prev = model.polyPoints[(index - 1 + n) % n];
    const next = model.polyPoints[(index + 1) % n];
    if (prev) pts.push(photoLocalToStage(prev));
    if (next && n > 1) pts.push(photoLocalToStage(next));
  }
  return pts;
}

function snapToGrid(stagePos) {
  if (!gridGroup.visible() || !lastTileStageW || !lastTileStageH) return stagePos;
  const localX = stagePos.x - gridGroup.x();
  const localY = stagePos.y - gridGroup.y();
  const snapX = Math.round(localX / lastTileStageW) * lastTileStageW;
  const snapY = Math.round(localY / lastTileStageH) * lastTileStageH;
  return { x: gridGroup.x() + snapX, y: gridGroup.y() + snapY };
}

function snapLocalPoint(pointKey, proposedLocal) {
  const info = parsePointKey(pointKey);
  if (!info) return proposedLocal;

  let stagePos = photoLocalToStage(proposedLocal);
  stagePos = { x: roundToUnit(stagePos.x), y: roundToUnit(stagePos.y) };

  const snapDist = getStageSpaceThreshold(SNAP_STAGE_PX);
  const axisDist = getStageSpaceThreshold(AXIS_SNAP_STAGE_PX);
  const gridSnapDist = getStageSpaceThreshold(GRID_SNAP_STAGE_PX);

  let snapMsg = "";

  if (info.type === "base") {
    if (gridGroup.visible() && lastTileStageW && lastTileStageH) {
      const g = snapToGrid(stagePos);
      if (Math.hypot(g.x - stagePos.x, g.y - stagePos.y) <= gridSnapDist * 1.5) {
        stagePos = g;
        snapMsg = "基準点: グリッド交点吸着";
      }
    }
    lastSnapInfo = snapMsg;
    return stageToPhotoLocal(stagePos);
  }

  if (info.type === "align" || info.type === "scale") {
    if (gridGroup.visible()) {
      const g = snapToGrid(stagePos);
      if (Math.hypot(g.x - stagePos.x, g.y - stagePos.y) <= gridSnapDist) {
        stagePos = g;
        snapMsg = "交点吸着";
      }
    }

    const nearby = getNearbyStagePointsForType(info.type, pointKey);
    let nearest = null;
    let nearestD2 = Infinity;
    nearby.forEach((p) => {
      const d2 = distance2(stagePos, p);
      if (d2 < nearestD2) {
        nearest = p;
        nearestD2 = d2;
      }
    });

    if (nearest && nearestD2 <= snapDist * snapDist) {
      stagePos = { x: nearest.x, y: nearest.y };
      snapMsg = snapMsg || "近接点吸着";
    }

    lastSnapInfo = snapMsg;
    return stageToPhotoLocal(stagePos);
  }

  if (info.type === "poly") {
    if (suppressSnapForNudge) {
      lastSnapInfo = "十字キー微調整";
      return proposedLocal;
    }

    if (gridGroup.visible()) {
      const g = snapToGrid(stagePos);
      if (Math.hypot(g.x - stagePos.x, g.y - stagePos.y) <= gridSnapDist) {
        stagePos = g;
        snapMsg = "交点吸着";
      }
    }

    const neighbors = getPolyNeighborStagePoints(info.index);
    neighbors.forEach((p) => {
      if (Math.abs(stagePos.x - p.x) <= axisDist) {
        stagePos.x = p.x;
        snapMsg = snapMsg || "縦ライン吸着";
      }
      if (Math.abs(stagePos.y - p.y) <= axisDist) {
        stagePos.y = p.y;
        snapMsg = snapMsg || "横ライン吸着";
      }
    });

    const others = getNearbyStagePointsForType("poly", pointKey);
    const minGap = getStageSpaceThreshold(POLY_OVERLAP_MIN_PX);

    for (const other of others) {
      const dx = stagePos.x - other.x;
      const dy = stagePos.y - other.y;
      const d = Math.hypot(dx, dy);
      if (d < minGap) {
        if (d < 0.0001) {
          stagePos.x += minGap;
        } else {
          const ratio = minGap / d;
          stagePos.x = other.x + dx * ratio;
          stagePos.y = other.y + dy * ratio;
        }
        snapMsg = snapMsg || "点重なり防止";
      }
    }

    lastSnapInfo = snapMsg;
    return stageToPhotoLocal(stagePos);
  }

  lastSnapInfo = snapMsg;
  return proposedLocal;
}

function renderOverlay() {
  uiLayer.find(".alignDot").forEach(n => n.destroy());
  uiLayer.find(".scaleDot").forEach(n => n.destroy());
  uiLayer.find(".polyDot").forEach(n => n.destroy());
  uiLayer.find(".baseDot").forEach(n => n.destroy());

  activePointNode = null;

  function createUiDot(stagePos, color, className, pointKey, pointNo = null) {
    const g = new Konva.Group({
      x: stagePos.x,
      y: stagePos.y,
      draggable: true,
      name: className,
      dragDistance: DRAG_THRESHOLD_PX
    });

    g.setAttr("pointKey", pointKey);

    g.add(new Konva.Circle({
      radius: HIT_RADIUS,
      fill: "transparent",
      listening: true,
      name: "hitCircle"
    }));

    g.add(new Konva.Line({
      points: [-CROSS_HALF, 0, CROSS_HALF, 0],
      stroke: color,
      strokeWidth: STROKE_THIN,
      listening: false,
      name: "crossH"
    }));

    g.add(new Konva.Line({
      points: [0, -CROSS_HALF, 0, CROSS_HALF],
      stroke: color,
      strokeWidth: STROKE_THIN,
      listening: false,
      name: "crossV"
    }));

    g.add(new Konva.Circle({
      radius: DOT_RADIUS,
      fill: color,
      stroke: "#fff",
      strokeWidth: 1,
      listening: false,
      name: "dotCore"
    }));

    g.setAttr("baseColor", color);

    if (pointNo != null) {
      g.add(new Konva.Text({
        text: String(pointNo),
        x: 10,
        y: -20,
        fontSize: 11,
        fontStyle: "700",
        fill: "rgba(255,255,255,0.96)",
        stroke: "rgba(0,0,0,0.42)",
        strokeWidth: 0.9,
        listening: false,
        name: "pointLabel"
      }));
    }

    g.on("tap", (e) => {
      e.cancelBubble = true;
      if (suppressNextTap) return;
      if (pointKey === "base:0") return;

      if (pointKey.startsWith("poly:") && (mode === "drawing" || mode === "polyAdjust")) {
        const pos = getPointerPos(e);
        const nearest = pos ? pickNearestPolyDot(pos) : null;
        enterPointAdjust(nearest || g);
        return;
      }

      if (zoomHudMode === "point" && activePointKey && activePointKey !== pointKey) return;
      enterPointAdjust(g);
    });

    g.on("touchstart mousedown", (e) => {
      e.cancelBubble = true;
      stage.draggable(false);
    });

    g.dragBoundFunc((rawPos) => {
      const pointKey = g.getAttr("pointKey");

      if (pointKey && pointKey.startsWith("poly:")) {
        return {
          x: roundToUnit(rawPos.x),
          y: roundToUnit(rawPos.y)
        };
      }

      const rawLocal = stageToPhotoLocal(rawPos);
      const snappedLocal = snapLocalPoint(pointKey, rawLocal);
      const snappedStage = photoLocalToStage(snappedLocal);
      return { x: snappedStage.x, y: snappedStage.y };
    });

    g.on("dragstart", (e) => {
      e.cancelBubble = true;
      pointDragging = true;
      saveUndoState("point-drag");
      armTapSuppression();
      lastSnapInfo = "";

      if (g.getAttr("pointKey").startsWith("poly:")) {
        if (activePointKey !== pointKey) enterPointAdjust(g);
        updateZoom(g.position());
      } else if (activePointKey === pointKey && zoomHudMode === "point") {
        updateZoom(g.position());
      }
    });

    g.on("dragmove", () => {
      const key = g.getAttr("pointKey");
      const local = stageToPhotoLocal({ x: g.x(), y: g.y() });
      setModelPointByKey(key, local);

      if (key.startsWith("poly:")) {
        polyShape.points(getPolyStagePointsFlat());
      } else if (key.startsWith("align:")) {
        const pts = model.alignPoints.map(p => photoLocalToStage(p));
        if (pts.length === 2) {
          alignLine.points([pts[0].x, pts[0].y, pts[1].x, pts[1].y]);
          alignLine.visible(true);
        }
      } else if (key.startsWith("scale:")) {
        const pts = model.scalePoints.map(p => photoLocalToStage(p));
        if (pts.length === 2) {
          scaleLine.points([pts[0].x, pts[0].y, pts[1].x, pts[1].y]);
          scaleLine.visible(true);
        }
      }

      updateAssistStatus();
      if (key === activePointKey && zoomHudMode === "point") updateZoom(g.position());
      updateBaseDimsToPoly();
      uiLayer.batchDraw();
    });

    g.on("dragend", () => {
      pointDragging = false;
      armTapSuppression();

      const key = g.getAttr("pointKey");
      const stagePt = { x: roundToUnit(g.x()), y: roundToUnit(g.y()) };
      const finalLocal = snapLocalPoint(key, stageToPhotoLocal(stagePt));
      setModelPointByKey(key, finalLocal);
      renderOverlay();
      updateAssistStatus();
    });

    uiLayer.add(g);

    if (pointKey === activePointKey) {
      activePointNode = g;
    }

    return g;
  }

  model.alignPoints.forEach((p, i) => {
    createUiDot(photoLocalToStage(p), "#6f42c1", "alignDot", makePointKey("align", i), i + 1);
  });

  model.scalePoints.forEach((p, i) => {
    createUiDot(photoLocalToStage(p), "red", "scaleDot", makePointKey("scale", i), i + 1);
  });

  model.polyPoints.forEach((p, i) => {
    createUiDot(photoLocalToStage(p), "#fd7e14", "polyDot", makePointKey("poly", i), i + 1);
  });

  if (model.basePoint) {
    createUiDot(photoLocalToStage(model.basePoint), "#00bfff", "baseDot", "base:0", "B");
  }

  const isPolyLocked = model.polyPoints.length >= 3 && mode !== "drawing" && mode !== "polyAdjust";
  outsideShade.visible(isPolyLocked);
  outsideShade.sceneFunc((ctx) => {
    if (!isPolyLocked) return;
    const points = getPolyStagePointsFlat();
    if (!points || points.length < 6) return;
    ctx.save();
    ctx.fillStyle = "rgba(0,0,0,0.28)";
    ctx.beginPath();
    ctx.rect(0, 0, stage.width(), stage.height());
    ctx.moveTo(points[0], points[1]);
    for (let i = 2; i < points.length; i += 2) ctx.lineTo(points[i], points[i + 1]);
    ctx.closePath();
    ctx.fill("evenodd");
    ctx.restore();
  });

  const polyFlat = getPolyStagePointsFlat();
  polyShape.points(polyFlat);

  if (model.alignPoints.length === 2) {
    const a = photoLocalToStage(model.alignPoints[0]);
    const b = photoLocalToStage(model.alignPoints[1]);
    alignLine.points([a.x, a.y, b.x, b.y]);
    alignLine.visible(true);
  } else {
    alignLine.visible(false);
  }

  if (model.scalePoints.length === 2) {
    const a = photoLocalToStage(model.scalePoints[0]);
    const b = photoLocalToStage(model.scalePoints[1]);
    scaleLine.points([a.x, a.y, b.x, b.y]);
    scaleLine.visible(true);
  } else {
    scaleLine.visible(false);
  }

  compensateUiScale();

  if (zoomHudMode === "point" && activePointNode) {
    if (activePointKey === "base:0") setBaseOnlyInteractivity();
    else setOnlyActivePointInteractive(activePointNode);
  } else if (zoomHudMode === "base") {
    setBaseOnlyInteractivity();
  } else {
    restoreAllPointInteractivity();
  }

  updateBaseDimsToPoly();
  updateEstimateFromCurrentState();
  updateUiChips();
  uiLayer.batchDraw();
}

function focusPointByKey(pointKey) {
  if (!pointKey) return;

  const all = [
    ...uiLayer.find(".alignDot"),
    ...uiLayer.find(".scaleDot"),
    ...uiLayer.find(".polyDot"),
    ...uiLayer.find(".baseDot")
  ];

  const node = all.find(n => n.getAttr("pointKey") === pointKey);
  if (!node) return;

  activePointKey = pointKey;
  activePointNode = node;
  enterPointAdjust(node);
}

function intersectionsWithHorizontalLine(poly, y0) {
  const n = poly.length / 2;
  const xs = [];
  for (let i = 0; i < n; i++) {
    const j = (i + 1) % n;
    const x1 = poly[i * 2], y1 = poly[i * 2 + 1], x2 = poly[j * 2], y2 = poly[j * 2 + 1];
    if (Math.abs(y2 - y1) < 1e-9) continue;
    const minY = Math.min(y1, y2), maxY = Math.max(y1, y2);
    if (y0 < minY || y0 >= maxY) continue;
    const t = (y0 - y1) / (y2 - y1);
    xs.push(x1 + (x2 - x1) * t);
  }
  xs.sort((a,b)=>a-b);
  return xs;
}

function intersectionsWithVerticalLine(poly, x0) {
  const n = poly.length / 2;
  const ys = [];
  for (let i = 0; i < n; i++) {
    const j = (i + 1) % n;
    const x1 = poly[i * 2], y1 = poly[i * 2 + 1], x2 = poly[j * 2], y2 = poly[j * 2 + 1];
    if (Math.abs(x2 - x1) < 1e-9) continue;
    const minX = Math.min(x1, x2), maxX = Math.max(x1, x2);
    if (x0 < minX || x0 >= maxX) continue;
    const t = (x0 - x1) / (x2 - x1);
    ys.push(y1 + (y2 - y1) * t);
  }
  ys.sort((a,b)=>a-b);
  return ys;
}

function maxLessThan(arr, v) {
  let best = null;
  for (const a of arr) if (a < v && (best == null || a > best)) best = a;
  return best;
}

function minGreaterThan(arr, v) {
  let best = null;
  for (const a of arr) if (a > v && (best == null || a < best)) best = a;
  return best;
}

function updateBaseDimsToPoly() {
  const base = getBaseStagePoint();
  const poly = getPolyStagePointsFlat();

  const baseXLmmOut = document.getElementById("baseXLmmOut");
  const baseXRmmOut = document.getElementById("baseXRmmOut");
  const baseYUmmOut = document.getElementById("baseYUmmOut");
  const baseYDmmOut = document.getElementById("baseYDmmOut");
  const baseXLtileOut = document.getElementById("baseXLtileOut");
  const baseXRtileOut = document.getElementById("baseXRtileOut");
  const baseYUtileOut = document.getElementById("baseYUtileOut");
  const baseYDtileOut = document.getElementById("baseYDtileOut");

  const setEmpty = () => {
    baseXLmmOut.textContent = "-";
    baseXRmmOut.textContent = "-";
    baseYUmmOut.textContent = "-";
    baseYDmmOut.textContent = "-";
    baseXLtileOut.textContent = "-";
    baseXRtileOut.textContent = "-";
    baseYUtileOut.textContent = "-";
    baseYDtileOut.textContent = "-";
    baseSummaryText.textContent = "基準点寸法: -";
  };

  if (!base || !mmPerLocalPx || !gridGroup.visible() || poly.length < 6) {
    setStatus(null, "X左: -\nX右: -\nY上: -\nY下: -");
    setEmpty();
    setBaseInfoVisible(false);
    return;
  }

  const bx = base.x, by = base.y, eps = BASE_INTERSECT_EPS;
  const xs = [
    ...intersectionsWithHorizontalLine(poly, by + eps),
    ...intersectionsWithHorizontalLine(poly, by - eps)
  ];
  const ys = [
    ...intersectionsWithVerticalLine(poly, bx + eps),
    ...intersectionsWithVerticalLine(poly, bx - eps)
  ];

  const uniq = (arr) => Array.from(new Set(arr.map(v => Math.round(v * 1000) / 1000))).sort((a,b)=>a-b);
  const xsU = uniq(xs), ysU = uniq(ys);
  const leftX = maxLessThan(xsU, bx), rightX = minGreaterThan(xsU, bx), upY = maxLessThan(ysU, by), downY = minGreaterThan(ysU, by);
  const dxL = (leftX == null) ? null : (bx - leftX);
  const dxR = (rightX == null) ? null : (rightX - bx);
  const dyU = (upY == null) ? null : (by - upY);
  const dyD = (downY == null) ? null : (downY - by);

  const xLmm = dxL == null ? null : Math.abs(stagePxToMmX(dxL));
  const xRmm = dxR == null ? null : Math.abs(stagePxToMmX(dxR));
  const yUmm = dyU == null ? null : Math.abs(stagePxToMmY(dyU));
  const yDmm = dyD == null ? null : Math.abs(stagePxToMmY(dyD));

  const twMm = parseFloat(document.getElementById("tileWidthInput").value);
  const thMm = parseFloat(document.getElementById("tileHeightInput").value);

  const fmtMm = (v) => (v == null || !isFinite(v)) ? "-" : `${v.toFixed(1)}mm`;
  const fmtTile = (v, tile) => {
    if (v == null || !isFinite(v) || tile == null || !isFinite(tile) || tile <= 0) return "-";
    const n = Math.floor(v / tile + 1e-9);
    const rem = Math.max(0, v - n * tile);
    return `${n}枚 + ${rem.toFixed(1)}mm`;
  };

  baseXLmmOut.textContent = fmtMm(xLmm);
  baseXRmmOut.textContent = fmtMm(xRmm);
  baseYUmmOut.textContent = fmtMm(yUmm);
  baseYDmmOut.textContent = fmtMm(yDmm);

  baseXLtileOut.textContent = fmtTile(xLmm, twMm);
  baseXRtileOut.textContent = fmtTile(xRmm, twMm);
  baseYUtileOut.textContent = fmtTile(yUmm, thMm);
  baseYDtileOut.textContent = fmtTile(yDmm, thMm);

  baseSummaryText.textContent = `X左 ${fmtMm(xLmm)} / X右 ${fmtMm(xRmm)} / Y上 ${fmtMm(yUmm)} / Y下 ${fmtMm(yDmm)}`;

  const fmt2 = (v, tile) => {
    if (v == null || !isFinite(v) || !isFinite(tile) || tile <= 0) return "-";
    const n = Math.floor(v / tile + 1e-9);
    const rem = Math.max(0, v - n * tile);
    return `${v.toFixed(1)}mm （${n}枚 + ${rem.toFixed(1)}mm）`;
  };

  setStatus(null, `X左: ${fmt2(xLmm, twMm)}\nX右: ${fmt2(xRmm, twMm)}\nY上: ${fmt2(yUmm, thMm)}\nY下: ${fmt2(yDmm, thMm)}`);
  setBaseInfoVisible(true);
}

function clipPolygonToRect(polyPts, rx0, ry0, rx1, ry1) {
  let output = polyPts;
  const edges = [
    { inside: (p) => p.x >= rx0, intersect: (a,b) => intersectWithVertical(a,b,rx0) },
    { inside: (p) => p.x <= rx1, intersect: (a,b) => intersectWithVertical(a,b,rx1) },
    { inside: (p) => p.y >= ry0, intersect: (a,b) => intersectWithHorizontal(a,b,ry0) },
    { inside: (p) => p.y <= ry1, intersect: (a,b) => intersectWithHorizontal(a,b,ry1) },
  ];

  for (const edge of edges) {
    const input = output;
    output = [];
    if (!input || input.length === 0) break;
    let S = input[input.length - 1];
    for (const E of input) {
      const Ein = edge.inside(E);
      const Sin = edge.inside(S);
      if (Ein) {
        if (!Sin) output.push(edge.intersect(S, E));
        output.push(E);
      } else if (Sin) {
        output.push(edge.intersect(S, E));
      }
      S = E;
    }
  }
  return output;

  function intersectWithVertical(a,b,x){
    const dx=b.x-a.x;
    if (Math.abs(dx)<1e-9) return {x,y:a.y};
    const t=(x-a.x)/dx;
    return {x,y:a.y+(b.y-a.y)*t};
  }

  function intersectWithHorizontal(a,b,y){
    const dy=b.y-a.y;
    if (Math.abs(dy)<1e-9) return {x:a.x,y};
    const t=(y-a.y)/dy;
    return {x:a.x+(b.x-a.x)*t,y};
  }
}

function getBBoxOfPoints(pts) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const p of pts) {
    if (p.x < minX) minX = p.x;
    if (p.y < minY) minY = p.y;
    if (p.x > maxX) maxX = p.x;
    if (p.y > maxY) maxY = p.y;
  }
  if (!isFinite(minX)) return null;
  return { minX, minY, maxX, maxY };
}

function polygonAreaFromPointObjects(points) {
  if (!points || points.length < 3) return 0;
  let sum = 0;
  for (let i = 0; i < points.length; i++) {
    const a = points[i];
    const b = points[(i + 1) % points.length];
    sum += a.x * b.y - b.x * a.y;
  }
  return Math.abs(sum) / 2;
}

function isPointInPoly(x, y, poly) {
  let inside = false;
  const n = poly.length / 2;
  for (let i = 0, j = n - 1; i < n; j = i++) {
    const xi = poly[i*2], yi = poly[i*2+1], xj = poly[j*2], yj = poly[j*2+1];
    const intersect = (yi > y) !== (yj > y) && x < ((xj - xi) * (y - yi)) / (yj - yi + 0.0) + xi;
    if (intersect) inside = !inside;
  }
  return inside;
}

function getPolyBounds(poly) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (let i = 0; i < poly.length; i += 2) {
    const x = poly[i];
    const y = poly[i+1];
    if (x < minX) minX = x;
    if (y < minY) minY = y;
    if (x > maxX) maxX = x;
    if (y > maxY) maxY = y;
  }
  return { minX, minY, maxX, maxY };
}


function calcSafeBEstimateFromGrid(poly, gx, gy, tileStageW, tileStageH, twMm, thMm, dangerMm) {
  if (!poly || poly.length < 6) {
    return {
      fullCount: 0,
      partialCount: 0,
      reuseCandidateCount: 0,
      reusePairCount: 0,
      reuseAdjustedTileCount: 0
    };
  }

  const b = getPolyBounds(poly);
  const iMin = Math.floor((b.minX - gx) / tileStageW) - GRID_MARGIN_TILES;
  const iMax = Math.ceil((b.maxX - gx) / tileStageW) + GRID_MARGIN_TILES;
  const jMin = Math.floor((b.minY - gy) / tileStageH) - GRID_MARGIN_TILES;
  const jMax = Math.ceil((b.maxY - gy) / tileStageH) + GRID_MARGIN_TILES;

  const polyObj = [];
  for (let k = 0; k < poly.length; k += 2) polyObj.push({ x: poly[k], y: poly[k + 1] });

  const tileAreaMm2 = twMm * thMm;
  const usageThreshold = 0.48;
  const stripFullRatio = 0.92;
  const stripThinRatio = 0.82;
  const verticalMinShortSideMm = 100;

  let fullCount = 0;
  let partialCount = 0;
  let reuseCandidateCount = 0;

  for (let i = iMin; i <= iMax; i++) {
    for (let j = jMin; j <= jMax; j++) {
      const tx = i * tileStageW;
      const ty = j * tileStageH;
      const ax = tx + gx;
      const ay = ty + gy;

      const corners = [
        [ax, ay],
        [ax + tileStageW, ay],
        [ax, ay + tileStageH],
        [ax + tileStageW, ay + tileStageH]
      ];

      const insideCount = corners.filter((c) => isPointInPoly(c[0], c[1], poly)).length;
      const clipped = clipPolygonToRect(polyObj, ax, ay, ax + tileStageW, ay + tileStageH);
      const clippedAreaPx2 = polygonAreaFromPointObjects(clipped);
      if (!(clipped && clipped.length >= 3) || clippedAreaPx2 <= 0.01) continue;

      if (insideCount >= 4) {
        fullCount++;
        continue;
      }

      partialCount++;

      const bb = getBBoxOfPoints(clipped);
      if (!bb) continue;

      const wMm = Math.abs(stagePxToMmX(Math.max(0, bb.maxX - bb.minX)));
      const hMm = Math.abs(stagePxToMmY(Math.max(0, bb.maxY - bb.minY)));
      const clippedAreaMm2 = clippedAreaPx2 * Math.abs(mmPerLocalPx * mmPerLocalPx);
      const usage = tileAreaMm2 > 0 ? clippedAreaMm2 / tileAreaMm2 : 0;

      if (!isFinite(wMm) || !isFinite(hMm) || !isFinite(usage) || wMm <= 0 || hMm <= 0 || usage <= 0) continue;
      if (dangerMm > 0 && Math.min(wMm, hMm) < dangerMm) continue;

      const isHorizontalStrip = wMm >= twMm * stripFullRatio && hMm <= thMm * stripThinRatio;
      const isVerticalStrip = hMm >= thMm * stripFullRatio && wMm <= twMm * stripThinRatio;

      let canReuseAsTwoUp = false;

      if (usage <= usageThreshold) {
        if (isHorizontalStrip) {
          canReuseAsTwoUp = true;
        } else if (isVerticalStrip && Math.min(wMm, hMm) >= verticalMinShortSideMm) {
          canReuseAsTwoUp = true;
        }
      }

      if (canReuseAsTwoUp) reuseCandidateCount++;
    }
  }

  const reusePairCount = Math.floor(reuseCandidateCount / 2);
  const reuseAdjustedTileCount = fullCount + partialCount - reusePairCount;

  return {
    fullCount,
    partialCount,
    reuseCandidateCount,
    reusePairCount,
    reuseAdjustedTileCount
  };
}

function updateGrid() {
  if (!mmPerLocalPx) return;
  const poly = getPolyStagePointsFlat();
  if (poly.length < 6) return;

  const twMm = parseFloat(document.getElementById("tileWidthInput").value);
  const thMm = parseFloat(document.getElementById("tileHeightInput").value);
  if (!isFinite(twMm) || !isFinite(thMm) || twMm <= 0 || thMm <= 0) return;

  const dangerMm = Math.max(0, parseFloat(document.getElementById("dangerMmInput").value || "0"));
  const tileLocalW = twMm / mmPerLocalPx;
  const tileLocalH = thMm / mmPerLocalPx;
  const tileStageW = tileLocalW * (photoGroup.scaleX() || 1);
  const tileStageH = tileLocalH * (photoGroup.scaleY() || 1);
  if (!isFinite(tileStageW) || !isFinite(tileStageH) || tileStageW <= 0 || tileStageH <= 0) return;

  lastTileStageW = tileStageW;
  lastTileStageH = tileStageH;

  gridGroup.destroyChildren();

  const b = getPolyBounds(poly);
  const gx = gridGroup.x();
  const gy = gridGroup.y();
  const safeB = calcSafeBEstimateFromGrid(poly, gx, gy, tileStageW, tileStageH, twMm, thMm, dangerMm);

  const iMin = Math.floor((b.minX - gx) / tileStageW) - GRID_MARGIN_TILES;
  const iMax = Math.ceil((b.maxX - gx) / tileStageW) + GRID_MARGIN_TILES;
  const jMin = Math.floor((b.minY - gy) / tileStageH) - GRID_MARGIN_TILES;
  const jMax = Math.ceil((b.maxY - gy) / tileStageH) + GRID_MARGIN_TILES;

  const cells = (iMax - iMin + 1) * (jMax - jMin + 1);
  if (cells > GRID_MAX_CELLS) {
    alert(`グリッドが細かすぎます（cells=${cells}）。タイル寸法/縮尺/範囲を見直してください。`);
    return;
  }

  gridGroup.add(new Konva.Rect({
    x:iMin*tileStageW,
    y:jMin*tileStageH,
    width:(iMax-iMin+1)*tileStageW,
    height:(jMax-jMin+1)*tileStageH,
    fill:"rgba(0,0,0,0)",
    listening:true
  }));

  const polyObj = [];
  for (let k = 0; k < poly.length; k += 2) polyObj.push({ x: poly[k], y: poly[k+1] });

  for (let i = iMin; i <= iMax; i++) {
    for (let j = jMin; j <= jMax; j++) {
      const tx = i * tileStageW;
      const ty = j * tileStageH;
      const ax = tx + gx;
      const ay = ty + gy;

      const corners = [
        [ax, ay],
        [ax + tileStageW, ay],
        [ax, ay + tileStageH],
        [ax + tileStageW, ay + tileStageH]
      ];

      const insideCount = corners.filter((c) => isPointInPoly(c[0], c[1], poly)).length;
      const clipped = clipPolygonToRect(polyObj, ax, ay, ax + tileStageW, ay + tileStageH);
      const clippedAreaPx2 = polygonAreaFromPointObjects(clipped);
      if (!(clipped && clipped.length >= 3) || clippedAreaPx2 <= 0.01) continue;


      let stroke = "rgba(0,123,255,0.35)";
      let fill = "rgba(0,123,255,0.08)";

      if (dangerOn && dangerMm > 0 && insideCount < 4) {
        const bb = getBBoxOfPoints(clipped);

        if (bb) {
          const wMm = Math.abs(stagePxToMmX(Math.max(0, bb.maxX - bb.minX)));
          const hMm = Math.abs(stagePxToMmY(Math.max(0, bb.maxY - bb.minY)));
          if (Math.min(wMm, hMm) < dangerMm) {
            stroke = "red";
            fill = "rgba(255,0,0,0.18)";
          }
        } else {
          const cx = ax + tileStageW / 2;
          const cy = ay + tileStageH / 2;
          if (!isPointInPoly(cx, cy, poly)) {
            stroke = "red";
            fill = "rgba(255,0,0,0.18)";
          }
        }
      }

      gridGroup.add(new Konva.Rect({
        x:tx,
        y:ty,
        width:tileStageW,
        height:tileStageH,
        stroke,
        fill,
        strokeWidth:STROKE_GRID,
        listening:false
      }));
    }
  }

  mainLayer.batchDraw();
  updateBaseDimsToPoly();
  updateEstimateFromCurrentState(safeB.fullCount, safeB.partialCount, safeB.reuseCandidateCount, safeB.reusePairCount, safeB.reuseAdjustedTileCount);
}

function resnapBasePoint() {
  if (!model.basePoint) return;
  const s = snapToGrid(photoLocalToStage(model.basePoint));
  model.basePoint = stageToPhotoLocal(s);
  renderOverlay();
}

function moveGridByMm(dxMm, dyMm){
  if (!gridGroup.visible()) return;
  saveUndoState("grid-move");
  const dx = mmToStagePxX(dxMm);
  const dy = mmToStagePxY(dyMm);
  gridGroup.position({ x: gridGroup.x() + dx, y: gridGroup.y() + dy });
  updateGrid();
  resnapBasePoint();
}

function moveActivePointByScreenPx(dxPx, dyPx) {
  if (!activePointKey) return;

  const modelPoint = getModelPointByKey(activePointKey);
  if (!modelPoint) return;
  saveUndoState("point-nudge");

  const dx = dxPx / (stageScale || 1);
  const dy = dyPx / (stageScale || 1);

  const stageNow = photoLocalToStage(modelPoint);
  const nextStage = {
    x: roundToUnit(stageNow.x + dx),
    y: roundToUnit(stageNow.y + dy)
  };

  suppressSnapForNudge = true;
  const nextLocal = stageToPhotoLocal(nextStage);
  const adjustedLocal = snapLocalPoint(activePointKey, nextLocal);
  suppressSnapForNudge = false;

  setModelPointByKey(activePointKey, adjustedLocal);

  renderOverlay();

  if (activePointNode && zoomHudMode === "point") {
    updateZoom(activePointNode.position());
  }
  updateAssistStatus();
}

function performDpadMove(dx, dy){
  if (dpadMode === "grid") moveGridByMm(dx * nudgeMm, dy * nudgeMm);
  else if (dpadMode === "point") moveActivePointByScreenPx(dx * pointStepPx, dy * pointStepPx);
}

function clearDpadRepeat() {
  if (dpadRepeatTimer) clearTimeout(dpadRepeatTimer);
  if (dpadRepeatInterval) clearInterval(dpadRepeatInterval);
  dpadRepeatTimer = null;
  dpadRepeatInterval = null;
}

function bindRepeatPress(el, onStep) {
  const stop = (ev) => {
    if (!ev) return;
    ev.preventDefault();
    ev.stopPropagation();
  };

  const start = (ev) => {
    stop(ev);

    if (dpadActiveButton && dpadActiveButton !== el) {
      clearDpadRepeat();
    }

    dpadActiveButton = el;

    if (el.setPointerCapture && ev.pointerId != null) {
      try { el.setPointerCapture(ev.pointerId); } catch (e) {}
    }

    clearDpadRepeat();
    onStep();

    dpadRepeatTimer = setTimeout(() => {
      dpadRepeatInterval = setInterval(() => {
        onStep();
      }, REPEAT_INTERVAL);
    }, REPEAT_DELAY);
  };

  const end = (ev) => {
    stop(ev);

    if (el.releasePointerCapture && ev && ev.pointerId != null) {
      try { el.releasePointerCapture(ev.pointerId); } catch (e) {}
    }

    if (dpadActiveButton === el) {
      dpadActiveButton = null;
    }

    clearDpadRepeat();
  };

  el.addEventListener("pointerdown", start, { passive: false });
  el.addEventListener("pointerup", end, { passive: false });
  el.addEventListener("pointerleave", end, { passive: false });
  el.addEventListener("pointercancel", end, { passive: false });
}

function bindDpad(){
  bindRepeatPress(document.getElementById("dUp"), () => performDpadMove(0,-1));
  bindRepeatPress(document.getElementById("dDown"), () => performDpadMove(0,1));
  bindRepeatPress(document.getElementById("dLeft"), () => performDpadMove(-1,0));
  bindRepeatPress(document.getElementById("dRight"), () => performDpadMove(1,0));

  document.getElementById("dCenter").addEventListener("pointerdown", (ev)=>{
    ev.preventDefault();
    ev.stopPropagation();
    if (dpadMode === "grid") {
      const idx = STEP_CHOICES.indexOf(nudgeMm);
      nudgeMm = STEP_CHOICES[(idx + 1) % STEP_CHOICES.length];
    } else {
      const idx = STEP_CHOICES.indexOf(pointStepPx);
      pointStepPx = STEP_CHOICES[(idx + 1) % STEP_CHOICES.length];
    }
    setDpadVisible(true);
  }, { passive: false });
}
bindDpad();

function scoreGridAtPosition(gx, gy){
  if (!mmPerLocalPx) return null;
  const poly = getPolyStagePointsFlat();
  if (poly.length < 6) return null;

  const twMm = parseFloat(document.getElementById("tileWidthInput").value);
  const thMm = parseFloat(document.getElementById("tileHeightInput").value);
  if (!isFinite(twMm)||!isFinite(thMm)||twMm<=0||thMm<=0) return null;

  const dangerMm = Math.max(0, parseFloat(document.getElementById("dangerMmInput").value || "0"));
  const tileLocalW = twMm / mmPerLocalPx;
  const tileLocalH = thMm / mmPerLocalPx;
  const tileStageW = tileLocalW * (photoGroup.scaleX() || 1);
  const tileStageH = tileLocalH * (photoGroup.scaleY() || 1);
  if (!isFinite(tileStageW)||!isFinite(tileStageH)||tileStageW<=0||tileStageH<=0) return null;

  const b = getPolyBounds(poly);
  const iMin = Math.floor((b.minX - gx) / tileStageW) - GRID_MARGIN_TILES;
  const iMax = Math.ceil((b.maxX - gx) / tileStageW) + GRID_MARGIN_TILES;
  const jMin = Math.floor((b.minY - gy) / tileStageH) - GRID_MARGIN_TILES;
  const jMax = Math.ceil((b.maxY - gy) / tileStageH) + GRID_MARGIN_TILES;

  const cells = (iMax - iMin + 1) * (jMax - jMin + 1);
  if (cells > GRID_MAX_CELLS) return { tooMany: true, cells };

  const polyObj = [];
  for (let k = 0; k < poly.length; k += 2) polyObj.push({ x: poly[k], y: poly[k+1] });

  let partialCount = 0;
  let dangerCount = 0;

  for (let i = iMin; i <= iMax; i++) {
    for (let j = jMin; j <= jMax; j++) {
      const tx=i*tileStageW, ty=j*tileStageH, ax=tx+gx, ay=ty+gy;
      const corners=[[ax,ay],[ax+tileStageW,ay],[ax,ay+tileStageH],[ax+tileStageW,ay+tileStageH]];
      const insideCount = corners.filter((c) => isPointInPoly(c[0], c[1], poly)).length;
      if (insideCount===0) continue;
      if (insideCount<4) partialCount++;

      if (dangerOn && insideCount < 4 && dangerMm > 0) {
        const clipped = clipPolygonToRect(polyObj, ax, ay, ax + tileStageW, ay + tileStageH);
        const bb = (clipped && clipped.length >= 3) ? getBBoxOfPoints(clipped) : null;
        let isDanger = false;

        if (bb) {
          const wMm = Math.abs(stagePxToMmX(Math.max(0, bb.maxX - bb.minX)));
          const hMm = Math.abs(stagePxToMmY(Math.max(0, bb.maxY - bb.minY)));
          if (Math.min(wMm, hMm) < dangerMm) isDanger = true;
        } else {
          const cx=ax+tileStageW/2, cy=ay+tileStageH/2;
          if (!isPointInPoly(cx,cy,poly)) isDanger = true;
        }

        if (isDanger) dangerCount++;
      }
    }
  }

  return { dangerCount, partialCount, tileStageW, tileStageH };
}

function modPositive(a, m){
  return ((a % m) + m) % m;
}

async function optimizeGrid(){
  if (!gridGroup.visible()) { alert("先にグリッドを生成してください。"); return; }
  if (!mmPerLocalPx) { alert("先に縮尺合わせを完了してください。"); return; }
  if (model.polyPoints.length < 3) { alert("先に施工範囲（ポリゴン）を完了してください。"); return; }

  setStatus("最適割付：探索中…", null);

  const baseX = gridGroup.x();
  const baseY = gridGroup.y();
  const s0 = scoreGridAtPosition(baseX, baseY);

  if (!s0) { alert("スコア計算に失敗"); return; }
  if (s0.tooMany) {
    alert(`グリッドが細かすぎます（cells=${s0.cells}）。タイル寸法/縮尺/範囲を見直してください。`);
    return;
  }

  const W = s0.tileStageW;
  const H = s0.tileStageH;
  const baseOx = modPositive(baseX, W);
  const baseOy = modPositive(baseY, H);

  const coarseStepX = Math.max(1, mmToStagePxX(5));
  const coarseStepY = Math.max(1, mmToStagePxY(5));
  const fineStepX = Math.max(1, mmToStagePxX(1));
  const fineStepY = Math.max(1, mmToStagePxY(1));

  const search = (stepX, stepY, centerOx, centerOy, radiusX, radiusY) => {
    let best = null;
    const x0=(radiusX==null)?0:Math.max(0,centerOx-radiusX);
    const x1=(radiusX==null)?W:Math.min(W,centerOx+radiusX);
    const y0=(radiusY==null)?0:Math.max(0,centerOy-radiusY);
    const y1=(radiusY==null)?H:Math.min(H,centerOy+radiusY);

    for (let ox=x0; ox<x1; ox+=stepX) {
      for (let oy=y0; oy<y1; oy+=stepY) {
        const gx=baseX-baseOx+ox;
        const gy=baseY-baseOy+oy;
        const sc=scoreGridAtPosition(gx,gy);
        if (!sc || sc.tooMany) continue;

        const cand = {
          gx, gy, ox, oy,
          danger: sc.dangerCount,
          partial: sc.partialCount,
          move: Math.hypot(gx-baseX, gy-baseY)
        };

        if (
          !best ||
          cand.danger < best.danger ||
          (cand.danger===best.danger && cand.partial<best.partial) ||
          (cand.danger===best.danger && cand.partial===best.partial && cand.move<best.move)
        ) {
          best=cand;
        }
      }
    }
    return best;
  };

  const bestCoarse = search(coarseStepX, coarseStepY, null, null, null, null);
  if (!bestCoarse) { alert("最適化できませんでした"); return; }

  const bestFine = search(
    fineStepX, fineStepY,
    bestCoarse.ox, bestCoarse.oy,
    coarseStepX * 2, coarseStepY * 2
  ) || bestCoarse;

  gridGroup.position({ x: bestFine.gx, y: bestFine.gy });
  updateGrid();
  resnapBasePoint();
  updateEstimateFromCurrentState();
  setStatus(`最適割付：完了（危険=${bestFine.danger} / 欠け=${bestFine.partial}）`, null);
}

document.getElementById("fileInput").onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = async function () {
    if (file.type === "application/pdf") {
      let hasTrackedPdfLoadResult = false;
      try {
        const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
        const page = await pdf.getPage(1);
        const viewport = page.getViewport({ scale: 2.5 });
        const canvas = document.createElement("canvas");
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        await page.render({ canvasContext: canvas.getContext("2d"), viewport }).promise;
        setupImage(canvas);
        if (!hasTrackedPdfLoadResult) {
          hasTrackedPdfLoadResult = true;
          trackAppEvent("pdf_loaded", { app_variant: appVariant, result: "success" });
        }
      } catch (error) {
        if (!hasTrackedPdfLoadResult) {
          hasTrackedPdfLoadResult = true;
          trackAppEvent("error_pdf_load", {
            app_variant: appVariant,
            result: "error",
            reason: error?.name || "pdf_load_failed"
          });
        }
        alert("PDFの読み込みに失敗しました。別のファイルでお試しください。");
      }
    } else {
      const img = new Image();
      img.onload = () => setupImage(img);
      img.src = reader.result;
    }
  };

  if (file.type === "application/pdf") reader.readAsArrayBuffer(file);
  else reader.readAsDataURL(file);
};

function setupImage(source) {
  bgImage.image(source);

  const topReserve = 132;
  const bottomReserve = 176;

  const usableW = stage.width();
  const usableH = Math.max(120, stage.height() - topReserve - bottomReserve);

  const sc = Math.min(usableW / source.width, usableH / source.height);

  const fittedW = source.width * sc;
  const fittedH = source.height * sc;

  const offsetX = (stage.width() - fittedW) / 2;
  const offsetY = topReserve + (usableH - fittedH) / 2 - 4;

  photoGroup.scale({ x: sc, y: sc });
  photoGroup.position({ x: offsetX, y: offsetY });
  photoGroup.rotation(0);
  photoGroup.offset({ x: 0, y: 0 });

  mmPerLocalPx = 0;
  lastTileStageW = 0;
  lastTileStageH = 0;
  gridConfirmed = false;
  resetLayoutTracking();
  pointDragging = false;
  suppressNextTap = false;
  if (suppressTapTimer) clearTimeout(suppressTapTimer);
  suppressTapTimer = null;
  lastSnapInfo = "";
  clearDpadRepeat();
  undoState = null;

  stage.draggable(false);
  hideZoomHud();
  resetStageView();
lockPhoto(false);
  setMode("idle");

  resetModel();

  polyShape.points([]);
  alignLine.visible(false);
  scaleLine.visible(false);

  gridGroup.visible(false);
  gridGroup.draggable(false);
  gridGroup.position({ x: 0, y: 0 });
  gridGroup.destroyChildren();

  document.getElementById("alignInputArea").style.display = "none";
  document.getElementById("measureInputArea").style.display = "none";
  document.getElementById("polyControls").style.display = "none";
  document.getElementById("polyEditDoneBtn").style.display = "none";
  document.getElementById("polyEditBtn").style.display = "block";

  baseInfoExpanded = false;
  estimateState.areaM2 = null;
  estimateState.tileCount = null;
  estimateState.lossRate = null;
  estimateState.reuseCandidateCount = null;
  estimateState.reusePairCount = null;
  estimateState.reuseAdjustedTileCount = null;
  setBaseInfoVisible(false);

  setDpadVisible(false);
  renderOverlay();
  mainLayer.draw();
  setStatus("図面読み込み完了", "X左: -\nX右: -\nY上: -\nY下: -");
  updateUiChips();
}

document.getElementById("alignBtn").onclick = () => {
  if (!bgImage.image()) return;
  setMode("aligning");

  renderOverlay();
  lockPhoto(false);
  document.getElementById("alignInputArea").style.display = "block";

};

document.getElementById("applyAlignBtn").onclick = () => {
  if (model.alignPoints.length < 2) return;

  const a = photoLocalToStage(model.alignPoints[0]);
  const b = photoLocalToStage(model.alignPoints[1]);

  const dx = b.x - a.x;
  const dy = b.y - a.y;
  let angle = (Math.atan2(dy, dx) * 180) / Math.PI;
  if (angle > 90) angle -= 180;
  if (angle < -90) angle += 180;

  const centerStage = { x: stage.width() / 2, y: stage.height() / 2 };
  const centerLocal = stageToPhotoLocal(centerStage);

  photoGroup.offset(centerLocal);
  photoGroup.position(centerStage);
  photoGroup.rotation(photoGroup.rotation() - angle);

  model.alignPoints = [];
  document.getElementById("alignInputArea").style.display = "none";

  setMode("idle");
  activePointKey = null;
  activePointNode = null;
  zoomLayer.visible(false);
  hideZoomHud();
  setDpadVisible(false);
  stage.draggable(false);
  resetStageView();

  if (gridGroup.visible()) updateGrid();
  renderOverlay();
  mainLayer.draw();
};

document.getElementById("measureBtn").onclick = () => {
  if (!bgImage.image()) return;
  setMode("measuring");
  model.scalePoints = [];
  renderOverlay();
  lockPhoto(false);

document.getElementById("applyScaleBtn").onclick = () => {
  if (model.scalePoints.length < 2) return;

  const realMm = parseFloat(document.getElementById("realDistInput").value);
  if (!isFinite(realMm) || realMm <= 0) return;

  const p0 = model.scalePoints[0];
  const p1 = model.scalePoints[1];
  const distLocalPx = Math.hypot(p1.x - p0.x, p1.y - p0.y);
  if (distLocalPx <= 0.00001) return;

  mmPerLocalPx = realMm / distLocalPx;

  model.scalePoints = [];
  document.getElementById("measureInputArea").style.display = "none";
  setMode("idle");
  setStatus(`縮尺確定：${mmPerLocalPx.toFixed(4)} mm/px(図面)`, null);
  activePointKey = null;
  activePointNode = null;
  zoomLayer.visible(false);
  hideZoomHud();
  setDpadVisible(false);
  stage.draggable(false);
  resetStageView();

  if (gridGroup.visible()) updateGrid();
  renderOverlay();
  updateUiChips();
};

function bindClickOnce(elementId, key, handler) {
  const element = document.getElementById(elementId);
  if (!element) return;
  const attr = `bindOnce${key}`;
  if (element.dataset[attr] === "1") return;
  element.dataset[attr] = "1";
  element.addEventListener("click", handler);
}

bindClickOnce("pointPrevBtn", "PointPrev", () => {

});
bindClickOnce("pointNextBtn", "PointNext", () => {

document.getElementById("basePointBtn").onclick = () => {
  if (!gridGroup.visible()) { alert("先にグリッドを生成してください。"); return; }
  if (model.polyPoints.length < 3) { alert("先に施工範囲（ポリゴン）を完了してください。"); return; }

  setMode("settingBase");
  lockPhoto(true);
  stage.draggable(false);
  resetStageView();
  setDpadVisible(false);
  setStatus("基準点をタップ（交点スナップ）→ 下に寸法要約が出ます", null);
  showBaseMiniHud();

  if (model.basePoint) {
    renderOverlay();
    focusPointByKey("base:0");
    showBaseMiniHud();
  } else {
    renderOverlay();
    setBaseOnlyInteractivity();
  }
};

stage.on("pointerdown", (e) => {
  if (mode === "idle") return;
  if (pointDragging) return;
  if (zoomHudMode === "point" && activePointKey) return;

  const layer = e.target && e.target.getLayer && e.target.getLayer();
  if (layer === uiLayer || layer === zoomLayer) return;

  const isBackgroundTarget =
    e.target === bgImage ||
    e.target === stage ||
    isGridTargetNode(e.target);

  if (!isBackgroundTarget) return;

  const pos = getPointerPos(e);
  if (!pos) return;

  if (mode === "aligning") {
    if (model.alignPoints.length < 2) {
      model.alignPoints.push(stageToPhotoLocal(pos));
      armTapSuppression();
      renderOverlay();
    }
  } else if (mode === "measuring") {
    if (model.scalePoints.length < 2) {
      model.scalePoints.push(stageToPhotoLocal(pos));
      armTapSuppression();
      renderOverlay();
    }
  } else if (mode === "drawing") {
    saveUndoState("poly-add");
    model.polyPoints.push(stageToPhotoLocal(pos));
    armTapSuppression();
    renderOverlay();

    const newKey = makePointKey("poly", model.polyPoints.length - 1);
    focusPointByKey(newKey);
  } else if (mode === "polyAdjust") {
    const nearest = pickNearestPolyDot(pos);
    if (nearest) {
      armTapSuppression();
      enterPointAdjust(nearest);
    }
  } else if (mode === "settingBase") {
    saveUndoState("base-set");
    const snappedPos = snapToGrid(pos);
    model.basePoint = stageToPhotoLocal(snappedPos);
    armTapSuppression();
    baseInfoExpanded = false;
    activePointKey = null;
    activePointNode = null;
    setMode("idle");
    renderOverlay();
    setStatus("基準点 設置完了（要約表示）", null);
    zoomLayer.visible(false);
    setDpadVisible(false);
    stage.draggable(false);
    resetStageView();
    showBaseMiniHud();
  }
});

gridGroup.on("dragmove", () => {
  updateGrid();
  updateBaseDimsToPoly();
});

gridGroup.on("dragstart", () => {

});

};

window.addEventListener("resize", () => {
  stage.width(window.innerWidth);
  stage.height(window.innerHeight);

  if (bgImage.image()) {
    const topReserve = 132;
    const bottomReserve = 176;
    const source = bgImage.image();

    const usableW = stage.width();
    const usableH = Math.max(120, stage.height() - topReserve - bottomReserve);
    const sc = Math.min(usableW / source.width, usableH / source.height);

    const fittedW = source.width * sc;
    const fittedH = source.height * sc;

    const offsetX = (stage.width() - fittedW) / 2;
    const offsetY = topReserve + (usableH - fittedH) / 2 - 4;

    if (photoGroup.offsetX() || photoGroup.offsetY()) {
      const centerStage = { x: stage.width() / 2, y: stage.height() / 2 };
      const centerLocal = photoGroup.offset();
      photoGroup.scale({ x: sc, y: sc });
      photoGroup.position(centerStage);
      photoGroup.offset(centerLocal);
    } else {
      photoGroup.scale({ x: sc, y: sc });
      photoGroup.position({ x: offsetX, y: offsetY });
    }
  }

  if (gridGroup.visible()) {
    updateGrid();
    resnapBasePoint();
  }

  renderOverlay();
  applyStageView();
  mainLayer.draw();
  zoomLayer.draw();
});

document.addEventListener("gesturestart", (e) => e.preventDefault(), { passive: false });
document.addEventListener("gesturechange", (e) => e.preventDefault(), { passive: false });
document.addEventListener("gestureend", (e) => e.preventDefault(), { passive: false });
document.addEventListener("contextmenu", (e) => e.preventDefault());
document.addEventListener("selectstart", (e) => e.preventDefault());
document.addEventListener("dragstart", (e) => {
  const tag = (e.target && e.target.tagName) ? e.target.tagName.toLowerCase() : "";
  if (tag !== "input") e.preventDefault();
});

const menuBtn = document.getElementById("menuBtn");
const menuSheet = document.getElementById("menuSheet");
const estimateToggleBtn = document.getElementById("estimateToggleBtn");
const estimatePanel = document.getElementById("estimatePanel");
const stepTabs = document.querySelectorAll(".stepTab");
const sectionMap = {
  align: document.getElementById("sectionAlign"),
  measure: document.getElementById("sectionMeasure"),
  poly: document.getElementById("sectionPoly"),
  grid: document.getElementById("sectionGrid")
};


function setEstimatePanelOpen(open) {
  estimatePanel.style.display = open ? "block" : "none";
  estimateToggleBtn.classList.toggle("active", !!open);
}

estimateToggleBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  const next = estimatePanel.style.display !== "block";
  setEstimatePanelOpen(next);
  menuSheet.style.display = "none";
});

function setActiveSection(name){
  Object.entries(sectionMap).forEach(([key, el]) => {
    el.style.display = (key === name) ? "flex" : "none";
  });

  stepTabs.forEach(btn => {
    btn.classList.toggle("active", btn.dataset.step === name);
  });

  updateSectionLabel();
}

stepTabs.forEach(btn => {
  btn.addEventListener("click", () => setActiveSection(btn.dataset.step));
});

menuBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  setEstimatePanelOpen(false);
  menuSheet.style.display = menuSheet.style.display === "flex" ? "none" : "flex";
});

document.addEventListener("click", (e) => {
  if (!menuSheet.contains(e.target) && e.target !== menuBtn) {
    menuSheet.style.display = "none";
  }
  if (!estimatePanel.contains(e.target) && e.target !== estimateToggleBtn) {
    setEstimatePanelOpen(false);
  }
});

document.getElementById("openFileBtn").addEventListener("click", () => {
  document.getElementById("fileInput").click();
  menuSheet.style.display = "none";
});

document.getElementById("dangerToggleProxyBtn").addEventListener("click", () => {
  document.getElementById("dangerToggleBtn").click();
  menuSheet.style.display = "none";
});

document.getElementById("alignBtn").addEventListener("click", () => setActiveSection("align"));
document.getElementById("measureBtn").addEventListener("click", () => setActiveSection("measure"));
document.getElementById("polyBtn").addEventListener("click", () => setActiveSection("poly"));
document.getElementById("showGridBtn").addEventListener("click", () => setActiveSection("grid"));

lockPhoto(false);
setMode("idle");
setStatus("図面を読み込んで開始", "X左: -\nX右: -\nY上: -\nY下: -");
setDpadVisible(false);
hideZoomHud();
setActiveSection("align");
setEstimatePanelOpen(false);
setBaseInfoVisible(false);
updateUiChips();
syncDangerUi();
renderOverlay();

if (!hasSentAppOpen) {
  hasSentAppOpen = true;
  trackAppEvent("app_open", { app_variant: appVariant });
}
