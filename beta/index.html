<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>割付ポンッ！ - v3.4.6 clean</title>

  <script src="https://unpkg.com/konva@9/konva.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

  <style>
    :root{
      --bg:#0f1115;
      --glass:rgba(24,28,36,0.66);
      --glass-strong:rgba(28,32,42,0.88);
      --line:rgba(255,255,255,0.08);
      --text:#ffffff;
      --muted:rgba(255,255,255,0.68);
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
      --shadow:0 10px 28px rgba(0,0,0,0.22);
    }

    * {
      -webkit-tap-highlight-color: transparent;
      outline: none;
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Hiragino Sans", "Noto Sans JP", sans-serif;
      touch-action: none;
      overscroll-behavior: none;
      color: var(--text);
    }

    body {
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
      background:
        radial-gradient(circle at top right, rgba(10,132,255,0.14), transparent 26%),
        radial-gradient(circle at top left, rgba(139,92,246,0.10), transparent 20%),
        linear-gradient(180deg, #151922 0%, #0d1015 100%);
    }

    #container {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }

    .glass{
      background: var(--glass);
      backdrop-filter: blur(18px) saturate(1.15);
      -webkit-backdrop-filter: blur(18px) saturate(1.15);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .glassMini{
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(12px) saturate(1.1);
      -webkit-backdrop-filter: blur(12px) saturate(1.1);
    }

    #topBar{
      position: fixed;
      top: calc(8px + var(--safe-top));
      left: 10px;
      right: 10px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    #topMain{
      pointer-events: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      border-radius: 18px;
      padding: 8px 10px;
      min-height: 52px;
    }

    #brand{
      font-size: 15px;
      font-weight: 800;
      white-space: nowrap;
      padding: 0 4px;
    }

    #stepTabs{
      flex: 1;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    #stepTabs::-webkit-scrollbar{ display:none; }

    .stepTab{
      border: 0;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.78);
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .stepTab.active{
      background: #fff;
      color: #111827;
    }

    #menuBtn{
      width: 38px;
      height: 38px;
      border: 0;
      border-radius: 12px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 18px;
      font-weight: 900;
      flex: 0 0 auto;
    }

    #topSub{
      pointer-events: auto;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    #topSub::-webkit-scrollbar{ display:none; }

    .miniChip{
      border-radius: 999px;
      padding: 6px 10px;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.78);
      font-size: 11px;
      white-space: nowrap;
    }

    #menuSheet{
      position: fixed;
      top: calc(64px + var(--safe-top));
      right: 10px;
      z-index: 120;
      width: 220px;
      display: none;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      border-radius: 18px;
    }

    .menuItem{
      border: 0;
      border-radius: 14px;
      min-height: 42px;
      text-align: left;
      padding: 10px 12px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
    }

    #leftDock{
      position: fixed;
      left: 10px;
      bottom: calc(110px + var(--safe-bottom));
      z-index: 112;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
      max-width: calc(100vw - 120px);
    }

    #zoomHud{
      pointer-events: auto;
      display: none;
      gap: 8px;
      flex-wrap: wrap;
      padding: 8px;
      border-radius: 18px;
      touch-action: none;
      width: fit-content;
      max-width: calc(100vw - 120px);
    }

    #zoomHud button{
      border: 0;
      border-radius: 14px;
      min-width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-size: 18px;
      font-weight: 900;
      padding: 0 12px;
    }

    #zoomHud #pointDoneBtn,
    #zoomHud #gridReEditBtn{
      width: auto;
      font-size: 12px;
    }

    #dpad{
      position: fixed;
      right: 10px;
      left: auto;
      bottom: calc(110px + var(--safe-bottom));
      z-index: 113;
      pointer-events: auto;
      display: none;
      padding: 8px;
      border-radius: 20px;
      touch-action: none;
      width: fit-content;
      max-width: calc(100vw - 120px);
    }

    #dpad .pad{
      width: 144px;
      height: 144px;
      display: grid;
      grid-template-columns: 44px 44px 44px;
      grid-template-rows: 44px 44px 44px;
      gap: 6px;
      justify-content: center;
      align-content: center;
    }

    #dpad button{
      border: 0;
      border-radius: 14px;
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-size: 16px;
      font-weight: 900;
      min-width: 44px;
      min-height: 44px;
    }

    #dpad .center{
      font-size: 12px;
      background: rgba(255,255,255,0.18);
    }

    #statusBar {
      position: fixed;
      left: 10px;
      right: 10px;
      bottom: calc(86px + var(--safe-bottom));
      z-index: 80;
      background: rgba(0,0,0,0.34);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      color: #fff;
      padding: 8px 10px;
      font-size: 11px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      pointer-events: none;
    }

    #statusLeft { white-space: nowrap; overflow:hidden; text-overflow: ellipsis; }
    #statusRight { white-space: pre-wrap; line-height: 1.25; color: rgba(255,255,255,0.82); }

    #bottomBar{
      position: fixed;
      left: 10px;
      right: 10px;
      bottom: calc(8px + var(--safe-bottom));
      z-index: 90;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      border-radius: 20px;
      pointer-events: auto;
      max-height: 37vh;
      overflow-y: auto;
      overscroll-behavior: contain;
    }

    #baseSummaryBar{
      display:none;
      border-radius: 14px;
      padding: 0;
      overflow: hidden;
      flex: 0 0 auto;
    }

    #baseSummaryToggle{
      width: 100%;
      border: 0;
      background: transparent;
      color: #fff;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 12px;
      font-weight: 800;
    }

    #baseSummaryText{
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: left;
    }

    #baseSummaryArrow{
      flex: 0 0 auto;
      opacity: 0.82;
    }

    #bottomInfo{
      display: none;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      flex: 0 0 auto;
    }

    .infoMini{
      background: rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 8px 10px;
      min-height: 58px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .infoMiniLabel{
      font-size: 10px;
      color: var(--muted);
      font-weight: 700;
    }

    .infoMiniValue{
      font-size: 14px;
      font-weight: 800;
      color: #fff;
      line-height: 1.15;
    }

    .infoMiniSub{
      font-size: 10px;
      color: rgba(255,255,255,0.72);
      font-weight: 700;
      line-height: 1.2;
      margin-top: 4px;
    }

    #bottomActions{
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 0 0 auto;
    }

    #currentSectionLabel{
      font-size: 11px;
      color: var(--muted);
      font-weight: 700;
      padding-left: 2px;
    }

    .sectionCompact{
      display: none;
      flex-direction: column;
      gap: 8px;
    }

    .btn{
      border: 0;
      border-radius: 14px;
      min-height: 42px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 800;
      width: 100%;
      color: #fff;
      background: rgba(255,255,255,0.1);
    }

    .btn:active{ transform: scale(0.985); }

    .btn-purple { background: linear-gradient(180deg, #8b5cf6, #7c3aed); }
    .btn-green { background: linear-gradient(180deg, #22c55e, #16a34a); }
    .btn-orange { background: linear-gradient(180deg, #f59e0b, #ea580c); }
    .btn-red { background: linear-gradient(180deg, #ef4444, #dc2626); }
    .btn-dark { background: rgba(255,255,255,0.12); }
    .btn-black { background: rgba(255,255,255,0.12); }
    .btn-gray { background: rgba(255,255,255,0.12); }

    .actionGrid2{
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .row { display:flex; gap:6px; align-items:center; }

    input {
      width: 100%;
      padding: 10px 8px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 16px;
      min-height: 42px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      -webkit-user-select: text;
      user-select: text;
      -webkit-touch-callout: default;
    }

    label {
      font-size: 11px;
      font-weight: bold;
      display:block;
      margin-top:2px;
      color: var(--muted);
    }

    #legacyBindArea{
      position: fixed;
      width: 0;
      height: 0;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
    }

    @media (max-width: 430px){
      #bottomBar{
        max-height: 35vh;
      }
      .infoMini{
        min-height: 54px;
      }
      .infoMiniValue{
        font-size: 13px;
      }
      #zoomHud{
        max-width: calc(100vw - 130px);
      }
      #dpad{
        max-width: calc(100vw - 130px);
      }
    }
  </style>
</head>
<body>

  <div id="container"></div>

  <div id="topBar">
    <div id="topMain" class="glass">
      <div id="brand">割付ポン</div>

      <div id="stepTabs">
        <button class="stepTab active" data-step="align">水平</button>
        <button class="stepTab" data-step="measure">縮尺</button>
        <button class="stepTab" data-step="poly">範囲</button>
        <button class="stepTab" data-step="grid">グリッド</button>
      </div>

      <button id="menuBtn" type="button">⋯</button>
    </div>

    <div id="topSub">
      <div class="miniChip" id="chipFile">図面: 読込前</div>
      <div class="miniChip" id="chipScale">縮尺: 未確定</div>
      <div class="miniChip" id="chipPoly">範囲: 未完了</div>
    </div>
  </div>

  <div id="menuSheet" class="glass">
    <button class="menuItem" id="openFileBtn">図面を読み込む</button>
    <button class="menuItem" id="dangerToggleProxyBtn">危険小片 ON/OFF</button>
    <button class="menuItem" id="saveImageBtn">保存</button>
  </div>

  <div id="leftDock">
    <div id="zoomHud" class="glass">
      <button id="zoomInBtn">＋</button>
      <button id="zoomOutBtn">－</button>
      <button id="zoomResetBtn">⌂</button>
      <button id="pointDoneBtn">点調整完了</button>
      <button id="gridReEditBtn">グリッド再調整</button>
    </div>
  </div>

  <div id="dpad" class="glass" aria-label="微調整">
    <div class="pad">
      <div></div><button id="dUp">▲</button><div></div>
      <button id="dLeft">◀</button><button id="dCenter" class="center">5mm</button><button id="dRight">▶</button>
      <div></div><button id="dDown">▼</button><div></div>
    </div>
  </div>

  <div id="statusBar">
    <div id="statusLeft">図面を読み込んで開始</div>
    <div id="statusRight">X左: -\nX右: -\nY上: -\nY下: -</div>
  </div>

  <div id="bottomBar" class="glass">
    <div id="baseSummaryBar" class="glassMini" style="display:none;">
      <button id="baseSummaryToggle" type="button">
        <span id="baseSummaryText">基準点寸法: -</span>
        <span id="baseSummaryArrow">▼</span>
      </button>
    </div>

    <div id="bottomInfo">
      <div class="infoMini">
        <div class="infoMiniLabel">X左</div>
        <div class="infoMiniValue" id="baseXLmmOut">-</div>
        <div class="infoMiniSub" id="baseXLtileOut">-</div>
      </div>
      <div class="infoMini">
        <div class="infoMiniLabel">X右</div>
        <div class="infoMiniValue" id="baseXRmmOut">-</div>
        <div class="infoMiniSub" id="baseXRtileOut">-</div>
      </div>
      <div class="infoMini">
        <div class="infoMiniLabel">Y上</div>
        <div class="infoMiniValue" id="baseYUmmOut">-</div>
        <div class="infoMiniSub" id="baseYUtileOut">-</div>
      </div>
      <div class="infoMini">
        <div class="infoMiniLabel">Y下</div>
        <div class="infoMiniValue" id="baseYDmmOut">-</div>
        <div class="infoMiniSub" id="baseYDtileOut">-</div>
      </div>
    </div>

    <div id="bottomActions">
      <div id="currentSectionLabel">水平合わせ</div>

      <div id="sectionAlign" class="sectionCompact" style="display:flex;">
        <button class="btn btn-purple" id="alignBtn">1. 水平合わせ</button>
        <button class="btn btn-green" id="applyAlignBtn">確定</button>
      </div>

      <div id="sectionMeasure" class="sectionCompact">
        <button class="btn btn-dark" id="measureBtn">2. 縮尺合わせ</button>
        <label>実寸(mm)</label>
        <input type="number" id="realDistInput" value="1000" />
        <button class="btn btn-green" id="applyScaleBtn">確定</button>
      </div>

      <div id="sectionPoly" class="sectionCompact">
        <button class="btn btn-orange" id="polyBtn">3. 施工範囲指定</button>
        <div class="actionGrid2">
          <button class="btn btn-red" id="undoBtn">戻す</button>
          <button class="btn btn-green" id="closePolyBtn">完了</button>
        </div>
        <button class="btn btn-gray" id="polyEditBtn">✏️ 範囲調整</button>
        <button class="btn btn-green" id="polyEditDoneBtn" style="display:none;">✅ 調整完了</button>
      </div>

      <div id="sectionGrid" class="sectionCompact">
        <label>タイル(mm)</label>
        <div class="row">
          <input type="number" id="tileWidthInput" value="300" />
          <input type="number" id="tileHeightInput" value="300" />
        </div>
        <button class="btn btn-green" id="showGridBtn">4. グリッド生成</button>
        <button class="btn btn-dark" id="confirmGridBtn">5. グリッド確定</button>
        <button class="btn btn-purple" id="optBtn">🎯 最適割付</button>
        <button class="btn btn-dark" id="basePointBtn">6. 基準点</button>
      </div>
    </div>
  </div>

  <div id="legacyBindArea">
    <input type="file" id="fileInput" accept="image/*,.pdf" />
    <div id="alignInputArea" style="display:none;"></div>
    <div id="measureInputArea" style="display:none;"></div>
    <div id="polyControls" style="display:none;"></div>
    <button id="lockBtn">図面ロック：OFF</button>
    <button id="dangerToggleBtn">危険小片：ON</button>
    <input type="number" id="dangerMmInput" value="100" />
  </div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js";

const GRID_MARGIN_TILES = 6;
const GRID_MAX_CELLS = 80000;
const BASE_INTERSECT_EPS = 0.5;
const STROKE_THIN = 1.5;
const STROKE_GRID = 0.6;
const CROSS_HALF = 18;
const DOT_RADIUS = 5;
const HIT_RADIUS = 42;

const DRAG_THRESHOLD_PX = 4;
const POINT_STEP_FINE = 0.5;
const POINT_STEP_COARSE = 1;
const SNAP_STAGE_PX = 12;
const AXIS_SNAP_STAGE_PX = 10;
const GRID_SNAP_STAGE_PX = 14;
const REPEAT_DELAY = 260;
const REPEAT_INTERVAL = 42;
const POSITION_ROUND_UNIT = 0.25;
const POLY_OVERLAP_MIN_PX = 10;
const TAP_SUPPRESS_MS = 120;

const stage = new Konva.Stage({
  container: "container",
  width: window.innerWidth,
  height: window.innerHeight
});

const mainLayer = new Konva.Layer();
const uiLayer = new Konva.Layer();
const zoomLayer = new Konva.Layer({ visible: false, listening: false });

const photoGroup = new Konva.Group({ draggable: true });
const bgImage = new Konva.Image({ listening: true });
const gridGroup = new Konva.Group({ draggable: false, visible: false });

const polyShape = new Konva.Line({
  stroke: "#fd7e14",
  strokeWidth: STROKE_THIN,
  fill: "rgba(253, 126, 20, 0.2)",
  closed: true,
  points: [],
  listening: false
});
const alignLine = new Konva.Line({
  stroke: "#6f42c1",
  strokeWidth: STROKE_THIN,
  dash: [5, 5],
  visible: false,
  listening: false
});
const scaleLine = new Konva.Line({
  stroke: "red",
  strokeWidth: STROKE_THIN,
  dash: [4, 4],
  visible: false,
  listening: false
});

const zoomGroup = new Konva.Group({ listening: false });
const zoomContent = new Konva.Image({ listening: false });
zoomGroup.add(
  new Konva.Circle({ radius: 85, stroke: "#fff", strokeWidth: 2, fill: "#000", listening: false }),
  zoomContent
);
zoomGroup.add(
  new Konva.Line({ points: [-20, 0, 20, 0], stroke: "#0f0", strokeWidth: 2, listening: false }),
  new Konva.Line({ points: [0, -20, 0, 20], stroke: "#0f0", strokeWidth: 2, listening: false })
);
zoomLayer.add(zoomGroup);

photoGroup.add(bgImage);
mainLayer.add(photoGroup, gridGroup);
uiLayer.add(polyShape, alignLine, scaleLine);
stage.add(mainLayer, uiLayer, zoomLayer);

let mode = "idle";
let mmPerLocalPx = 0;
let photoLocked = false;
let dangerOn = true;
let lastTileStageW = 0;
let lastTileStageH = 0;
let gridConfirmed = false;
let stageScale = 1;
let stagePos = { x: 0, y: 0 };
let zoomHudMode = "hidden";
let dpadMode = "grid";
let nudgeMm = 5;
let pointStepPx = POINT_STEP_FINE;
let activePoint = null;
let pointDragging = false;
let suppressNextTap = false;
let suppressTapTimer = null;
let lastSnapInfo = "";
let dpadRepeatTimer = null;
let dpadRepeatInterval = null;
let baseInfoExpanded = false;

const statusLeft = document.getElementById("statusLeft");
const statusRight = document.getElementById("statusRight");
const zoomHud = document.getElementById("zoomHud");

const baseSummaryBar = document.getElementById("baseSummaryBar");
const baseSummaryToggle = document.getElementById("baseSummaryToggle");
const baseSummaryText = document.getElementById("baseSummaryText");
const baseSummaryArrow = document.getElementById("baseSummaryArrow");
const bottomInfo = document.getElementById("bottomInfo");

function armTapSuppression(ms = TAP_SUPPRESS_MS) {
  suppressNextTap = true;
  if (suppressTapTimer) clearTimeout(suppressTapTimer);
  suppressTapTimer = setTimeout(() => {
    suppressNextTap = false;
    suppressTapTimer = null;
  }, ms);
}

function setStatus(left, right) {
  if (left != null) statusLeft.textContent = left;
  if (right != null) statusRight.textContent = right;
}

function setBaseInfoVisible(hasBase) {
  baseSummaryBar.style.display = hasBase ? "block" : "none";
  bottomInfo.style.display = (hasBase && baseInfoExpanded) ? "grid" : "none";
  baseSummaryArrow.textContent = baseInfoExpanded ? "▲" : "▼";
}

baseSummaryToggle.addEventListener("click", () => {
  const hasBase = !!uiLayer.findOne(".baseDot");
  if (!hasBase) return;
  baseInfoExpanded = !baseInfoExpanded;
  setBaseInfoVisible(true);
});

function updateUiChips() {
  document.getElementById("chipFile").textContent = bgImage.image() ? "図面: 読込済み" : "図面: 読込前";
  document.getElementById("chipScale").textContent = mmPerLocalPx ? `縮尺: ${mmPerLocalPx.toFixed(3)} mm/px` : "縮尺: 未確定";
  document.getElementById("chipPoly").textContent = polyShape.points().length >= 6 ? "範囲: 完了" : "範囲: 未完了";
}

function lockPhoto(lock) {
  photoLocked = !!lock;
  photoGroup.draggable(!photoLocked);
  bgImage.listening(!photoLocked);
  document.getElementById("lockBtn").textContent = "図面ロック：" + (photoLocked ? "ON" : "OFF");
}

function updateSectionLabel() {
  const labelMap = {
    align: "水平合わせ",
    measure: "縮尺合わせ",
    poly: "施工範囲指定",
    grid: "グリッド / 基準点"
  };
  const activeTab = document.querySelector(".stepTab.active");
  const label = activeTab ? labelMap[activeTab.dataset.step] : "水平合わせ";
  document.getElementById("currentSectionLabel").textContent = label;
}

function setMode(next) {
  mode = next;
  const label = {
    idle:"待機",
    aligning:"水平合わせ（2点）",
    measuring:"縮尺合わせ（2点）",
    drawing:"施工範囲指定（点追加/ドラッグ）",
    polyAdjust:"範囲調整（点ドラッグ）",
    gridAdjust:"グリッド調整（グリッドドラッグ＋十字キー）",
    settingBase:"基準点（交点スナップ）"
  }[mode] || mode;
  setStatus("工程: " + label, null);
}

function getPhotoLocalPoint(stagePoint) {
  const inv = photoGroup.getAbsoluteTransform().copy().invert();
  return inv.point(stagePoint);
}

function stagePxToMmX(px) {
  if (!mmPerLocalPx) return 0;
  const sx = photoGroup.scaleX() || 1;
  return (px / sx) * mmPerLocalPx;
}

function stagePxToMmY(px) {
  if (!mmPerLocalPx) return 0;
  const sy = photoGroup.scaleY() || 1;
  return (px / sy) * mmPerLocalPx;
}

function roundToUnit(v, unit = POSITION_ROUND_UNIT) {
  return Math.round(v / unit) * unit;
}

function getStageSpaceThreshold(px) {
  return px / (stageScale || 1);
}

function distance2(a, b) {
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  return dx * dx + dy * dy;
}

function updateZoom(pos) {
  if (!bgImage.image()) return;

  zoomLayer.visible(true);

  let zX = pos.x;
  let zY = pos.y - 140;
  if (zX < 90) zX = 90;
  if (zX > stage.width() - 90) zX = stage.width() - 90;
  if (zY < 90) zY = pos.y + 140;

  zoomGroup.position({ x: zX, y: zY });

  const localPos = getPhotoLocalPoint(pos);
  const mag = 4.5;

  zoomContent.image(bgImage.image());
  zoomContent.width(bgImage.image().width);
  zoomContent.height(bgImage.image().height);
  zoomContent.scale({ x: photoGroup.scaleX() * mag, y: photoGroup.scaleY() * mag });
  zoomContent.rotation(photoGroup.rotation());
  zoomContent.position({
    x: -localPos.x * photoGroup.scaleX() * mag,
    y: -localPos.y * photoGroup.scaleY() * mag
  });
  zoomContent.clipFunc((ctx) => {
    ctx.arc(
      localPos.x * photoGroup.scaleX() * mag,
      localPos.y * photoGroup.scaleY() * mag,
      85, 0, Math.PI * 2
    );
  });

  zoomLayer.batchDraw();
}

function destroyDots(name) {
  uiLayer.find("." + name).forEach((d) => d.destroy());
  uiLayer.draw();
}

function syncPoly() {
  const dots = uiLayer.find(".polyDot");
  const pts = [];
  dots.forEach((d) => pts.push(d.x(), d.y()));
  polyShape.points(pts);
  uiLayer.batchDraw();
  updateBaseDimsToPoly();
  updateUiChips();
}

function setPolyDotsDraggable(on) {
  uiLayer.find(".polyDot").forEach(d => d.draggable(!!on));
}

function snapToGrid(stagePos) {
  if (!gridGroup.visible() || !lastTileStageW || !lastTileStageH) return stagePos;
  const localX = stagePos.x - gridGroup.x();
  const localY = stagePos.y - gridGroup.y();
  const snapX = Math.round(localX / lastTileStageW) * lastTileStageW;
  const snapY = Math.round(localY / lastTileStageH) * lastTileStageH;
  return { x: gridGroup.x() + snapX, y: gridGroup.y() + snapY };
}

function resnapBaseDot() {
  const base = uiLayer.findOne(".baseDot");
  if (!base) return;
  const s = snapToGrid({ x: base.x(), y: base.y() });
  base.position(s);
  uiLayer.draw();
  updateBaseDimsToPoly();
}

function getNearbyPoints(excludeNode, classNameList = [".polyDot", ".alignDot", ".scaleDot", ".baseDot"]) {
  const arr = [];
  classNameList.forEach(sel => {
    uiLayer.find(sel).forEach(n => {
      if (n !== excludeNode) arr.push(n);
    });
  });
  return arr;
}

function getPolyNeighborDots(node) {
  const dots = uiLayer.find(".polyDot");
  const idx = dots.indexOf(node);
  if (idx < 0) return [];
  const result = [];
  if (dots[idx - 1]) result.push(dots[idx - 1]);
  if (dots[idx + 1]) result.push(dots[idx + 1]);
  if (dots.length > 2 && idx === 0) result.push(dots[dots.length - 1]);
  if (dots.length > 2 && idx === dots.length - 1) result.push(dots[0]);
  return result;
}

function applySmartSnap(node, proposedPos, dotName) {
  let p = { x: roundToUnit(proposedPos.x), y: roundToUnit(proposedPos.y) };
  const snapDist = getStageSpaceThreshold(SNAP_STAGE_PX);
  const axisDist = getStageSpaceThreshold(AXIS_SNAP_STAGE_PX);
  const gridSnapDist = getStageSpaceThreshold(GRID_SNAP_STAGE_PX);

  let snapMsg = "";

  if (dotName === "baseDot" && gridGroup.visible() && lastTileStageW && lastTileStageH) {
    const g = snapToGrid(p);
    if (Math.hypot(g.x - p.x, g.y - p.y) <= gridSnapDist * 1.5) {
      p = g;
      snapMsg = "基準点: グリッド交点吸着";
    }
  }

  if (dotName === "alignDot" || dotName === "scaleDot") {
    if (gridGroup.visible()) {
      const g = snapToGrid(p);
      if (Math.hypot(g.x - p.x, g.y - p.y) <= gridSnapDist) {
        p = g;
        snapMsg = "交点吸着";
      }
    }

    const nearby = getNearbyPoints(node, [".alignDot", ".scaleDot", ".baseDot"]);
    let nearest = null;
    let nearestD2 = Infinity;
    nearby.forEach(n => {
      const d2 = distance2({ x: n.x(), y: n.y() }, p);
      if (d2 < nearestD2) {
        nearestD2 = d2;
        nearest = n;
      }
    });
    if (nearest && nearestD2 <= snapDist * snapDist) {
      p.x = nearest.x();
      p.y = nearest.y();
      snapMsg = snapMsg || "近接点吸着";
    }
  }

  if (dotName === "polyDot") {
    if (gridGroup.visible()) {
      const g = snapToGrid(p);
      if (Math.hypot(g.x - p.x, g.y - p.y) <= gridSnapDist) {
        p = g;
        snapMsg = "交点吸着";
      }
    }

    const neighbors = getPolyNeighborDots(node);
    neighbors.forEach(n => {
      if (Math.abs(p.x - n.x()) <= axisDist) {
        p.x = n.x();
        snapMsg = snapMsg || "縦ライン吸着";
      }
      if (Math.abs(p.y - n.y()) <= axisDist) {
        p.y = n.y();
        snapMsg = snapMsg || "横ライン吸着";
      }
    });

    const allPoly = uiLayer.find(".polyDot");
    const minGap = getStageSpaceThreshold(POLY_OVERLAP_MIN_PX);

    for (const other of allPoly) {
      if (other === node) continue;
      const dx = p.x - other.x();
      const dy = p.y - other.y();
      const d = Math.hypot(dx, dy);

      if (d < minGap) {
        if (d < 0.0001) {
          p.x += minGap;
        } else {
          const ratio = minGap / d;
          p.x = other.x() + dx * ratio;
          p.y = other.y() + dy * ratio;
        }
        snapMsg = snapMsg || "点重なり防止";
      }
    }
  }

  lastSnapInfo = snapMsg;
  return p;
}

function compensateUiScale() {
  const inv = 1 / (stageScale || 1);
  const allDots = [
    ...uiLayer.find(".alignDot"),
    ...uiLayer.find(".scaleDot"),
    ...uiLayer.find(".polyDot"),
    ...uiLayer.find(".baseDot")
  ];
  allDots.forEach((g) => {
    const hitCircle = g.findOne(".hitCircle");
    const crossH = g.findOne(".crossH");
    const crossV = g.findOne(".crossV");
    const dotCore = g.findOne(".dotCore");

    if (hitCircle) hitCircle.radius(HIT_RADIUS * inv);
    if (crossH) {
      crossH.points([-CROSS_HALF * inv, 0, CROSS_HALF * inv, 0]);
      crossH.strokeWidth(Math.max(1, STROKE_THIN * inv));
    }
    if (crossV) {
      crossV.points([0, -CROSS_HALF * inv, 0, CROSS_HALF * inv]);
      crossV.strokeWidth(Math.max(1, STROKE_THIN * inv));
    }
    if (dotCore) {
      dotCore.radius(Math.max(2.2, DOT_RADIUS * inv));
      dotCore.strokeWidth(Math.max(0.8, 1 * inv));
    }
  });

  polyShape.strokeWidth(Math.max(1, STROKE_THIN * inv));
  alignLine.strokeWidth(Math.max(1, STROKE_THIN * inv));
  scaleLine.strokeWidth(Math.max(1, STROKE_THIN * inv));
  uiLayer.batchDraw();
}

function applyStageView() {
  stage.scale({ x: stageScale, y: stageScale });
  stage.position(stagePos);
  compensateUiScale();
  stage.batchDraw();
}

function resetStageView() {
  stageScale = 1;
  stagePos = { x: 0, y: 0 };
  applyStageView();
}

function setOnlyActivePointInteractive(target) {
  const allDots = [
    ...uiLayer.find(".alignDot"),
    ...uiLayer.find(".scaleDot"),
    ...uiLayer.find(".polyDot"),
    ...uiLayer.find(".baseDot")
  ];

  allDots.forEach((g) => {
    const isActive = g === target;
    g.listening(isActive);
    g.draggable(isActive);
    const hitCircle = g.findOne(".hitCircle");
    if (hitCircle) hitCircle.listening(isActive);
  });

  uiLayer.draw();
}

function restoreAllPointInteractivity() {
  uiLayer.find(".alignDot").forEach((g) => {
    g.listening(true);
    g.draggable(true);
    const hitCircle = g.findOne(".hitCircle");
    if (hitCircle) hitCircle.listening(true);
  });

  uiLayer.find(".scaleDot").forEach((g) => {
    g.listening(true);
    g.draggable(true);
    const hitCircle = g.findOne(".hitCircle");
    if (hitCircle) hitCircle.listening(true);
  });

  uiLayer.find(".polyDot").forEach((g) => {
    g.listening(true);
    g.draggable(mode === "drawing" || mode === "polyAdjust");
    const hitCircle = g.findOne(".hitCircle");
    if (hitCircle) hitCircle.listening(true);
  });

  uiLayer.find(".baseDot").forEach((g) => {
    g.listening(true);
    g.draggable(true);
    const hitCircle = g.findOne(".hitCircle");
    if (hitCircle) hitCircle.listening(true);
  });

  uiLayer.draw();
}

function showZoomHud(modeName) {
  zoomHudMode = modeName;
  zoomHud.style.display = "flex";
  document.getElementById("gridReEditBtn").style.display = (modeName === "grid") ? "inline-block" : "none";
  document.getElementById("pointDoneBtn").style.display = (modeName === "point") ? "inline-block" : "none";
}

function hideZoomHud() {
  zoomHudMode = "hidden";
  zoomHud.style.display = "none";
}

function zoomAroundCenter(factor) {
  const oldScale = stageScale;
  let newScale = Math.max(1, Math.min(6, oldScale * factor));
  const cx = stage.width() / 2;
  const cy = stage.height() / 2;
  const worldPoint = { x: (cx - stagePos.x) / oldScale, y: (cy - stagePos.y) / oldScale };
  stageScale = newScale;
  stagePos = {
    x: cx - worldPoint.x * stageScale,
    y: cy - worldPoint.y * stageScale
  };
  applyStageView();
}

function enterPointAdjust(targetPoint) {
  activePoint = targetPoint;
  dpadMode = "point";
  setOnlyActivePointInteractive(targetPoint);
  setDpadVisible(true);
  showZoomHud("point");
  stage.draggable(false);

  if (activePoint) {
    activePoint.draggable(true);
    updateZoom(activePoint.position());
  }

  document.getElementById("dCenter").textContent = `${pointStepPx}px`;
}

function exitPointAdjust() {
  activePoint = null;
  dpadMode = "grid";
  restoreAllPointInteractivity();
  zoomLayer.visible(false);
  hideZoomHud();
  setDpadVisible(false);
  stage.draggable(false);
  resetStageView();
  uiLayer.draw();
}

function updateAssistStatus() {
  if (!lastSnapInfo) return;
  const current = statusLeft.textContent || "";
  if (current.includes("吸着")) return;
  setStatus(current + " / " + lastSnapInfo, null);
}

function createPoint(pos, color, dotName, { snapOnCreate = false, snapOnDragEnd = false } = {}) {
  const p0 = snapOnCreate ? snapToGrid(pos) : pos;

  const g = new Konva.Group({
    x: p0.x,
    y: p0.y,
    draggable: true,
    name: dotName,
    dragDistance: DRAG_THRESHOLD_PX
  });

  g.dragBoundFunc((rawPos) => {
    return applySmartSnap(g, rawPos, dotName);
  });

  g.add(new Konva.Circle({
    radius: HIT_RADIUS,
    fill: "transparent",
    listening: true,
    name: "hitCircle"
  }));

  g.add(new Konva.Line({
    points: [-CROSS_HALF, 0, CROSS_HALF, 0],
    stroke: color,
    strokeWidth: STROKE_THIN,
    listening: false,
    name: "crossH"
  }));

  g.add(new Konva.Line({
    points: [0, -CROSS_HALF, 0, CROSS_HALF],
    stroke: color,
    strokeWidth: STROKE_THIN,
    listening: false,
    name: "crossV"
  }));

  g.add(new Konva.Circle({
    radius: DOT_RADIUS,
    fill: color,
    stroke: "#fff",
    strokeWidth: 1,
    listening: false,
    name: "dotCore"
  }));

  g.on("tap", (e) => {
    e.cancelBubble = true;
    if (suppressNextTap) return;
    if (dotName === "baseDot") return;
    if (zoomHudMode === "point" && activePoint && activePoint !== g) return;
    enterPointAdjust(g);
  });

  g.on("touchstart mousedown", (e) => {
    e.cancelBubble = true;
    stage.draggable(false);
  });

  g.on("dragstart", (e) => {
    e.cancelBubble = true;
    pointDragging = true;
    armTapSuppression();
    lastSnapInfo = "";

    if (dotName === "polyDot") {
      if (activePoint !== g) enterPointAdjust(g);
      updateZoom(g.position());
    } else if (activePoint === g && zoomHudMode === "point") {
      updateZoom(g.position());
    }
  });

  g.on("dragmove", () => {
    updateAssistStatus();

    if (dotName === "polyDot") syncPoly();
    if (dotName === "baseDot") updateBaseDimsToPoly();

    if (dotName === "alignDot") {
      const dots = uiLayer.find(".alignDot");
      if (dots.length === 2) {
        alignLine.points([dots[0].x(), dots[0].y(), dots[1].x(), dots[1].y()]);
        alignLine.visible(true);
      }
    }

    if (dotName === "scaleDot") {
      const dots = uiLayer.find(".scaleDot");
      if (dots.length === 2) {
        scaleLine.points([dots[0].x(), dots[0].y(), dots[1].x(), dots[1].y()]);
        scaleLine.visible(true);
      }
    }

    if (zoomHudMode === "point" && activePoint === g) {
      updateZoom(g.position());
    }
  });

  g.on("dragend", () => {
    pointDragging = false;
    armTapSuppression();

    if (snapOnDragEnd) {
      g.position(snapToGrid({ x: g.x(), y: g.y() }));
    } else {
      g.position({
        x: roundToUnit(g.x()),
        y: roundToUnit(g.y())
      });
    }

    if (dotName === "polyDot") syncPoly();
    if (dotName === "baseDot") updateBaseDimsToPoly();

    if (zoomHudMode === "point" && activePoint === g) {
      updateZoom(g.position());
    }

    updateAssistStatus();
    uiLayer.draw();
  });

  uiLayer.add(g);
  compensateUiScale();
  return g;
}

function intersectionsWithHorizontalLine(poly, y0) {
  const n = poly.length / 2;
  const xs = [];
  for (let i = 0; i < n; i++) {
    const j = (i + 1) % n;
    const x1 = poly[i * 2], y1 = poly[i * 2 + 1], x2 = poly[j * 2], y2 = poly[j * 2 + 1];
    if (Math.abs(y2 - y1) < 1e-9) continue;
    const minY = Math.min(y1, y2), maxY = Math.max(y1, y2);
    if (y0 < minY || y0 >= maxY) continue;
    const t = (y0 - y1) / (y2 - y1);
    xs.push(x1 + (x2 - x1) * t);
  }
  xs.sort((a,b)=>a-b);
  return xs;
}

function intersectionsWithVerticalLine(poly, x0) {
  const n = poly.length / 2;
  const ys = [];
  for (let i = 0; i < n; i++) {
    const j = (i + 1) % n;
    const x1 = poly[i * 2], y1 = poly[i * 2 + 1], x2 = poly[j * 2], y2 = poly[j * 2 + 1];
    if (Math.abs(x2 - x1) < 1e-9) continue;
    const minX = Math.min(x1, x2), maxX = Math.max(x1, x2);
    if (x0 < minX || x0 >= maxX) continue;
    const t = (x0 - x1) / (x2 - x1);
    ys.push(y1 + (y2 - y1) * t);
  }
  ys.sort((a,b)=>a-b);
  return ys;
}

function maxLessThan(arr, v) {
  let best = null;
  for (const a of arr) if (a < v && (best == null || a > best)) best = a;
  return best;
}

function minGreaterThan(arr, v) {
  let best = null;
  for (const a of arr) if (a > v && (best == null || a < best)) best = a;
  return best;
}

function updateBaseDimsToPoly() {
  const base = uiLayer.findOne(".baseDot");
  const poly = polyShape.points();

  const baseXLmmOut = document.getElementById("baseXLmmOut");
  const baseXRmmOut = document.getElementById("baseXRmmOut");
  const baseYUmmOut = document.getElementById("baseYUmmOut");
  const baseYDmmOut = document.getElementById("baseYDmmOut");
  const baseXLtileOut = document.getElementById("baseXLtileOut");
  const baseXRtileOut = document.getElementById("baseXRtileOut");
  const baseYUtileOut = document.getElementById("baseYUtileOut");
  const baseYDtileOut = document.getElementById("baseYDtileOut");

  const setEmpty = () => {
    baseXLmmOut.textContent = "-";
    baseXRmmOut.textContent = "-";
    baseYUmmOut.textContent = "-";
    baseYDmmOut.textContent = "-";
    baseXLtileOut.textContent = "-";
    baseXRtileOut.textContent = "-";
    baseYUtileOut.textContent = "-";
    baseYDtileOut.textContent = "-";
    baseSummaryText.textContent = "基準点寸法: -";
  };

  if (!base || !mmPerLocalPx || !gridGroup.visible() || poly.length < 6) {
    setStatus(null, "X左: -\nX右: -\nY上: -\nY下: -");
    setEmpty();
    setBaseInfoVisible(false);
    return;
  }

  const bx = base.x();
  const by = base.y();
  const eps = BASE_INTERSECT_EPS;

  const xs = [
    ...intersectionsWithHorizontalLine(poly, by + eps),
    ...intersectionsWithHorizontalLine(poly, by - eps)
  ];
  const ys = [
    ...intersectionsWithVerticalLine(poly, bx + eps),
    ...intersectionsWithVerticalLine(poly, bx - eps)
  ];

  const uniq = (arr) => Array.from(new Set(arr.map(v => Math.round(v * 1000) / 1000))).sort((a,b)=>a-b);
  const xsU = uniq(xs);
  const ysU = uniq(ys);

  const leftX = maxLessThan(xsU, bx);
  const rightX = minGreaterThan(xsU, bx);
  const upY = maxLessThan(ysU, by);
  const downY = minGreaterThan(ysU, by);

  const dxL = (leftX == null) ? null : (bx - leftX);
  const dxR = (rightX == null) ? null : (rightX - bx);
  const dyU = (upY == null) ? null : (by - upY);
  const dyD = (downY == null) ? null : (downY - by);

  const xLmm = dxL == null ? null : Math.abs(stagePxToMmX(dxL));
  const xRmm = dxR == null ? null : Math.abs(stagePxToMmX(dxR));
  const yUmm = dyU == null ? null : Math.abs(stagePxToMmY(dyU));
  const yDmm = dyD == null ? null : Math.abs(stagePxToMmY(dyD));

  const twMm = parseFloat(document.getElementById("tileWidthInput").value);
  const thMm = parseFloat(document.getElementById("tileHeightInput").value);

  const fmtMm = (v) => (v == null || !isFinite(v)) ? "-" : `${v.toFixed(1)}mm`;
  const fmtTile = (v, tile) => {
    if (v == null || !isFinite(v) || tile == null || !isFinite(tile) || tile <= 0) return "-";
    const n = Math.floor(v / tile + 1e-9);
    const rem = Math.max(0, v - n * tile);
    return `${n}枚 + ${rem.toFixed(1)}mm`;
  };

  baseXLmmOut.textContent = fmtMm(xLmm);
  baseXRmmOut.textContent = fmtMm(xRmm);
  baseYUmmOut.textContent = fmtMm(yUmm);
  baseYDmmOut.textContent = fmtMm(yDmm);

  baseXLtileOut.textContent = fmtTile(xLmm, twMm);
  baseXRtileOut.textContent = fmtTile(xRmm, twMm);
  baseYUtileOut.textContent = fmtTile(yUmm, thMm);
  baseYDtileOut.textContent = fmtTile(yDmm, thMm);

  baseSummaryText.textContent =
    `X左 ${fmtMm(xLmm)} / X右 ${fmtMm(xRmm)} / Y上 ${fmtMm(yUmm)} / Y下 ${fmtMm(yDmm)}`;

  const fmt2 = (v, tile) => {
    if (v == null || !isFinite(v) || !isFinite(tile) || tile <= 0) return "-";
    const n = Math.floor(v / tile + 1e-9);
    const rem = Math.max(0, v - n * tile);
    return `${v.toFixed(1)}mm （${n}枚 + ${rem.toFixed(1)}mm）`;
  };

  setStatus(
    null,
    `X左: ${fmt2(xLmm, twMm)}\nX右: ${fmt2(xRmm, twMm)}\nY上: ${fmt2(yUmm, thMm)}\nY下: ${fmt2(yDmm, thMm)}`
  );

  setBaseInfoVisible(true);
}

function clipPolygonToRect(polyPts, rx0, ry0, rx1, ry1) {
  let output = polyPts;
  const edges = [
    { inside: (p) => p.x >= rx0, intersect: (a,b) => intersectWithVertical(a,b,rx0) },
    { inside: (p) => p.x <= rx1, intersect: (a,b) => intersectWithVertical(a,b,rx1) },
    { inside: (p) => p.y >= ry0, intersect: (a,b) => intersectWithHorizontal(a,b,ry0) },
    { inside: (p) => p.y <= ry1, intersect: (a,b) => intersectWithHorizontal(a,b,ry1) },
  ];

  for (const edge of edges) {
    const input = output;
    output = [];
    if (!input || input.length === 0) break;
    let S = input[input.length - 1];
    for (const E of input) {
      const Ein = edge.inside(E);
      const Sin = edge.inside(S);
      if (Ein) {
        if (!Sin) output.push(edge.intersect(S, E));
        output.push(E);
      } else if (Sin) {
        output.push(edge.intersect(S, E));
      }
      S = E;
    }
  }
  return output;

  function intersectWithVertical(a,b,x){
    const dx=b.x-a.x;
    if (Math.abs(dx)<1e-9) return {x,y:a.y};
    const t=(x-a.x)/dx;
    return {x,y:a.y+(b.y-a.y)*t};
  }

  function intersectWithHorizontal(a,b,y){
    const dy=b.y-a.y;
    if (Math.abs(dy)<1e-9) return {x:a.x,y};
    const t=(y-a.y)/dy;
    return {x:a.x+(b.x-a.x)*t,y};
  }
}

function getBBoxOfPoints(pts) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const p of pts) {
    if (p.x < minX) minX = p.x;
    if (p.y < minY) minY = p.y;
    if (p.x > maxX) maxX = p.x;
    if (p.y > maxY) maxY = p.y;
  }
  if (!isFinite(minX)) return null;
  return { minX, minY, maxX, maxY };
}

function isPointInPoly(x, y, poly) {
  let inside = false;
  const n = poly.length / 2;
  for (let i = 0, j = n - 1; i < n; j = i++) {
    const xi = poly[i*2], yi = poly[i*2+1], xj = poly[j*2], yj = poly[j*2+1];
    const intersect = (yi > y) !== (yj > y) && x < ((xj - xi) * (y - yi)) / (yj - yi + 0.0) + xi;
    if (intersect) inside = !inside;
  }
  return inside;
}

function getPolyBounds(poly) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (let i = 0; i < poly.length; i += 2) {
    const x = poly[i];
    const y = poly[i+1];
    if (x < minX) minX = x;
    if (y < minY) minY = y;
    if (x > maxX) maxX = x;
    if (y > maxY) maxY = y;
  }
  return { minX, minY, maxX, maxY };
}

function updateGrid() {
  if (!mmPerLocalPx) return;
  const poly = polyShape.points();
  if (poly.length < 6) return;

  const twMm = parseFloat(document.getElementById("tileWidthInput").value);
  const thMm = parseFloat(document.getElementById("tileHeightInput").value);
  if (!isFinite(twMm) || !isFinite(thMm) || twMm <= 0 || thMm <= 0) return;

  const dangerMm = Math.max(0, parseFloat(document.getElementById("dangerMmInput").value || "0"));
  const tileLocalW = twMm / mmPerLocalPx;
  const tileLocalH = thMm / mmPerLocalPx;
  const tileStageW = tileLocalW * (photoGroup.scaleX() || 1);
  const tileStageH = tileLocalH * (photoGroup.scaleY() || 1);
  if (!isFinite(tileStageW) || !isFinite(tileStageH) || tileStageW <= 0 || tileStageH <= 0) return;

  lastTileStageW = tileStageW;
  lastTileStageH = tileStageH;

  gridGroup.destroyChildren();

  const b = getPolyBounds(poly);
  const gx = gridGroup.x();
  const gy = gridGroup.y();

  const iMin = Math.floor((b.minX - gx) / tileStageW) - GRID_MARGIN_TILES;
  const iMax = Math.ceil((b.maxX - gx) / tileStageW) + GRID_MARGIN_TILES;
  const jMin = Math.floor((b.minY - gy) / tileStageH) - GRID_MARGIN_TILES;
  const jMax = Math.ceil((b.maxY - gy) / tileStageH) + GRID_MARGIN_TILES;

  const cells = (iMax - iMin + 1) * (jMax - jMin + 1);
  if (cells > GRID_MAX_CELLS) {
    alert(`グリッドが細かすぎます（cells=${cells}）。タイル寸法/縮尺/範囲を見直してください。`);
    return;
  }

  gridGroup.add(new Konva.Rect({
    x:iMin*tileStageW,
    y:jMin*tileStageH,
    width:(iMax-iMin+1)*tileStageW,
    height:(jMax-jMin+1)*tileStageH,
    fill:"rgba(0,0,0,0)",
    listening:true
  }));

  const polyObj = [];
  for (let k = 0; k < poly.length; k += 2) polyObj.push({ x: poly[k], y: poly[k+1] });

  for (let i = iMin; i <= iMax; i++) {
    for (let j = jMin; j <= jMax; j++) {
      const tx = i * tileStageW;
      const ty = j * tileStageH;
      const ax = tx + gx;
      const ay = ty + gy;

      const corners = [
        [ax, ay],
        [ax + tileStageW, ay],
        [ax, ay + tileStageH],
        [ax + tileStageW, ay + tileStageH]
      ];

      const insideCount = corners.filter((c) => isPointInPoly(c[0], c[1], poly)).length;
      if (insideCount === 0) continue;

      let stroke = "rgba(0,123,255,0.35)";
      let fill = "rgba(0,123,255,0.08)";

      if (dangerOn && dangerMm > 0 && insideCount < 4) {
        const clipped = clipPolygonToRect(polyObj, ax, ay, ax + tileStageW, ay + tileStageH);
        const bb = (clipped && clipped.length >= 3) ? getBBoxOfPoints(clipped) : null;

        if (bb) {
          const wMm = Math.abs(stagePxToMmX(Math.max(0, bb.maxX - bb.minX)));
          const hMm = Math.abs(stagePxToMmY(Math.max(0, bb.maxY - bb.minY)));
          if (Math.min(wMm, hMm) < dangerMm) {
            stroke = "red";
            fill = "rgba(255,0,0,0.18)";
          }
        } else {
          const cx = ax + tileStageW / 2;
          const cy = ay + tileStageH / 2;
          if (!isPointInPoly(cx, cy, poly)) {
            stroke = "red";
            fill = "rgba(255,0,0,0.18)";
          }
        }
      }

      gridGroup.add(new Konva.Rect({
        x:tx,
        y:ty,
        width:tileStageW,
        height:tileStageH,
        stroke,
        fill,
        strokeWidth:STROKE_GRID,
        listening:false
      }));
    }
  }

  mainLayer.batchDraw();
  updateBaseDimsToPoly();
}

function mmToStagePxX(mm){
  if (!mmPerLocalPx) return 0;
  const sx = photoGroup.scaleX() || 1;
  return (mm / mmPerLocalPx) * sx;
}

function mmToStagePxY(mm){
  if (!mmPerLocalPx) return 0;
  const sy = photoGroup.scaleY() || 1;
  return (mm / mmPerLocalPx) * sy;
}

function moveGridByMm(dxMm, dyMm){
  if (!gridGroup.visible()) return;
  const dx = mmToStagePxX(dxMm);
  const dy = mmToStagePxY(dyMm);
  gridGroup.position({ x: gridGroup.x() + dx, y: gridGroup.y() + dy });
  updateGrid();
  resnapBaseDot();
}

function moveActivePointByScreenPx(dxPx, dyPx) {
  if (!activePoint) return;

  const dx = dxPx / (stageScale || 1);
  const dy = dyPx / (stageScale || 1);

  let nextPos;

  if (activePoint.hasName("polyDot")) {
    nextPos = {
      x: roundToUnit(activePoint.x() + dx),
      y: roundToUnit(activePoint.y() + dy)
    };
    lastSnapInfo = "";
  } else {
    nextPos = applySmartSnap(
      activePoint,
      { x: activePoint.x() + dx, y: activePoint.y() + dy },
      activePoint.name()
    );
  }

  activePoint.position(nextPos);

  if (activePoint.hasName("polyDot")) syncPoly();
  if (activePoint.hasName("baseDot")) updateBaseDimsToPoly();

  if (activePoint.hasName("alignDot")) {
    const dots = uiLayer.find(".alignDot");
    if (dots.length === 2) {
      alignLine.points([dots[0].x(), dots[0].y(), dots[1].x(), dots[1].y()]);
      alignLine.visible(true);
    }
  }

  if (activePoint.hasName("scaleDot")) {
    const dots = uiLayer.find(".scaleDot");
    if (dots.length === 2) {
      scaleLine.points([dots[0].x(), dots[0].y(), dots[1].x(), dots[1].y()]);
      scaleLine.visible(true);
    }
  }

  updateAssistStatus();
  updateZoom(activePoint.position());
  uiLayer.draw();
}

  else if (dpadMode === "point") moveActivePointByScreenPx(dx * pointStepPx, dy * pointStepPx);

function clearDpadRepeat() {
  if (dpadRepeatTimer) clearTimeout(dpadRepeatTimer);
  if (dpadRepeatInterval) clearInterval(dpadRepeatInterval);
  dpadRepeatTimer = null;
  dpadRepeatInterval = null;
}

function bindRepeatPress(el, onStep) {
  const stop = (ev)=>{ ev.preventDefault(); ev.stopPropagation(); };

  const start = (ev) => {
    stop(ev);
    clearDpadRepeat();
    onStep();
    dpadRepeatTimer = setTimeout(() => {
      dpadRepeatInterval = setInterval(onStep, REPEAT_INTERVAL);
    }, REPEAT_DELAY);
  };

  const end = (ev) => {
    if (ev) stop(ev);
    clearDpadRepeat();
  };

  el.addEventListener("pointerdown", start, { passive: false });
  el.addEventListener("pointerup", end, { passive: false });
  el.addEventListener("pointerleave", end, { passive: false });
  el.addEventListener("pointercancel", end, { passive: false });
}

function bindDpad(){
  bindRepeatPress(document.getElementById("dUp"), () => performDpadMove(0,-1));
  bindRepeatPress(document.getElementById("dDown"), () => performDpadMove(0,1));
  bindRepeatPress(document.getElementById("dLeft"), () => performDpadMove(-1,0));
  bindRepeatPress(document.getElementById("dRight"), () => performDpadMove(1,0));

  document.getElementById("dCenter").addEventListener("pointerdown", (ev)=>{
    ev.preventDefault();
    ev.stopPropagation();
    if (dpadMode === "grid") nudgeMm = (nudgeMm === 5) ? 10 : 5;
    else pointStepPx = (pointStepPx === POINT_STEP_FINE) ? POINT_STEP_COARSE : POINT_STEP_FINE;
    setDpadVisible(true);
  }, { passive: false });
}
bindDpad();

function scoreGridAtPosition(gx, gy){
  if (!mmPerLocalPx) return null;
  const poly = polyShape.points();
  if (poly.length < 6) return null;

  const twMm = parseFloat(document.getElementById("tileWidthInput").value);
  const thMm = parseFloat(document.getElementById("tileHeightInput").value);
  if (!isFinite(twMm)||!isFinite(thMm)||twMm<=0||thMm<=0) return null;

  const dangerMm = Math.max(0, parseFloat(document.getElementById("dangerMmInput").value || "0"));
  const tileLocalW = twMm / mmPerLocalPx;
  const tileLocalH = thMm / mmPerLocalPx;
  const tileStageW = tileLocalW * (photoGroup.scaleX() || 1);
  const tileStageH = tileLocalH * (photoGroup.scaleY() || 1);
  if (!isFinite(tileStageW)||!isFinite(tileStageH)||tileStageW<=0||tileStageH<=0) return null;

  const b = getPolyBounds(poly);
  const iMin = Math.floor((b.minX - gx) / tileStageW) - GRID_MARGIN_TILES;
  const iMax = Math.ceil((b.maxX - gx) / tileStageW) + GRID_MARGIN_TILES;
  const jMin = Math.floor((b.minY - gy) / tileStageH) - GRID_MARGIN_TILES;
  const jMax = Math.ceil((b.maxY - gy) / tileStageH) + GRID_MARGIN_TILES;

  const cells = (iMax - iMin + 1) * (jMax - jMin + 1);
  if (cells > GRID_MAX_CELLS) return { tooMany: true, cells };

  const polyObj = [];
  for (let k = 0; k < poly.length; k += 2) polyObj.push({ x: poly[k], y: poly[k+1] });

  let partialCount = 0;
  let dangerCount = 0;

  for (let i = iMin; i <= iMax; i++) {
    for (let j = jMin; j <= jMax; j++) {
      const tx=i*tileStageW, ty=j*tileStageH, ax=tx+gx, ay=ty+gy;
      const corners=[[ax,ay],[ax+tileStageW,ay],[ax,ay+tileStageH],[ax+tileStageW,ay+tileStageH]];
      const insideCount = corners.filter((c) => isPointInPoly(c[0], c[1], poly)).length;
      if (insideCount===0) continue;
      if (insideCount<4) partialCount++;

      if (dangerOn && insideCount < 4 && dangerMm > 0) {
        const clipped = clipPolygonToRect(polyObj, ax, ay, ax + tileStageW, ay + tileStageH);
        const bb = (clipped && clipped.length >= 3) ? getBBoxOfPoints(clipped) : null;
        let isDanger = false;

        if (bb) {
          const wMm = Math.abs(stagePxToMmX(Math.max(0, bb.maxX - bb.minX)));
          const hMm = Math.abs(stagePxToMmY(Math.max(0, bb.maxY - bb.minY)));
          if (Math.min(wMm, hMm) < dangerMm) isDanger = true;
        } else {
          const cx=ax+tileStageW/2, cy=ay+tileStageH/2;
          if (!isPointInPoly(cx,cy,poly)) isDanger = true;
        }

        if (isDanger) dangerCount++;
      }
    }
  }

  return { dangerCount, partialCount, tileStageW, tileStageH };
}

function modPositive(a, m){
  return ((a % m) + m) % m;
}

async function optimizeGrid(){
  if (!gridGroup.visible()) { alert("先にグリッドを生成してください。"); return; }
  if (!mmPerLocalPx) { alert("先に縮尺合わせを完了してください。"); return; }
  if (polyShape.points().length < 6) { alert("先に施工範囲（ポリゴン）を完了してください。"); return; }

  setStatus("最適割付：探索中…", null);

  const baseX = gridGroup.x();
  const baseY = gridGroup.y();
  const s0 = scoreGridAtPosition(baseX, baseY);

  if (!s0) { alert("スコア計算に失敗"); return; }
  if (s0.tooMany) {
    alert(`グリッドが細かすぎます（cells=${s0.cells}）。タイル寸法/縮尺/範囲を見直してください。`);
    return;
  }

  const W = s0.tileStageW;
  const H = s0.tileStageH;
  const baseOx = modPositive(baseX, W);
  const baseOy = modPositive(baseY, H);

  const coarseStepX = Math.max(1, mmToStagePxX(5));
  const coarseStepY = Math.max(1, mmToStagePxY(5));
  const fineStepX = Math.max(1, mmToStagePxX(1));
  const fineStepY = Math.max(1, mmToStagePxY(1));

  const search = (stepX, stepY, centerOx, centerOy, radiusX, radiusY) => {
    let best = null;
    const x0=(radiusX==null)?0:Math.max(0,centerOx-radiusX);
    const x1=(radiusX==null)?W:Math.min(W,centerOx+radiusX);
    const y0=(radiusY==null)?0:Math.max(0,centerOy-radiusY);
    const y1=(radiusY==null)?H:Math.min(H,centerOy+radiusY);

    for (let ox=x0; ox<x1; ox+=stepX) {
      for (let oy=y0; oy<y1; oy+=stepY) {
        const gx=baseX-baseOx+ox;
        const gy=baseY-baseOy+oy;
        const sc=scoreGridAtPosition(gx,gy);
        if (!sc || sc.tooMany) continue;

        const cand = {
          gx, gy, ox, oy,
          danger: sc.dangerCount,
          partial: sc.partialCount,
          move: Math.hypot(gx-baseX, gy-baseY)
        };

        if (
          !best ||
          cand.danger < best.danger ||
          (cand.danger===best.danger && cand.partial<best.partial) ||
          (cand.danger===best.danger && cand.partial===best.partial && cand.move<best.move)
        ) {
          best=cand;
        }
      }
    }
    return best;
  };

  const bestCoarse = search(coarseStepX, coarseStepY, null, null, null, null);
  if (!bestCoarse) { alert("最適化できませんでした"); return; }

  const bestFine = search(
    fineStepX, fineStepY,
    bestCoarse.ox, bestCoarse.oy,
    coarseStepX * 2, coarseStepY * 2
  ) || bestCoarse;

  gridGroup.position({ x: bestFine.gx, y: bestFine.gy });
  updateGrid();
  resnapBaseDot();
  setStatus(`最適割付：完了（危険=${bestFine.danger} / 欠け=${bestFine.partial}）`, null);
}

document.getElementById("fileInput").onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = async function () {
    if (file.type === "application/pdf") {
      const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
      const page = await pdf.getPage(1);
      const viewport = page.getViewport({ scale: 2.5 });
      const canvas = document.createElement("canvas");
      canvas.height = viewport.height;
      canvas.width = viewport.width;
      await page.render({ canvasContext: canvas.getContext("2d"), viewport }).promise;
      setupImage(canvas);
    } else {
      const img = new Image();
      img.onload = () => setupImage(img);
      img.src = reader.result;
    }
  };

  if (file.type === "application/pdf") reader.readAsArrayBuffer(file);
  else reader.readAsDataURL(file);
};

function setupImage(source) {
  bgImage.image(source);

  const topReserve = 170;
  const bottomReserve = 250;

  const usableW = stage.width();
  const usableH = Math.max(120, stage.height() - topReserve - bottomReserve);

  const sc = Math.min(usableW / source.width, usableH / source.height);

  const fittedW = source.width * sc;
  const fittedH = source.height * sc;

  const offsetX = (stage.width() - fittedW) / 2;
  const offsetY = topReserve + (usableH - fittedH) / 2 - 14;

  photoGroup.scale({ x: sc, y: sc });
  photoGroup.position({ x: offsetX, y: offsetY });
  photoGroup.rotation(0);
  photoGroup.offset({ x: 0, y: 0 });

  mmPerLocalPx = 0;
  lastTileStageW = 0;
  lastTileStageH = 0;
  gridConfirmed = false;
  activePoint = null;
  pointDragging = false;
  suppressNextTap = false;
  if (suppressTapTimer) clearTimeout(suppressTapTimer);
  suppressTapTimer = null;
  lastSnapInfo = "";
  clearDpadRepeat();

  stage.draggable(false);
  hideZoomHud();
  resetStageView();
  lockPhoto(false);
  setMode("idle");

  destroyDots("alignDot");
  destroyDots("scaleDot");
  destroyDots("polyDot");
  destroyDots("baseDot");

  polyShape.points([]);
  alignLine.visible(false);
  scaleLine.visible(false);

  gridGroup.visible(false);
  gridGroup.draggable(false);
  gridGroup.position({ x: 0, y: 0 });
  gridGroup.destroyChildren();

  document.getElementById("alignInputArea").style.display = "none";
  document.getElementById("measureInputArea").style.display = "none";
  document.getElementById("polyControls").style.display = "none";
  document.getElementById("polyEditDoneBtn").style.display = "none";
  document.getElementById("polyEditBtn").style.display = "block";

  baseInfoExpanded = false;
  setBaseInfoVisible(false);

  setDpadVisible(false);
  mainLayer.draw();
  uiLayer.draw();
  setStatus("図面読み込み完了", "X左: -\nX右: -\nY上: -\nY下: -");
  updateUiChips();
}

  setStatus("範囲調整完了（範囲ロック）", null);
  activePoint = null;
  zoomLayer.visible(false);
  hideZoomHud();
  setDpadVisible(false);
  stage.draggable(false);
  resetStageView();
  uiLayer.draw();
  if (gridGroup.visible()) updateGrid();
  updateBaseDimsToPoly();
  updateUiChips();
};

document.getElementById("showGridBtn").onclick = () => {
  if (!mmPerLocalPx) { alert("先に縮尺合わせを完了してください。"); return; }
  if (polyShape.points().length < 6) { alert("先に施工範囲（ポリゴン）を完了してください。"); return; }

  gridConfirmed = false;
  stage.draggable(false);
  hideZoomHud();
  resetStageView();
  setMode("gridAdjust");
  lockPhoto(true);
  gridGroup.visible(true);
  gridGroup.draggable(true);
  dpadMode = "grid";
  if (gridGroup.x() === 0 && gridGroup.y() === 0) {
    gridGroup.position({ x: stage.width() / 2, y: stage.height() / 2 });
  }
  updateGrid();
  setDpadVisible(true);
  mainLayer.draw();
  updateUiChips();
};

document.getElementById("confirmGridBtn").onclick = () => {
  if (!gridGroup.visible()) return;
  gridConfirmed = true;
  showZoomHud("grid");
  stage.draggable(true);
  setMode("idle");
  gridGroup.draggable(false);
  lockPhoto(true);
  setPolyDotsDraggable(false);
  resnapBaseDot();
  setStatus("グリッド確定（固定）→ 左下の ＋ / － / 戻す で表示調整", null);
  setDpadVisible(false);
  mainLayer.draw();
};

document.getElementById("optBtn").onclick = () => { optimizeGrid(); };
document.getElementById("zoomInBtn").onclick = () => zoomAroundCenter(1.2);
document.getElementById("zoomOutBtn").onclick = () => zoomAroundCenter(1 / 1.2);
document.getElementById("zoomResetBtn").onclick = () => resetStageView();

document.getElementById("pointDoneBtn").onclick = () => {
  exitPointAdjust();
  if (mode !== "idle") showZoomHud("point");
  stage.draggable(false);
  zoomLayer.visible(false);
  setDpadVisible(false);
};

document.getElementById("gridReEditBtn").onclick = () => {
  if (!gridGroup.visible()) return;
  gridConfirmed = false;
  hideZoomHud();
  stage.draggable(false);
  resetStageView();
  setMode("gridAdjust");
  gridGroup.draggable(true);
  dpadMode = "grid";
  setDpadVisible(true);
  setStatus("グリッド再調整：ドラッグ＋十字キー", null);
};

document.getElementById("dangerToggleBtn").onclick = () => {
  dangerOn = !dangerOn;
  document.getElementById("dangerToggleBtn").textContent = "危険小片：" + (dangerOn ? "ON" : "OFF");
  if (gridGroup.visible()) updateGrid();
  updateBaseDimsToPoly();
};

document.getElementById("dangerMmInput").addEventListener("change", () => { if (gridGroup.visible()) updateGrid(); });
document.getElementById("tileWidthInput").addEventListener("change", () => { if (gridGroup.visible()) updateGrid(); updateBaseDimsToPoly(); });
document.getElementById("tileHeightInput").addEventListener("change", () => { if (gridGroup.visible()) updateGrid(); updateBaseDimsToPoly(); });

document.getElementById("basePointBtn").onclick = () => {
  if (!gridGroup.visible()) { alert("先にグリッドを生成してください。"); return; }
  if (polyShape.points().length < 6) { alert("先に施工範囲（ポリゴン）を完了してください。"); return; }
  setMode("settingBase");
  lockPhoto(true);
  showZoomHud("point");
  stage.draggable(false);
  resetStageView();
  setDpadVisible(false);
  setStatus("基準点をタップ（交点スナップ）→ 下に寸法要約が出ます", null);
};

function getPointerPos(e){
  stage.setPointersPositions(e.evt);
  const p = stage.getPointerPosition();
  if (!p) return null;
  const sx = stage.scaleX() || 1;
  const sy = stage.scaleY() || 1;
  return { x: (p.x - stage.x()) / sx, y: (p.y - stage.y()) / sy };
}

stage.on("pointerdown", (e) => {
  if (mode === "idle") return;
  if (pointDragging) return;

  if (zoomHudMode === "point" && activePoint) return;

  const layer = e.target && e.target.getLayer && e.target.getLayer();
  if (layer === uiLayer || layer === zoomLayer) return;

  const isBackgroundTarget = (e.target === bgImage || e.target === stage || e.target === gridGroup);
  if (!isBackgroundTarget) return;

  const pos = getPointerPos(e);
  if (!pos) return;

  if (mode === "aligning") {
    if (uiLayer.find(".alignDot").length < 2) {
      createPoint(pos, "#6f42c1", "alignDot");
      armTapSuppression();
      const dots = uiLayer.find(".alignDot");
      if (dots.length === 2) {
        alignLine.points([dots[0].x(), dots[0].y(), dots[1].x(), dots[1].y()]);
        alignLine.visible(true);
      }
      uiLayer.draw();
    }
  } else if (mode === "measuring") {
    if (uiLayer.find(".scaleDot").length < 2) {
      createPoint(pos, "red", "scaleDot");
      armTapSuppression();
      const dots = uiLayer.find(".scaleDot");
      if (dots.length === 2) {
        scaleLine.points([dots[0].x(), dots[0].y(), dots[1].x(), dots[1].y()]);
        scaleLine.visible(true);
      }
      uiLayer.draw();
    }
  } else if (mode === "drawing") {
    createPoint(pos, "#fd7e14", "polyDot");
    armTapSuppression();
    syncPoly();
    uiLayer.draw();
  } else if (mode === "settingBase") {
    destroyDots("baseDot");
    createPoint(pos, "#00bfff", "baseDot", { snapOnCreate: true, snapOnDragEnd: true });
    armTapSuppression();
    baseInfoExpanded = false;
    setMode("idle");
    uiLayer.draw();
    updateBaseDimsToPoly();
    setStatus("基準点 設置完了（要約表示）", null);
    activePoint = null;
    zoomLayer.visible(false);
    hideZoomHud();
    setDpadVisible(false);
    stage.draggable(false);
    resetStageView();
  }
});

document.getElementById("saveImageBtn").onclick = () => {
  const dpad = document.getElementById("dpad");
  const hud = document.getElementById("zoomHud");
  const topBar = document.getElementById("topBar");
  const bottomBar = document.getElementById("bottomBar");
  const statusBar = document.getElementById("statusBar");
  const menuSheet = document.getElementById("menuSheet");

  topBar.style.display = "none";
  bottomBar.style.display = "none";
  statusBar.style.display = "none";
  menuSheet.style.display = "none";
  dpad.style.display = "none";
  hud.style.display = "none";

  setTimeout(() => {
    const link = document.createElement("a");
    link.download = "割付図.png";
    link.href = stage.toDataURL({ pixelRatio: 2 });
    link.click();

    topBar.style.display = "flex";
    bottomBar.style.display = "flex";
    statusBar.style.display = "flex";
    if (!gridConfirmed && gridGroup.visible() && dpadMode === "grid") dpad.style.display = "block";
    if (zoomHudMode !== "hidden") hud.style.display = "flex";
  }, 120);
};

window.addEventListener("resize", () => {
  stage.width(window.innerWidth);
  stage.height(window.innerHeight);
  mainLayer.draw();
  uiLayer.draw();
  zoomLayer.draw();
  if (gridGroup.visible()) {
    updateGrid();
    resnapBaseDot();
  }
  updateBaseDimsToPoly();
  applyStageView();
});

document.addEventListener("gesturestart", (e) => e.preventDefault(), { passive: false });
document.addEventListener("gesturechange", (e) => e.preventDefault(), { passive: false });
document.addEventListener("gestureend", (e) => e.preventDefault(), { passive: false });
document.addEventListener("contextmenu", (e) => e.preventDefault());
document.addEventListener("selectstart", (e) => e.preventDefault());
document.addEventListener("dragstart", (e) => {
  const tag = (e.target && e.target.tagName) ? e.target.tagName.toLowerCase() : "";
  if (tag !== "input") e.preventDefault();
});

const menuBtn = document.getElementById("menuBtn");
const menuSheet = document.getElementById("menuSheet");
const stepTabs = document.querySelectorAll(".stepTab");
const sectionMap = {
  align: document.getElementById("sectionAlign"),
  measure: document.getElementById("sectionMeasure"),
  poly: document.getElementById("sectionPoly"),
  grid: document.getElementById("sectionGrid")
};

function setActiveSection(name){
  Object.entries(sectionMap).forEach(([key, el]) => {
    el.style.display = (key === name) ? "flex" : "none";
  });

  stepTabs.forEach(btn => {
    btn.classList.toggle("active", btn.dataset.step === name);
  });

  updateSectionLabel();
}

stepTabs.forEach(btn => {
  btn.addEventListener("click", () => {
    setActiveSection(btn.dataset.step);
  });
});

menuBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  menuSheet.style.display = menuSheet.style.display === "flex" ? "none" : "flex";
});

document.addEventListener("click", (e) => {
  if (!menuSheet.contains(e.target) && e.target !== menuBtn) {
    menuSheet.style.display = "none";
  }
});

document.getElementById("openFileBtn").addEventListener("click", () => {
  document.getElementById("fileInput").click();
  menuSheet.style.display = "none";
});

document.getElementById("dangerToggleProxyBtn").addEventListener("click", () => {
  document.getElementById("dangerToggleBtn").click();
  menuSheet.style.display = "none";
});

document.getElementById("alignBtn").addEventListener("click", () => setActiveSection("align"));
document.getElementById("measureBtn").addEventListener("click", () => setActiveSection("measure"));
document.getElementById("polyBtn").addEventListener("click", () => setActiveSection("poly"));
document.getElementById("showGridBtn").addEventListener("click", () => setActiveSection("grid"));

lockPhoto(false);
setMode("idle");
setStatus("図面を読み込んで開始", "X左: -\nX右: -\nY上: -\nY下: -");
setDpadVisible(false);
hideZoomHud();
setActiveSection("align");
setBaseInfoVisible(false);
updateUiChips();
</script>
