<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>割付ポンッ！ - 完全版 v3.4.5（MKCRaFT① 範囲指定拡大ドラッグ版）</title>

  <script src="https://unpkg.com/konva@9/konva.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

  <script src="../analytics.js"></script>
  <style>
    * {
      -webkit-tap-highlight-color: transparent;
      outline: none;
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a1a;
      font-family: sans-serif;
      touch-action: none;
      overscroll-behavior: none;
    }

    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    #container { position: fixed; inset: 0; width: 100vw; height: 100vh; }

    #controls{
      position: absolute; top: calc(10px + env(safe-area-inset-top)); left: 10px; z-index: 100;
      background: rgba(255,255,255,0.96); border-radius: 14px; width: 282px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      max-height: 76vh; display: flex; flex-direction: column; overflow: hidden;
      transition: transform 0.25s ease;
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
    }
    #controls.minimized { transform: translateX(-267px); }

    #controlsHeader { position: relative; padding: 10px; border-bottom: 1px solid rgba(0,0,0,0.08); }
    #controlsBody { padding: 10px; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }

    #toggleBtn{
      position: absolute; right: -26px; top: 10px;
      width: 58px; height: 58px;
      background: #007bff; color: white;
      border-radius: 14px; border: 3px solid white;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; cursor: pointer;
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
      font-size: 20px;
    }
    #toggleBtn:active { transform: scale(0.98); }

    .section { background: #f0f2f5; padding: 8px; border-radius: 8px; margin-bottom: 6px; border-left: 4px solid #007bff; }
    .btn {
      background: #007bff; color: white; border: none; padding: 12px 10px; border-radius: 8px; cursor: pointer;
      width: 100%; margin: 4px 0; font-weight: bold; font-size: 13px; min-height: 44px;
    }
    .btn-purple { background: #6f42c1; }
    .btn-green { background: #28a745; }
    .btn-orange { background: #fd7e14; }
    .btn-red { background: #dc3545; }
    .btn-dark { background:#333; }
    .btn-black { background:#000; }
    .btn-gray { background:#6c757d; }

    .row { display:flex; gap:6px; align-items:center; }

    input {
      width: 100%; padding: 8px 6px; border-radius: 6px; border: 1px solid #ccc;
      font-size: 16px; margin: 4px 0; min-height: 40px;
      -webkit-user-select: text;
      user-select: text;
      -webkit-touch-callout: default;
    }
    label { font-size: 11px; font-weight: bold; display:block; margin-top:4px; }
    .hint { font-size: 11px; color:#333; margin-top:4px; line-height: 1.35; }

    .kv { display:flex; justify-content: space-between; gap:10px; font-size: 12px; margin-top: 6px; }
    .pill { background:#fff; border:1px solid rgba(0,0,0,0.12); border-radius: 999px; padding: 4px 8px; font-weight: 700; }

    #statusBar {
      position: absolute; left: 0; right: 0; bottom: 0; z-index: 90;
      background: rgba(0,0,0,0.68); color: #fff;
      padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
      font-size: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      pointer-events: none;
    }
    #statusLeft { white-space: nowrap; overflow:hidden; text-overflow: ellipsis; }
    #statusRight { white-space: pre-wrap; line-height: 1.25; }

    #dpad {
      position: fixed;
      right: 10px;
      bottom: calc(86px + env(safe-area-inset-bottom));
      z-index: 120;
      display: none;
      opacity: 0.94;
      touch-action: none;
    }
    #dpad .pad {
      width: 136px;
      height: 136px;
      display: grid;
      grid-template-columns: 44px 44px 44px;
      grid-template-rows: 44px 44px 44px;
      gap: 2px;
      background: rgba(0,0,0,0.25);
      border-radius: 18px;
      padding: 6px;
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
    }
    #dpad button {
      border: 0;
      border-radius: 12px;
      background: rgba(255,255,255,0.94);
      font-weight: 900;
      font-size: 16px;
      min-height: 44px;
      min-width: 44px;
    }
    #dpad button:active { transform: scale(0.98); }
    #dpad .center {
      background: rgba(255,255,255,0.65);
      font-size: 12px;
      font-weight: 800;
    }

    #zoomHud {
      position: fixed;
      left: 10px;
      bottom: calc(86px + env(safe-area-inset-bottom));
      z-index: 121;
      display: none;
      gap: 8px;
      flex-wrap: wrap;
      touch-action: none;
    }
    #zoomHud button{
      border: 0;
      border-radius: 12px;
      padding: 11px 13px;
      background: rgba(255,255,255,0.94);
      font-weight: 900;
      min-height: 44px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
    }
    #zoomHud button:active{ transform: scale(0.98); }
  </style>
</head>
<body>
  <div id="controls">
    <div id="controlsHeader">
      <div id="toggleBtn" aria-label="メニューを開閉">⇔</div>
      <input type="file" id="fileInput" accept="image/*,.pdf" />
    </div>

    <div id="controlsBody">
      <div class="section">
        <button class="btn btn-dark" id="lockBtn">図面ロック：OFF</button>
        <div class="hint">※グリッド表示後は基本ロック推奨</div>
      </div>

      <div class="section">
        <button class="btn btn-purple" id="alignBtn">1. 水平合わせ</button>
        <div id="alignInputArea" style="display:none;">
          <button class="btn btn-green" id="applyAlignBtn">確定</button>
        </div>
      </div>

      <div class="section">
        <button class="btn" id="measureBtn">2. 縮尺合わせ</button>
        <div id="measureInputArea" style="display:none;">
          <label>実寸(mm)</label>
          <input type="number" id="realDistInput" value="1000" />
          <button class="btn btn-green" id="applyScaleBtn">確定</button>
        </div>
        <div class="hint">※寸法線に沿って2点</div>
      </div>

      <div class="section">
        <button class="btn btn-orange" id="polyBtn">3. 施工範囲指定</button>
        <div id="polyControls" style="display:none;">
          <button class="btn btn-red" id="undoBtn">戻す</button>
          <button class="btn btn-green" id="closePolyBtn">完了（範囲ロック）</button>
        </div>
        <button class="btn btn-gray" id="polyEditBtn">✏️ 範囲調整（点を動かす）</button>
        <button class="btn btn-green" id="polyEditDoneBtn" style="display:none;">✅ 調整完了（ロック）</button>
        <div class="hint">※内壁ラインをなぞるイメージ</div>
      </div>

      <div class="section">
        <label>タイル(mm)</label>
        <div class="row">
          <input type="number" id="tileWidthInput" value="300" />
          <input type="number" id="tileHeightInput" value="300" />
        </div>
        <button class="btn btn-green" id="showGridBtn">4. グリッド生成（表示）</button>
        <button class="btn btn-dark" id="confirmGridBtn">5. グリッド確定（固定）</button>
        <button class="btn btn-purple" id="optBtn">🎯 最適割付（危険小片最小）</button>

        <div class="kv"><div>発注枚数(ロス込)</div><div class="pill" id="orderTilesOut">- 枚</div></div>

      <div class="section">
        <button class="btn btn-dark" id="basePointBtn">6. 基準点（交点スナップ）</button>
        <div class="hint">✅ 下の表示は X/Y：基準点から境界までの距離（mm）＋タイル枚数＋半端寸法</div>

      <button class="btn btn-black" id="saveImageBtn">📸 保存（割付図）</button>

  </div>

  <div id="container"></div>

  <div id="dpad" aria-label="微調整">
    <div class="pad">
      <div></div><button id="dUp">▲</button><div></div>
      <button id="dLeft">◀</button><button id="dCenter" class="center">5mm</button><button id="dRight">▶</button>
      <div></div><button id="dDown">▼</button><div></div>
    </div>
  </div>

  <div id="zoomHud" aria-label="ズーム操作">
    <button id="zoomInBtn">＋</button>
    <button id="zoomOutBtn">－</button>
    <button id="zoomResetBtn">戻す</button>
    <button id="pointDoneBtn">点調整完了</button>
    <button id="gridReEditBtn">グリッド再調整</button>
  </div>

  <div id="statusBar">
    <div id="statusLeft">図面を読み込んで開始</div>
    <div id="statusRight">X左: -\nX右: -\nY上: -\nY下: -</div>
  </div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js";

// GA4イベント送信用の共通ヘルパー
const trackAppEvent = (eventName, params = {}) => {
  window.WaritsukeAnalytics?.trackEvent(eventName, params);
};

const GRID_MARGIN_TILES = 6;
const GRID_MAX_CELLS = 80000;
const BASE_INTERSECT_EPS = 0.5;
const STROKE_THIN = 1.5;
const STROKE_GRID = 0.6;
const CROSS_HALF = 18;
const DOT_RADIUS = 5;
const HIT_RADIUS = 42;

const DRAG_THRESHOLD_PX = 4;
const POINT_STEP_FINE = 0.5;
const POINT_STEP_COARSE = 1;
const SNAP_STAGE_PX = 12;
const AXIS_SNAP_STAGE_PX = 10;
const GRID_SNAP_STAGE_PX = 14;
const REPEAT_DELAY = 260;
const REPEAT_INTERVAL = 42;
const POSITION_ROUND_UNIT = 0.25;
const POLY_OVERLAP_MIN_PX = 10;
const TAP_SUPPRESS_MS = 120;

trackAppEvent("app_open", { app_variant: window.location.pathname.includes("/beta/") ? "beta" : "stable" });

const stage = new Konva.Stage({
  container: "container",
  width: window.innerWidth,
  height: window.innerHeight
});

const mainLayer = new Konva.Layer();
const uiLayer = new Konva.Layer();
const zoomLayer = new Konva.Layer({ visible: false, listening: false });

const photoGroup = new Konva.Group({ draggable: true });
const bgImage = new Konva.Image({ listening: true });
const gridGroup = new Konva.Group({ draggable: false, visible: false });

const polyShape = new Konva.Line({
  stroke: "#fd7e14",
  strokeWidth: STROKE_THIN,
  fill: "rgba(253, 126, 20, 0.2)",
  closed: true,
  points: [],
  listening: false
});
const alignLine = new Konva.Line({
  stroke: "#6f42c1",
  strokeWidth: STROKE_THIN,
  dash: [5, 5],
  visible: false,
  listening: false
});
const scaleLine = new Konva.Line({
  stroke: "red",
  strokeWidth: STROKE_THIN,
  dash: [4, 4],
  visible: false,
  listening: false
});

const zoomGroup = new Konva.Group({ listening: false });
const zoomContent = new Konva.Image({ listening: false });
zoomGroup.add(
  new Konva.Circle({ radius: 85, stroke: "#fff", strokeWidth: 2, fill: "#000", listening: false }),
  zoomContent
);
zoomGroup.add(
  new Konva.Line({ points: [-20, 0, 20, 0], stroke: "#0f0", strokeWidth: 2, listening: false }),
  new Konva.Line({ points: [0, -20, 0, 20], stroke: "#0f0", strokeWidth: 2, listening: false })
);
zoomLayer.add(zoomGroup);

photoGroup.add(bgImage);
mainLayer.add(photoGroup, gridGroup);
uiLayer.add(polyShape, alignLine, scaleLine);
stage.add(mainLayer, uiLayer, zoomLayer);

let mode = "idle";
let mmPerLocalPx = 0;
let photoLocked = false;
let dangerOn = true;
let lastTileStageW = 0;
let lastTileStageH = 0;
let gridConfirmed = false;
let stageScale = 1;
let stagePos = { x: 0, y: 0 };
let zoomHudMode = "hidden";
let dpadMode = "grid";
let nudgeMm = 5;
let pointStepPx = POINT_STEP_FINE;
let activePoint = null;
let pointDragging = false;
let suppressNextTap = false;
let suppressTapTimer = null;
let lastSnapInfo = "";
let dpadRepeatTimer = null;
let dpadRepeatInterval = null;

const statusLeft = document.getElementById("statusLeft");
const statusRight = document.getElementById("statusRight");
const areaOut = document.getElementById("areaOut");
const needTilesOut = document.getElementById("needTilesOut");
const orderTilesOut = document.getElementById("orderTilesOut");
const zoomHud = document.getElementById("zoomHud");

function armTapSuppression(ms = TAP_SUPPRESS_MS) {
  suppressNextTap = true;
  if (suppressTapTimer) clearTimeout(suppressTapTimer);
  suppressTapTimer = setTimeout(() => {
    suppressNextTap = false;
    suppressTapTimer = null;
  }, ms);
}

function setStatus(left, right) {
  if (left != null) statusLeft.textContent = left;
  if (right != null) statusRight.textContent = right;
}

function lockPhoto(lock) {
  photoLocked = !!lock;
  photoGroup.draggable(!photoLocked);
  bgImage.listening(!photoLocked);
  document.getElementById("lockBtn").textContent = "図面ロック：" + (photoLocked ? "ON" : "OFF");
}

function setMode(next) {
  mode = next;
  const label = {
    idle:"待機",
    aligning:"水平合わせ（2点）",
    measuring:"縮尺合わせ（2点）",
    drawing:"施工範囲指定（点追加/ドラッグ）",
    polyAdjust:"範囲調整（点ドラッグ）",
    gridAdjust:"グリッド調整（グリッドドラッグ＋十字キー）",
    settingBase:"基準点（交点スナップ）"
  }[mode] || mode;
  setStatus("工程: " + label, null);
}

function getPhotoLocalPoint(stagePoint) {
  const inv = photoGroup.getAbsoluteTransform().copy().invert();
  return inv.point(stagePoint);
}

function stagePxToMmX(px) {
  if (!mmPerLocalPx) return 0;
  const sx = photoGroup.scaleX() || 1;
  return (px / sx) * mmPerLocalPx;
}

function stagePxToMmY(px) {
  if (!mmPerLocalPx) return 0;
  const sy = photoGroup.scaleY() || 1;
  return (px / sy) * mmPerLocalPx;
}

function roundToUnit(v, unit = POSITION_ROUND_UNIT) {
  return Math.round(v / unit) * unit;
}

function getStageSpaceThreshold(px) {
  return px / (stageScale || 1);
}

function distance2(a, b) {
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  return dx * dx + dy * dy;
}

function updateZoom(pos) {
  if (!bgImage.image()) return;

  zoomLayer.visible(true);

  let zX = pos.x;
  let zY = pos.y - 140;
  if (zX < 90) zX = 90;
  if (zX > stage.width() - 90) zX = stage.width() - 90;
  if (zY < 90) zY = pos.y + 140;

  zoomGroup.position({ x: zX, y: zY });

  const localPos = getPhotoLocalPoint(pos);
  const mag = 4.5;

  zoomContent.image(bgImage.image());
  zoomContent.width(bgImage.image().width);
  zoomContent.height(bgImage.image().height);
  zoomContent.scale({ x: photoGroup.scaleX() * mag, y: photoGroup.scaleY() * mag });
  zoomContent.rotation(photoGroup.rotation());
  zoomContent.position({
    x: -localPos.x * photoGroup.scaleX() * mag,
    y: -localPos.y * photoGroup.scaleY() * mag
  });
  zoomContent.clipFunc((ctx) => {
    ctx.arc(
      localPos.x * photoGroup.scaleX() * mag,
      localPos.y * photoGroup.scaleY() * mag,
      85, 0, Math.PI * 2
    );
  });

  zoomLayer.batchDraw();
}

function destroyDots(name) {
  uiLayer.find("." + name).forEach((d) => d.destroy());
  uiLayer.draw();
}

function syncPoly() {
  const dots = uiLayer.find(".polyDot");
  const pts = [];
  dots.forEach((d) => pts.push(d.x(), d.y()));
  polyShape.points(pts);
  uiLayer.batchDraw();
  updateBaseDimsToPoly();
  updateAreaAndCount();
}

function setPolyDotsDraggable(on) {
  uiLayer.find(".polyDot").forEach(d => d.draggable(!!on));
}

function snapToGrid(stagePos) {
  if (!gridGroup.visible() || !lastTileStageW || !lastTileStageH) return stagePos;
  const localX = stagePos.x - gridGroup.x();
  const localY = stagePos.y - gridGroup.y();
  const snapX = Math.round(localX / lastTileStageW) * lastTileStageW;
  const snapY = Math.round(localY / lastTileStageH) * lastTileStageH;
  return { x: gridGroup.x() + snapX, y: gridGroup.y() + snapY };
}

function resnapBaseDot() {
  const base = uiLayer.findOne(".baseDot");
  if (!base) return;
  const s = snapToGrid({ x: base.x(), y: base.y() });
  base.position(s);
  uiLayer.draw();
  updateBaseDimsToPoly();
}

function getNearbyPoints(excludeNode, classNameList = [".polyDot", ".alignDot", ".scaleDot", ".baseDot"]) {
  const arr = [];
  classNameList.forEach(sel => {
    uiLayer.find(sel).forEach(n => {
      if (n !== excludeNode) arr.push(n);
    });
  });
  return arr;
}

function getPolyNeighborDots(node) {
  const dots = uiLayer.find(".polyDot");
  const idx = dots.indexOf(node);
  if (idx < 0) return [];
  const result = [];
  if (dots[idx - 1]) result.push(dots[idx - 1]);
  if (dots[idx + 1]) result.push(dots[idx + 1]);
  if (dots.length > 2 && idx === 0) result.push(dots[dots.length - 1]);
  if (dots.length > 2 && idx === dots.length - 1) result.push(dots[0]);
  return result;
}

function applySmartSnap(node, proposedPos, dotName) {
  let p = { x: roundToUnit(proposedPos.x), y: roundToUnit(proposedPos.y) };
  const snapDist = getStageSpaceThreshold(SNAP_STAGE_PX);
  const axisDist = getStageSpaceThreshold(AXIS_SNAP_STAGE_PX);
  const gridSnapDist = getStageSpaceThreshold(GRID_SNAP_STAGE_PX);

  let snapMsg = "";

  if (dotName === "baseDot" && gridGroup.visible() && lastTileStageW && lastTileStageH) {
    const g = snapToGrid(p);
    if (Math.hypot(g.x - p.x, g.y - p.y) <= gridSnapDist * 1.5) {
      p = g;
      snapMsg = "基準点: グリッド交点吸着";
    }
  }

  if (dotName === "alignDot" || dotName === "scaleDot") {
    if (gridGroup.visible()) {
      const g = snapToGrid(p);
      if (Math.hypot(g.x - p.x, g.y - p.y) <= gridSnapDist) {
        p = g;
        snapMsg = "交点吸着";
      }
    }

    const nearby = getNearbyPoints(node, [".alignDot", ".scaleDot", ".baseDot"]);
    let nearest = null;
    let nearestD2 = Infinity;
    nearby.forEach(n => {
      const d2 = distance2({ x: n.x(), y: n.y() }, p);
      if (d2 < nearestD2) {
        nearestD2 = d2;
        nearest = n;
      }
    });
    if (nearest && nearestD2 <= snapDist * snapDist) {
      p.x = nearest.x();
      p.y = nearest.y();
      snapMsg = snapMsg || "近接点吸着";
    }
  }

  if (dotName === "polyDot") {
    if (gridGroup.visible()) {
      const g = snapToGrid(p);
      if (Math.hypot(g.x - p.x, g.y - p.y) <= gridSnapDist) {
        p = g;
        snapMsg = "交点吸着";
      }
    }

    const neighbors = getPolyNeighborDots(node);
    neighbors.forEach(n => {
      if (Math.abs(p.x - n.x()) <= axisDist) {
        p.x = n.x();
        snapMsg = snapMsg || "縦ライン吸着";
      }
      if (Math.abs(p.y - n.y()) <= axisDist) {
        p.y = n.y();
        snapMsg = snapMsg || "横ライン吸着";
      }
    });

    const allPoly = uiLayer.find(".polyDot");
    const minGap = getStageSpaceThreshold(POLY_OVERLAP_MIN_PX);

    for (const other of allPoly) {
      if (other === node) continue;

      const dx = p.x - other.x();
      const dy = p.y - other.y();
      const d = Math.hypot(dx, dy);

      if (d < minGap) {
        if (d < 0.0001) {
          p.x += minGap;
        } else {
          const ratio = minGap / d;
          p.x = other.x() + dx * ratio;
          p.y = other.y() + dy * ratio;
        }
        snapMsg = snapMsg || "点重なり防止";
      }
    }
  }

  lastSnapInfo = snapMsg;
  return p;
}

function compensateUiScale() {
  const inv = 1 / (stageScale || 1);
  const allDots = [
    ...uiLayer.find(".alignDot"),
    ...uiLayer.find(".scaleDot"),
    ...uiLayer.find(".polyDot"),
    ...uiLayer.find(".baseDot")
  ];
  allDots.forEach((g) => {
    const hitCircle = g.findOne(".hitCircle");
    const crossH = g.findOne(".crossH");
    const crossV = g.findOne(".crossV");
    const dotCore = g.findOne(".dotCore");

    if (hitCircle) hitCircle.radius(HIT_RADIUS * inv);
    if (crossH) {
      crossH.points([-CROSS_HALF * inv, 0, CROSS_HALF * inv, 0]);
      crossH.strokeWidth(Math.max(1, STROKE_THIN * inv));
    }
    if (crossV) {
      crossV.points([0, -CROSS_HALF * inv, 0, CROSS_HALF * inv]);
      crossV.strokeWidth(Math.max(1, STROKE_THIN * inv));
    }
    if (dotCore) {
      dotCore.radius(Math.max(2.2, DOT_RADIUS * inv));
      dotCore.strokeWidth(Math.max(0.8, 1 * inv));
    }
  });

  polyShape.strokeWidth(Math.max(1, STROKE_THIN * inv));
  alignLine.strokeWidth(Math.max(1, STROKE_THIN * inv));
  scaleLine.strokeWidth(Math.max(1, STROKE_THIN * inv));
  uiLayer.batchDraw();
}

function applyStageView() {
  stage.scale({ x: stageScale, y: stageScale });
  stage.position(stagePos);
  compensateUiScale();
  stage.batchDraw();
}

function resetStageView() {
  stageScale = 1;
  stagePos = { x: 0, y: 0 };
  applyStageView();
}

function setOnlyActivePointInteractive(target) {
  const allDots = [
    ...uiLayer.find(".alignDot"),
    ...uiLayer.find(".scaleDot"),
    ...uiLayer.find(".polyDot"),
    ...uiLayer.find(".baseDot")
  ];

  allDots.forEach((g) => {
    const isActive = g === target;
    g.listening(isActive);
    g.draggable(isActive);
    const hitCircle = g.findOne(".hitCircle");
    if (hitCircle) hitCircle.listening(isActive);
  });

  uiLayer.draw();
}

function restoreAllPointInteractivity() {
  uiLayer.find(".alignDot").forEach((g) => {
    g.listening(true);
    g.draggable(true);
    const hitCircle = g.findOne(".hitCircle");
    if (hitCircle) hitCircle.listening(true);
  });

  uiLayer.find(".scaleDot").forEach((g) => {
    g.listening(true);
    g.draggable(true);
    const hitCircle = g.findOne(".hitCircle");
    if (hitCircle) hitCircle.listening(true);
  });

  uiLayer.find(".polyDot").forEach((g) => {
    g.listening(true);
    g.draggable(mode === "drawing" || mode === "polyAdjust");
    const hitCircle = g.findOne(".hitCircle");
    if (hitCircle) hitCircle.listening(true);
  });

  uiLayer.find(".baseDot").forEach((g) => {
    g.listening(true);
    g.draggable(true);
    const hitCircle = g.findOne(".hitCircle");
    if (hitCircle) hitCircle.listening(true);
  });

  uiLayer.draw();
}

function showZoomHud(modeName) {
  zoomHudMode = modeName;
  zoomHud.style.display = "flex";
  document.getElementById("gridReEditBtn").style.display = (modeName === "grid") ? "inline-block" : "none";
  document.getElementById("pointDoneBtn").style.display = (modeName === "point") ? "inline-block" : "none";
}

function hideZoomHud() {
  zoomHudMode = "hidden";
  zoomHud.style.display = "none";
}

function zoomAroundCenter(factor) {
  const oldScale = stageScale;
  let newScale = Math.max(1, Math.min(6, oldScale * factor));
  const cx = stage.width() / 2;
  const cy = stage.height() / 2;
  const worldPoint = { x: (cx - stagePos.x) / oldScale, y: (cy - stagePos.y) / oldScale };
  stageScale = newScale;
  stagePos = {
    x: cx - worldPoint.x * stageScale,
    y: cy - worldPoint.y * stageScale
  };
  applyStageView();
}

function enterPointAdjust(targetPoint) {
  activePoint = targetPoint;
  dpadMode = "point";
  setOnlyActivePointInteractive(targetPoint);
  setDpadVisible(true);
  showZoomHud("point");
  stage.draggable(false);

  if (activePoint) {
    activePoint.draggable(true);
    updateZoom(activePoint.position());
  }

  const c = document.getElementById("dCenter");
  if (c) c.textContent = `${pointStepPx}px`;
}

function exitPointAdjust() {
  activePoint = null;
  dpadMode = "grid";
  restoreAllPointInteractivity();
  zoomLayer.visible(false);
  hideZoomHud();
  setDpadVisible(false);
  stage.draggable(false);
  resetStageView();
  uiLayer.draw();
}

function updateAssistStatus() {
  if (!lastSnapInfo) return;
  const current = statusLeft.textContent || "";
  if (current.includes("吸着")) return;
  setStatus(current + " / " + lastSnapInfo, null);
}

function createPoint(pos, color, dotName, { snapOnCreate = false, snapOnDragEnd = false } = {}) {
  const p0 = snapOnCreate ? snapToGrid(pos) : pos;

  const g = new Konva.Group({
    x: p0.x,
    y: p0.y,
    draggable: true,
    name: dotName,
    dragDistance: DRAG_THRESHOLD_PX
  });

  g.dragBoundFunc((rawPos) => {
    return applySmartSnap(g, rawPos, dotName);
  });

  g.add(new Konva.Circle({
    radius: HIT_RADIUS,
    fill: "transparent",
    listening: true,
    name: "hitCircle"
  }));

  g.add(new Konva.Line({
    points: [-CROSS_HALF, 0, CROSS_HALF, 0],
    stroke: color,
    strokeWidth: STROKE_THIN,
    listening: false,
    name: "crossH"
  }));

  g.add(new Konva.Line({
    points: [0, -CROSS_HALF, 0, CROSS_HALF],
    stroke: color,
    strokeWidth: STROKE_THIN,
    listening: false,
    name: "crossV"
  }));

  g.add(new Konva.Circle({
    radius: DOT_RADIUS,
    fill: color,
    stroke: "#fff",
    strokeWidth: 1,
    listening: false,
    name: "dotCore"
  }));

  g.on("tap", (e) => {
    e.cancelBubble = true;
    if (suppressNextTap) return;
    if (dotName === "baseDot") return;
    if (zoomHudMode === "point" && activePoint && activePoint !== g) return;
    enterPointAdjust(g);
  });

  g.on("touchstart mousedown", (e) => {
    e.cancelBubble = true;
    stage.draggable(false);
  });

  g.on("dragstart", (e) => {
    e.cancelBubble = true;
    pointDragging = true;
    armTapSuppression();
    lastSnapInfo = "";

    if (dotName === "polyDot") {
      if (activePoint !== g) enterPointAdjust(g);
      updateZoom(g.position());
    } else if (activePoint === g && zoomHudMode === "point") {
      updateZoom(g.position());
    }
  });

  g.on("dragmove", () => {
    updateAssistStatus();

    if (dotName === "polyDot") syncPoly();
    if (dotName === "baseDot") updateBaseDimsToPoly();

    if (dotName === "alignDot") {
      const dots = uiLayer.find(".alignDot");
      if (dots.length === 2) {
        alignLine.points([dots[0].x(), dots[0].y(), dots[1].x(), dots[1].y()]);
        alignLine.visible(true);
      }
    }

    if (dotName === "scaleDot") {
      const dots = uiLayer.find(".scaleDot");
      if (dots.length === 2) {
        scaleLine.points([dots[0].x(), dots[0].y(), dots[1].x(), dots[1].y()]);
        scaleLine.visible(true);
      }
    }

    if (zoomHudMode === "point" && activePoint === g) {
      updateZoom(g.position());
    }
  });

  g.on("dragend", () => {
    pointDragging = false;
    armTapSuppression();

    if (snapOnDragEnd) {
      g.position(snapToGrid({ x: g.x(), y: g.y() }));
    } else {
      g.position({
        x: roundToUnit(g.x()),
        y: roundToUnit(g.y())
      });
    }

    if (dotName === "polyDot") syncPoly();
    if (dotName === "baseDot") updateBaseDimsToPoly();

    if (zoomHudMode === "point" && activePoint === g) {
      updateZoom(g.position());
    }

    updateAssistStatus();
    uiLayer.draw();
  });

  uiLayer.add(g);
  compensateUiScale();
  return g;
}

function polygonAreaSigned(points) {
  const n = points.length / 2;
  if (n < 3) return 0;
  let sum = 0;
  for (let i = 0; i < n; i++) {
    const j = (i + 1) % n;
    const xi = points[i*2], yi = points[i*2+1], xj = points[j*2], yj = points[j*2+1];
    sum += (xi * yj - xj * yi);
  }
  return sum / 2;
}

function updateAreaAndCount() {
  const poly = polyShape.points();
  if (!mmPerLocalPx || poly.length < 6) {
    areaOut.textContent = "- ㎡";
    needTilesOut.textContent = "- 枚";
    orderTilesOut.textContent = "- 枚";
    return;
  }

  const sx = photoGroup.scaleX() || 1;
  const sy = photoGroup.scaleY() || 1;
  const areaStage = Math.abs(polygonAreaSigned(poly));
  const areaLocal = areaStage / (sx * sy);
  const areaMm2 = areaLocal * (mmPerLocalPx * mmPerLocalPx);
  const areaM2 = areaMm2 / 1e6;

  const twMm = parseFloat(document.getElementById("tileWidthInput").value);
  const thMm = parseFloat(document.getElementById("tileHeightInput").value);
  const tileAreaMm2 = (isFinite(twMm) && isFinite(thMm) && twMm > 0 && thMm > 0) ? (twMm * thMm) : 0;

  let need = null;
  let order = null;

  if (tileAreaMm2 > 0) {
    need = areaMm2 / tileAreaMm2;
    const wastePct = parseFloat(document.getElementById("wastePctInput").value);
    const w = (isFinite(wastePct) ? wastePct : 0) / 100;
    order = Math.ceil(need * (1 + Math.max(0, w)));
  }

  areaOut.textContent = isFinite(areaM2) ? `${areaM2.toFixed(3)} ㎡` : "- ㎡";
  needTilesOut.textContent = (need == null || !isFinite(need)) ? "- 枚" : `${Math.ceil(need)} 枚`;
  orderTilesOut.textContent = (order == null || !isFinite(order)) ? "- 枚" : `${order} 枚`;
}

function tileInfo(distMm, tileMm){
  if (distMm == null || !isFinite(distMm) || tileMm == null || !isFinite(tileMm) || tileMm <= 0) return "";
  const n = Math.floor(distMm / tileMm + 1e-9);
  const rem = Math.max(0, distMm - n * tileMm);
  return `（${n}枚 + ${rem.toFixed(1)}mm）`;
}

function intersectionsWithHorizontalLine(poly, y0) {
  const n = poly.length / 2;
  const xs = [];
  for (let i = 0; i < n; i++) {
    const j = (i + 1) % n;
    const x1 = poly[i * 2], y1 = poly[i * 2 + 1], x2 = poly[j * 2], y2 = poly[j * 2 + 1];
    if (Math.abs(y2 - y1) < 1e-9) continue;
    const minY = Math.min(y1, y2), maxY = Math.max(y1, y2);
    if (y0 < minY || y0 >= maxY) continue;
    const t = (y0 - y1) / (y2 - y1);
    xs.push(x1 + (x2 - x1) * t);
  }
  xs.sort((a,b)=>a-b);
  return xs;
}

function intersectionsWithVerticalLine(poly, x0) {
  const n = poly.length / 2;
  const ys = [];
  for (let i = 0; i < n; i++) {
    const j = (i + 1) % n;
    const x1 = poly[i * 2], y1 = poly[i * 2 + 1], x2 = poly[j * 2], y2 = poly[j * 2 + 1];
    if (Math.abs(x2 - x1) < 1e-9) continue;
    const minX = Math.min(x1, x2), maxX = Math.max(x1, x2);
    if (x0 < minX || x0 >= maxX) continue;
    const t = (x0 - x1) / (x2 - x1);
    ys.push(y1 + (y2 - y1) * t);
  }
  ys.sort((a,b)=>a-b);
  return ys;
}

function maxLessThan(arr, v) {
  let best = null;
  for (const a of arr) if (a < v && (best == null || a > best)) best = a;
  return best;
}

function minGreaterThan(arr, v) {
  let best = null;
  for (const a of arr) if (a > v && (best == null || a < best)) best = a;
  return best;
}

function updateBaseDimsToPoly() {
  const base = uiLayer.findOne(".baseDot"), poly = polyShape.points();
  if (!base || !mmPerLocalPx || !gridGroup.visible() || poly.length < 6) {
    setStatus(null, "X左: -\nX右: -\nY上: -\nY下: -");
    return;
  }

  const bx = base.x(), by = base.y(), eps = BASE_INTERSECT_EPS;
  const xs = [...intersectionsWithHorizontalLine(poly, by + eps), ...intersectionsWithHorizontalLine(poly, by - eps)];
  const ys = [...intersectionsWithVerticalLine(poly, bx + eps), ...intersectionsWithVerticalLine(poly, bx - eps)];
  const uniq = (arr) => Array.from(new Set(arr.map(v => Math.round(v * 1000) / 1000))).sort((a,b)=>a-b);
  const xsU = uniq(xs), ysU = uniq(ys);
  const leftX = maxLessThan(xsU, bx), rightX = minGreaterThan(xsU, bx), upY = maxLessThan(ysU, by), downY = minGreaterThan(ysU, by);
  const dxL = (leftX == null) ? null : (bx - leftX), dxR = (rightX == null) ? null : (rightX - bx), dyU = (upY == null) ? null : (by - upY), dyD = (downY == null) ? null : (downY - by);
  const xLmm = dxL == null ? null : Math.abs(stagePxToMmX(dxL)), xRmm = dxR == null ? null : Math.abs(stagePxToMmX(dxR)), yUmm = dyU == null ? null : Math.abs(stagePxToMmY(dyU)), yDmm = dyD == null ? null : Math.abs(stagePxToMmY(dyD));
  const twMm = parseFloat(document.getElementById("tileWidthInput").value), thMm = parseFloat(document.getElementById("tileHeightInput").value);
  const fmt2 = (v, tile) => (v == null || !isFinite(v)) ? "-" : `${v.toFixed(1)}mm ${tileInfo(v, tile)}`;
  setStatus(null, `X左: ${fmt2(xLmm, twMm)}\nX右: ${fmt2(xRmm, twMm)}\nY上: ${fmt2(yUmm, thMm)}\nY下: ${fmt2(yDmm, thMm)}`);
}

function clipPolygonToRect(polyPts, rx0, ry0, rx1, ry1) {
  let output = polyPts;
  const edges = [
    { inside: (p) => p.x >= rx0, intersect: (a,b) => intersectWithVertical(a,b,rx0) },
    { inside: (p) => p.x <= rx1, intersect: (a,b) => intersectWithVertical(a,b,rx1) },
    { inside: (p) => p.y >= ry0, intersect: (a,b) => intersectWithHorizontal(a,b,ry0) },
    { inside: (p) => p.y <= ry1, intersect: (a,b) => intersectWithHorizontal(a,b,ry1) },
  ];

  for (const edge of edges) {
    const input = output;
    output = [];
    if (!input || input.length === 0) break;
    let S = input[input.length - 1];
    for (const E of input) {
      const Ein = edge.inside(E);
      const Sin = edge.inside(S);
      if (Ein) {
        if (!Sin) output.push(edge.intersect(S, E));
        output.push(E);
      } else if (Sin) {
        output.push(edge.intersect(S, E));
      }
      S = E;
    }
  }
  return output;

  function intersectWithVertical(a,b,x){
    const dx=b.x-a.x;
    if (Math.abs(dx)<1e-9) return {x,y:a.y};
    const t=(x-a.x)/dx;
    return {x,y:a.y+(b.y-a.y)*t};
  }

  function intersectWithHorizontal(a,b,y){
    const dy=b.y-a.y;
    if (Math.abs(dy)<1e-9) return {x:a.x,y};
    const t=(y-a.y)/dy;
    return {x:a.x+(b.x-a.x)*t,y};
  }
}

function getBBoxOfPoints(pts) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const p of pts) {
    if (p.x < minX) minX = p.x;
    if (p.y < minY) minY = p.y;
    if (p.x > maxX) maxX = p.x;
    if (p.y > maxY) maxY = p.y;
  }
  if (!isFinite(minX)) return null;
  return { minX, minY, maxX, maxY };
}

function isPointInPoly(x, y, poly) {
  let inside = false;
  const n = poly.length / 2;
  for (let i = 0, j = n - 1; i < n; j = i++) {
    const xi = poly[i*2], yi = poly[i*2+1], xj = poly[j*2], yj = poly[j*2+1];
    const intersect = (yi > y) !== (yj > y) && x < ((xj - xi) * (y - yi)) / (yj - yi + 0.0) + xi;
    if (intersect) inside = !inside;
  }
  return inside;
}

function getPolyBounds(poly) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (let i = 0; i < poly.length; i += 2) {
    const x = poly[i];
    const y = poly[i+1];
    if (x < minX) minX = x;
    if (y < minY) minY = y;
    if (x > maxX) maxX = x;
    if (y > maxY) maxY = y;
  }
  return { minX, minY, maxX, maxY };
}

function updateGrid() {
  if (!mmPerLocalPx) return;
  const poly = polyShape.points();
  if (poly.length < 6) return;

  const twMm = parseFloat(document.getElementById("tileWidthInput").value);
  const thMm = parseFloat(document.getElementById("tileHeightInput").value);
  if (!isFinite(twMm) || !isFinite(thMm) || twMm <= 0 || thMm <= 0) return;

  const dangerMm = Math.max(0, parseFloat(document.getElementById("dangerMmInput").value || "0"));
  const tileLocalW = twMm / mmPerLocalPx;
  const tileLocalH = thMm / mmPerLocalPx;
  const tileStageW = tileLocalW * (photoGroup.scaleX() || 1);
  const tileStageH = tileLocalH * (photoGroup.scaleY() || 1);
  if (!isFinite(tileStageW) || !isFinite(tileStageH) || tileStageW <= 0 || tileStageH <= 0) return;

  lastTileStageW = tileStageW;
  lastTileStageH = tileStageH;

  gridGroup.destroyChildren();

  const b = getPolyBounds(poly);
  const gx = gridGroup.x();
  const gy = gridGroup.y();

  const iMin = Math.floor((b.minX - gx) / tileStageW) - GRID_MARGIN_TILES;
  const iMax = Math.ceil((b.maxX - gx) / tileStageW) + GRID_MARGIN_TILES;
  const jMin = Math.floor((b.minY - gy) / tileStageH) - GRID_MARGIN_TILES;
  const jMax = Math.ceil((b.maxY - gy) / tileStageH) + GRID_MARGIN_TILES;

  const cells = (iMax - iMin + 1) * (jMax - jMin + 1);
  if (cells > GRID_MAX_CELLS) {
    alert(`グリッドが細かすぎます（cells=${cells}）。タイル寸法/縮尺/範囲を見直してください。`);
    return;
  }

  gridGroup.add(new Konva.Rect({
    x:iMin*tileStageW,
    y:jMin*tileStageH,
    width:(iMax-iMin+1)*tileStageW,
    height:(jMax-jMin+1)*tileStageH,
    fill:"rgba(0,0,0,0)",
    listening:true
  }));

  const polyObj = [];
  for (let k = 0; k < poly.length; k += 2) polyObj.push({ x: poly[k], y: poly[k+1] });

  for (let i = iMin; i <= iMax; i++) {
    for (let j = jMin; j <= jMax; j++) {
      const tx = i * tileStageW;
      const ty = j * tileStageH;
      const ax = tx + gx;
      const ay = ty + gy;

      const corners = [
        [ax, ay],
        [ax + tileStageW, ay],
        [ax, ay + tileStageH],
        [ax + tileStageW, ay + tileStageH]
      ];

      const insideCount = corners.filter((c) => isPointInPoly(c[0], c[1], poly)).length;
      if (insideCount === 0) continue;

      let stroke = "rgba(0,123,255,0.35)";
      let fill = "rgba(0,123,255,0.08)";

      if (dangerOn && dangerMm > 0 && insideCount < 4) {
        const clipped = clipPolygonToRect(polyObj, ax, ay, ax + tileStageW, ay + tileStageH);
        const bb = (clipped && clipped.length >= 3) ? getBBoxOfPoints(clipped) : null;

        if (bb) {
          const wMm = Math.abs(stagePxToMmX(Math.max(0, bb.maxX - bb.minX)));
          const hMm = Math.abs(stagePxToMmY(Math.max(0, bb.maxY - bb.minY)));
          if (Math.min(wMm, hMm) < dangerMm) {
            stroke = "red";
            fill = "rgba(255,0,0,0.18)";
          }
        } else {
          const cx = ax + tileStageW / 2;
          const cy = ay + tileStageH / 2;
          if (!isPointInPoly(cx, cy, poly)) {
            stroke = "red";
            fill = "rgba(255,0,0,0.18)";
          }
        }
      }

      gridGroup.add(new Konva.Rect({
        x:tx,
        y:ty,
        width:tileStageW,
        height:tileStageH,
        stroke,
        fill,
        strokeWidth:STROKE_GRID,
        listening:false
      }));
    }
  }

  mainLayer.batchDraw();
  updateBaseDimsToPoly();
}

function mmToStagePxX(mm){
  if (!mmPerLocalPx) return 0;
  const sx = photoGroup.scaleX() || 1;
  return (mm / mmPerLocalPx) * sx;
}

function mmToStagePxY(mm){
  if (!mmPerLocalPx) return 0;
  const sy = photoGroup.scaleY() || 1;
  return (mm / mmPerLocalPx) * sy;
}

function moveGridByMm(dxMm, dyMm){
  if (!gridGroup.visible()) return;
  const dx = mmToStagePxX(dxMm);
  const dy = mmToStagePxY(dyMm);
  gridGroup.position({ x: gridGroup.x() + dx, y: gridGroup.y() + dy });
  updateGrid();
  resnapBaseDot();
}

function moveActivePointByScreenPx(dxPx, dyPx) {
  if (!activePoint) return;

  const dx = dxPx / (stageScale || 1);
  const dy = dyPx / (stageScale || 1);

  let nextPos;

  if (activePoint.hasName("polyDot")) {
    nextPos = {
      x: roundToUnit(activePoint.x() + dx),
      y: roundToUnit(activePoint.y() + dy)
    };
    lastSnapInfo = "";
  } else {
    nextPos = applySmartSnap(
      activePoint,
      { x: activePoint.x() + dx, y: activePoint.y() + dy },
      activePoint.name()
    );
  }

  activePoint.position(nextPos);

  if (activePoint.hasName("polyDot")) syncPoly();
  if (activePoint.hasName("baseDot")) updateBaseDimsToPoly();

  if (activePoint.hasName("alignDot")) {
    const dots = uiLayer.find(".alignDot");
    if (dots.length === 2) {
      alignLine.points([dots[0].x(), dots[0].y(), dots[1].x(), dots[1].y()]);
      alignLine.visible(true);
    }
  }

  if (activePoint.hasName("scaleDot")) {
    const dots = uiLayer.find(".scaleDot");
    if (dots.length === 2) {
      scaleLine.points([dots[0].x(), dots[0].y(), dots[1].x(), dots[1].y()]);
      scaleLine.visible(true);
    }
  }

  updateAssistStatus();
  updateZoom(activePoint.position());
  uiLayer.draw();
}

function setDpadVisible(on){
  const el = document.getElementById("dpad");
  el.style.display = on ? "block" : "none";
  const c = document.getElementById("dCenter");
  if (c) c.textContent = (dpadMode === "grid") ? `${nudgeMm}mm` : `${pointStepPx}px`;
}

function performDpadMove(dx, dy){
  if (dpadMode === "grid") moveGridByMm(dx * nudgeMm, dy * nudgeMm);
  else if (dpadMode === "point") moveActivePointByScreenPx(dx * pointStepPx, dy * pointStepPx);
}

function clearDpadRepeat() {
  if (dpadRepeatTimer) clearTimeout(dpadRepeatTimer);
  if (dpadRepeatInterval) clearInterval(dpadRepeatInterval);
  dpadRepeatTimer = null;
  dpadRepeatInterval = null;
}

function bindRepeatPress(el, onStep) {
  const stop = (ev)=>{ ev.preventDefault(); ev.stopPropagation(); };

  const start = (ev) => {
    stop(ev);
    clearDpadRepeat();
    onStep();
    dpadRepeatTimer = setTimeout(() => {
      dpadRepeatInterval = setInterval(onStep, REPEAT_INTERVAL);
    }, REPEAT_DELAY);
  };

  const end = (ev) => {
    if (ev) stop(ev);
    clearDpadRepeat();
  };

  el.addEventListener("pointerdown", start, { passive: false });
  el.addEventListener("pointerup", end, { passive: false });
  el.addEventListener("pointerleave", end, { passive: false });
  el.addEventListener("pointercancel", end, { passive: false });
}

function bindDpad(){
  bindRepeatPress(document.getElementById("dUp"), () => performDpadMove(0,-1));
  bindRepeatPress(document.getElementById("dDown"), () => performDpadMove(0,1));
  bindRepeatPress(document.getElementById("dLeft"), () => performDpadMove(-1,0));
  bindRepeatPress(document.getElementById("dRight"), () => performDpadMove(1,0));

  document.getElementById("dCenter").addEventListener("pointerdown", (ev)=>{
    ev.preventDefault();
    ev.stopPropagation();
    if (dpadMode === "grid") nudgeMm = (nudgeMm === 5) ? 10 : 5;
    else pointStepPx = (pointStepPx === POINT_STEP_FINE) ? POINT_STEP_COARSE : POINT_STEP_FINE;
    setDpadVisible(true);
  }, { passive: false });
}
bindDpad();

function scoreGridAtPosition(gx, gy){
  if (!mmPerLocalPx) return null;
  const poly = polyShape.points();
  if (poly.length < 6) return null;

  const twMm = parseFloat(document.getElementById("tileWidthInput").value);
  const thMm = parseFloat(document.getElementById("tileHeightInput").value);
  if (!isFinite(twMm)||!isFinite(thMm)||twMm<=0||thMm<=0) return null;

  const dangerMm = Math.max(0, parseFloat(document.getElementById("dangerMmInput").value || "0"));
  const tileLocalW = twMm / mmPerLocalPx;
  const tileLocalH = thMm / mmPerLocalPx;
  const tileStageW = tileLocalW * (photoGroup.scaleX() || 1);
  const tileStageH = tileLocalH * (photoGroup.scaleY() || 1);
  if (!isFinite(tileStageW)||!isFinite(tileStageH)||tileStageW<=0||tileStageH<=0) return null;

  const b = getPolyBounds(poly);
  const iMin = Math.floor((b.minX - gx) / tileStageW) - GRID_MARGIN_TILES;
  const iMax = Math.ceil((b.maxX - gx) / tileStageW) + GRID_MARGIN_TILES;
  const jMin = Math.floor((b.minY - gy) / tileStageH) - GRID_MARGIN_TILES;
  const jMax = Math.ceil((b.maxY - gy) / tileStageH) + GRID_MARGIN_TILES;

  const cells = (iMax - iMin + 1) * (jMax - jMin + 1);
  if (cells > GRID_MAX_CELLS) return { tooMany: true, cells };

  const polyObj = [];
  for (let k = 0; k < poly.length; k += 2) polyObj.push({ x: poly[k], y: poly[k+1] });

  let partialCount = 0;
  let dangerCount = 0;

  for (let i = iMin; i <= iMax; i++) {
    for (let j = jMin; j <= jMax; j++) {
      const tx=i*tileStageW, ty=j*tileStageH, ax=tx+gx, ay=ty+gy;
      const corners=[[ax,ay],[ax+tileStageW,ay],[ax,ay+tileStageH],[ax+tileStageW,ay+tileStageH]];
      const insideCount = corners.filter((c) => isPointInPoly(c[0], c[1], poly)).length;
      if (insideCount===0) continue;
      if (insideCount<4) partialCount++;

      if (dangerOn && insideCount < 4 && dangerMm > 0) {
        const clipped = clipPolygonToRect(polyObj, ax, ay, ax + tileStageW, ay + tileStageH);
        const bb = (clipped && clipped.length >= 3) ? getBBoxOfPoints(clipped) : null;
        let isDanger = false;

        if (bb) {
          const wMm = Math.abs(stagePxToMmX(Math.max(0, bb.maxX - bb.minX)));
          const hMm = Math.abs(stagePxToMmY(Math.max(0, bb.maxY - bb.minY)));
          if (Math.min(wMm, hMm) < dangerMm) isDanger = true;
        } else {
          const cx=ax+tileStageW/2, cy=ay+tileStageH/2;
          if (!isPointInPoly(cx,cy,poly)) isDanger = true;
        }

        if (isDanger) dangerCount++;
      }
    }
  }

  return { dangerCount, partialCount, tileStageW, tileStageH };
}

function modPositive(a, m){
  return ((a % m) + m) % m;
}

async function optimizeGrid(){
  if (!gridGroup.visible()) { alert("先にグリッドを生成してください。"); return; }
  if (!mmPerLocalPx) { alert("先に縮尺合わせを完了してください。"); return; }
  if (polyShape.points().length < 6) { alert("先に施工範囲（ポリゴン）を完了してください。"); return; }

  setStatus("最適割付：探索中…", null);

  const baseX = gridGroup.x();
  const baseY = gridGroup.y();
  const s0 = scoreGridAtPosition(baseX, baseY);

  if (!s0) { alert("スコア計算に失敗"); return; }
  if (s0.tooMany) {
    alert(`グリッドが細かすぎます（cells=${s0.cells}）。タイル寸法/縮尺/範囲を見直してください。`);
    return;
  }

  const W = s0.tileStageW;
  const H = s0.tileStageH;
  const baseOx = modPositive(baseX, W);
  const baseOy = modPositive(baseY, H);

  const coarseStepX = Math.max(1, mmToStagePxX(5));
  const coarseStepY = Math.max(1, mmToStagePxY(5));
  const fineStepX = Math.max(1, mmToStagePxX(1));
  const fineStepY = Math.max(1, mmToStagePxY(1));

  const search = (stepX, stepY, centerOx, centerOy, radiusX, radiusY) => {
    let best = null;
    const x0=(radiusX==null)?0:Math.max(0,centerOx-radiusX);
    const x1=(radiusX==null)?W:Math.min(W,centerOx+radiusX);
    const y0=(radiusY==null)?0:Math.max(0,centerOy-radiusY);
    const y1=(radiusY==null)?H:Math.min(H,centerOy+radiusY);

    for (let ox=x0; ox<x1; ox+=stepX) {
      for (let oy=y0; oy<y1; oy+=stepY) {
        const gx=baseX-baseOx+ox;
        const gy=baseY-baseOy+oy;
        const sc=scoreGridAtPosition(gx,gy);
        if (!sc || sc.tooMany) continue;

        const cand = {
          gx, gy, ox, oy,
          danger: sc.dangerCount,
          partial: sc.partialCount,
          move: Math.hypot(gx-baseX, gy-baseY)
        };

        if (
          !best ||
          cand.danger < best.danger ||
          (cand.danger===best.danger && cand.partial<best.partial) ||
          (cand.danger===best.danger && cand.partial===best.partial && cand.move<best.move)
        ) {
          best=cand;
        }
      }
    }
    return best;
  };

  const bestCoarse = search(coarseStepX, coarseStepY, null, null, null, null);
  if (!bestCoarse) { alert("最適化できませんでした"); return; }

  const bestFine = search(
    fineStepX, fineStepY,
    bestCoarse.ox, bestCoarse.oy,
    coarseStepX * 2, coarseStepY * 2
  ) || bestCoarse;

  gridGroup.position({ x: bestFine.gx, y: bestFine.gy });
  updateGrid();
  resnapBaseDot();
  setStatus(`最適割付：完了（危険=${bestFine.danger} / 欠け=${bestFine.partial}）`, null);
}

document.getElementById("fileInput").onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = async function () {
    if (file.type === "application/pdf") {
      const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
      const page = await pdf.getPage(1);
      const viewport = page.getViewport({ scale: 2.5 });
      const canvas = document.createElement("canvas");
      canvas.height = viewport.height;
      canvas.width = viewport.width;
      await page.render({ canvasContext: canvas.getContext("2d"), viewport }).promise;
      setupImage(canvas);
      trackAppEvent("pdf_loaded", { app_variant: window.location.pathname.includes("/beta/") ? "beta" : "stable" });
    } else {
      const img = new Image();
      img.onload = () => setupImage(img);
      img.src = reader.result;
    }
  };

  if (file.type === "application/pdf") reader.readAsArrayBuffer(file);
  else reader.readAsDataURL(file);
};

function setupImage(source) {
  bgImage.image(source);

  const sc = Math.min(stage.width() / source.width, stage.height() / source.height);
  photoGroup.scale({ x: sc, y: sc });
  photoGroup.position({ x: 0, y: 0 });
  photoGroup.rotation(0);
  photoGroup.offset({ x: 0, y: 0 });

  mmPerLocalPx = 0;
  lastTileStageW = 0;
  lastTileStageH = 0;
  gridConfirmed = false;
  activePoint = null;
  pointDragging = false;
  suppressNextTap = false;
  if (suppressTapTimer) clearTimeout(suppressTapTimer);
  suppressTapTimer = null;
  lastSnapInfo = "";
  clearDpadRepeat();

  stage.draggable(false);
  hideZoomHud();
  resetStageView();
  lockPhoto(false);
  setMode("idle");

  destroyDots("alignDot");
  destroyDots("scaleDot");
  destroyDots("polyDot");
  destroyDots("baseDot");

  polyShape.points([]);
  alignLine.visible(false);
  scaleLine.visible(false);

  gridGroup.visible(false);
  gridGroup.draggable(false);
  gridGroup.position({ x: 0, y: 0 });
  gridGroup.destroyChildren();

  document.getElementById("alignInputArea").style.display = "none";
  document.getElementById("measureInputArea").style.display = "none";
  document.getElementById("polyControls").style.display = "none";
  document.getElementById("polyEditDoneBtn").style.display = "none";
  document.getElementById("polyEditBtn").style.display = "block";

  setDpadVisible(false);
  mainLayer.draw();
  uiLayer.draw();
  setStatus("図面読み込み完了", "X左: -\nX右: -\nY上: -\nY下: -");
  updateAreaAndCount();
}

document.getElementById("applyAlignBtn").onclick = () => {
  const dots = uiLayer.find(".alignDot");
  if (dots.length < 2) return;

  const dx = dots[1].x() - dots[0].x();
  const dy = dots[1].y() - dots[0].y();
  let angle = (Math.atan2(dy, dx) * 180) / Math.PI;
  if (angle > 90) angle -= 180;
  if (angle < -90) angle += 180;

  const centerStage = { x: stage.width() / 2, y: stage.height() / 2 };
  const centerLocal = getPhotoLocalPoint(centerStage);

  photoGroup.offset(centerLocal);
  photoGroup.position(centerStage);
  photoGroup.rotation(photoGroup.rotation() - angle);

  destroyDots("alignDot");
  alignLine.visible(false);
  document.getElementById("alignInputArea").style.display = "none";

  setMode("idle");
  activePoint = null;
  zoomLayer.visible(false);
  hideZoomHud();
  setDpadVisible(false);
  stage.draggable(false);
  resetStageView();

  mainLayer.draw();
  uiLayer.draw();
  if (gridGroup.visible()) updateGrid();
  updateBaseDimsToPoly();
  updateAreaAndCount();
};

document.getElementById("applyScaleBtn").onclick = () => {
  const dots = uiLayer.find(".scaleDot");
  if (dots.length < 2) return;

  const realMm = parseFloat(document.getElementById("realDistInput").value);
  if (!isFinite(realMm) || realMm <= 0) return;

  const p0 = getPhotoLocalPoint({ x: dots[0].x(), y: dots[0].y() });
  const p1 = getPhotoLocalPoint({ x: dots[1].x(), y: dots[1].y() });
  const distLocalPx = Math.hypot(p1.x - p0.x, p1.y - p0.y);
  if (distLocalPx <= 0.00001) return;

  mmPerLocalPx = realMm / distLocalPx;

  destroyDots("scaleDot");
  scaleLine.visible(false);
  document.getElementById("measureInputArea").style.display = "none";
  setMode("idle");
  setStatus(`縮尺確定：${mmPerLocalPx.toFixed(4)} mm/px(図面)`, null);
  activePoint = null;
  zoomLayer.visible(false);
  hideZoomHud();
  setDpadVisible(false);

function getPointerPos(e){
  stage.setPointersPositions(e.evt);
  const p = stage.getPointerPosition();
  if (!p) return null;
  const sx = stage.scaleX() || 1;
  const sy = stage.scaleY() || 1;
  return { x: (p.x - stage.x()) / sx, y: (p.y - stage.y()) / sy };
}

stage.on("pointerdown", (e) => {
  if (mode === "idle") return;
  if (pointDragging) return;

  if (zoomHudMode === "point" && activePoint) return;

  const layer = e.target && e.target.getLayer && e.target.getLayer();
  if (layer === uiLayer || layer === zoomLayer) return;

  const isBackgroundTarget = (e.target === bgImage || e.target === stage || e.target === gridGroup);
  if (!isBackgroundTarget) return;

  const pos = getPointerPos(e);
  if (!pos) return;

  if (mode === "aligning") {
    if (uiLayer.find(".alignDot").length < 2) {
      createPoint(pos, "#6f42c1", "alignDot");
      armTapSuppression();
      const dots = uiLayer.find(".alignDot");
      if (dots.length === 2) {
        alignLine.points([dots[0].x(), dots[0].y(), dots[1].x(), dots[1].y()]);
        alignLine.visible(true);
      }
      uiLayer.draw();
    }
  } else if (mode === "measuring") {
    if (uiLayer.find(".scaleDot").length < 2) {
      createPoint(pos, "red", "scaleDot");
      armTapSuppression();
      const dots = uiLayer.find(".scaleDot");
      if (dots.length === 2) {
        scaleLine.points([dots[0].x(), dots[0].y(), dots[1].x(), dots[1].y()]);
        scaleLine.visible(true);
      }
      uiLayer.draw();
    }
  } else if (mode === "drawing") {
    createPoint(pos, "#fd7e14", "polyDot");
    armTapSuppression();
    syncPoly();
    uiLayer.draw();
  } else if (mode === "settingBase") {
    destroyDots("baseDot");
    createPoint(pos, "#00bfff", "baseDot", { snapOnCreate: true, snapOnDragEnd: true });
    armTapSuppression();
    setMode("idle");
    uiLayer.draw();
    updateBaseDimsToPoly();
    setStatus("基準点 設置完了（mm/枚数/半端 表示）", null);
    activePoint = null;
    zoomLayer.visible(false);
    hideZoomHud();
    setDpadVisible(false);
    stage.draggable(false);
    resetStageView();
  }
});
