<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>割付ポンっ | ポータル</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background:
        radial-gradient(circle at top, rgba(0,123,255,0.10), transparent 28%),
        linear-gradient(180deg, #1f1f1f 0%, #111111 100%);
      color: #ffffff;
      min-height: 100vh;
      padding:
        max(20px, env(safe-area-inset-top))
        16px
        calc(28px + env(safe-area-inset-bottom));
    }

    .wrap {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
    }

    .hero {
      text-align: center;
      padding: 30px 18px 18px;
    }

    .logo {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: 0.03em;
      line-height: 1.15;
      margin-bottom: 10px;
    }

    .hero-title {
      font-size: 18px;
      font-weight: 800;
      color: rgba(255, 255, 255, 0.96);
      margin-bottom: 10px;
      line-height: 1.45;
    }

    .sub {
      font-size: 14px;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.82);
    }

    .panel {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 22px;
      padding: 18px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.28);
    }

    .grid {
      display: grid;
      gap: 14px;
      margin-top: 4px;
    }

    .card {
      position: relative;
      display: block;
      text-decoration: none;
      color: #ffffff;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 18px;
      padding: 18px 52px 18px 16px;
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
      overflow: hidden;
    }

    .card:active {
      transform: scale(0.985);
      background: rgba(255, 255, 255, 0.11);
    }

    .card::after {
      content: "›";
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 28px;
      line-height: 1;
      color: rgba(255, 255, 255, 0.45);
      font-weight: 500;
    }

    .card-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 6px;
      line-height: 1.35;
    }

    .card-desc {
      font-size: 13px;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.82);
    }

    .stable {
      border-left: 6px solid #28a745;
    }

    .beta {
      border-left: 6px solid #fd7e14;
    }

    .manual {
      border-left: 6px solid #007bff;
    }

    .note {
      margin-top: 18px;
      font-size: 12px;
      line-height: 1.7;
      text-align: center;
      color: rgba(255, 255, 255, 0.68);
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.08em;
      color: rgba(255, 255, 255, 0.55);
    }

    @media (min-width: 700px) {
      .grid {
        grid-template-columns: 1fr 1fr;
      }

      .manual-wide {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="logo">割付ポンっ</div>
      <div class="hero-title">安定版・Beta版・マニュアル</div>
      <div class="sub">
        用途に合わせて選んでください。
      </div>
    </div>

    <div class="panel">
      <div class="grid">
        <a class="card stable" href="./stable/index.html">
          <div class="card-title">安定版</div>
          <div class="card-desc">
            普段使い向け。動作確認済みの安定したバージョンを開きます。
          </div>
        </a>

        <a class="card beta" href="./beta/index.html">
          <div class="card-title">Beta版 v3.5.6</div>
          <div class="card-desc">
            新機能や調整中の内容を試す版です。挙動確認やテスト用にどうぞ。
          </div>
        </a>

        <a class="card manual manual-wide" href="./manual/index.html">
          <div class="card-title">使い方マニュアル</div>
          <div class="card-desc">
            基本操作、水平合わせ、縮尺合わせ、施工範囲指定、グリッド生成、
            基準点、保存方法などをまとめたマニュアルです。
          </div>
        </a>
      </div>

      <div class="note">
        ※ Beta版は調整中のため、安定版と挙動が異なる場合があります。
      </div>
    </div>

    <div class="footer">
      MKCRaFT
    </div>
  </div>
</body>
</html>
