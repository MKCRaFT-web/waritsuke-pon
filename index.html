<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>割付ポンッ！ - 完全版（積算追加）</title>

  <script src="https://unpkg.com/konva@9/konva.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

  <style>
    * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }
    body { margin: 0; padding: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; touch-action: none; }

    #container{ position: fixed; inset: 0; width: 100vw; height: 100vh; }

    #controls{
      position: absolute; top: 10px; left: 10px; z-index: 100;
      background: rgba(255,255,255,0.95); border-radius: 12px; width: 270px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      max-height: 72vh; display: flex; flex-direction: column; overflow: hidden;
      transition: transform 0.25s ease;
    }
    #controls.minimized{ transform: translateX(-255px); }

    #controlsHeader{ position: relative; padding: 10px; border-bottom: 1px solid rgba(0,0,0,0.08); }
    #controlsBody{ padding: 10px; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }

    #toggleBtn{
      position: absolute; right: -26px; top: 10px;
      width: 56px; height: 56px;
      background: #007bff; color: white;
      border-radius: 14px; border: 3px solid white;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; cursor: pointer; user-select: none;
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
    }
    #toggleBtn:active { transform: scale(0.98); }

    .section { background: #f0f2f5; padding: 8px; border-radius: 8px; margin-bottom: 6px; border-left: 4px solid #007bff; }
    .btn { background: #007bff; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; margin: 3px 0; font-weight: bold; font-size: 12px; }
    .btn-purple { background: #6f42c1; } .btn-green { background: #28a745; } .btn-orange { background: #fd7e14; } .btn-red { background: #dc3545; }
    .btn-dark { background:#333; } .btn-black { background:#000; } .btn-gray { background:#6c757d; }
    .row { display:flex; gap:6px; align-items:center; }
    input { width: 100%; padding: 6px; border-radius: 4px; border: 1px solid #ccc; font-size: 14px; margin: 4px 0; }
    label { font-size: 11px; font-weight: bold; display:block; margin-top:4px; }
    .hint { font-size: 11px; color:#333; margin-top:4px; line-height: 1.35; }

    .kv { display:flex; justify-content: space-between; gap:10px; font-size: 12px; margin-top: 6px; }
    .kv b { font-size: 12px; }
    .pill { background:#fff; border:1px solid rgba(0,0,0,0.12); border-radius: 999px; padding: 3px 8px; font-weight: 700; }

    #statusBar {
      position: absolute; left: 0; right: 0; bottom: 0; z-index: 90;
      background: rgba(0,0,0,0.65); color: #fff;
      padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
      font-size: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    #statusLeft { white-space: nowrap; overflow:hidden; text-overflow: ellipsis; }
    #statusRight { white-space: pre-wrap; line-height: 1.25; }
  </style>
</head>

<body>
  <div id="controls">
    <div id="controlsHeader">
      <div id="toggleBtn" aria-label="メニューを開閉">⇔</div>
      <input type="file" id="fileInput" accept="image/*,.pdf" />
    </div>

    <div id="controlsBody">
      <div class="section">
        <button class="btn btn-dark" id="lockBtn">図面ロック：OFF</button>
        <div class="hint">※グリッド表示後は基本ロック推奨</div>
      </div>

      <div class="section">
        <button class="btn btn-purple" id="alignBtn">0. 水平合わせ</button>
        <div id="alignInputArea" style="display:none;">
          <button class="btn btn-green" id="applyAlignBtn">確定</button>
        </div>
      </div>

      <div class="section">
        <button class="btn" id="measureBtn">1. 縮尺合わせ</button>
        <div id="measureInputArea" style="display:none;">
          <label>実寸(mm)</label>
          <input type="number" id="realDistInput" value="1000" />
          <button class="btn btn-green" id="applyScaleBtn">確定</button>
        </div>
      </div>

      <div class="section">
        <button class="btn btn-orange" id="polyBtn">2. 施工範囲指定</button>

        <div id="polyControls" style="display:none;">
          <button class="btn btn-red" id="undoBtn">戻す</button>
          <button class="btn btn-green" id="closePolyBtn">完了（範囲ロック）</button>
        </div>

        <button class="btn btn-gray" id="polyEditBtn">✏️ 範囲調整（点を動かす）</button>
        <button class="btn btn-green" id="polyEditDoneBtn" style="display:none;">✅ 調整完了（ロック）</button>

        <div class="hint">
          ・完了後は点が動かない（誤操作防止）<br>
          ・直したい時だけ「範囲調整」
        </div>
      </div>

      <div class="section">
        <label>タイル(mm)</label>
        <div class="row">
          <input type="number" id="tileWidthInput" value="300" />
          <input type="number" id="tileHeightInput" value="300" />
        </div>
        <button class="btn btn-green" id="showGridBtn">3. グリッド生成（表示）</button>
        <button class="btn btn-dark" id="confirmGridBtn">4. グリッド確定（固定）</button>
        <div class="hint">※グリッド生成後は「グリッドのみ」ドラッグ</div>
      </div>

      <div class="section">
        <label>危険小片表示</label>
        <button class="btn btn-red" id="dangerToggleBtn">危険小片：ON</button>
        <label>危険小片(mm) しきい値</label>
        <input type="number" id="dangerMmInput" value="30" />
        <div class="hint">※欠けタイルの「最小幅/最小高さ（近似）」がこの値未満なら赤</div>
      </div>

      <div class="section">
        <label>積算</label>
        <label>ロス率(%)</label>
        <input type="number" id="wastePctInput" value="5" />
        <div class="kv">
          <div>施工面積</div>
          <div class="pill" id="areaOut">- ㎡</div>
        </div>
        <div class="kv">
          <div>必要枚数(理論)</div>
          <div class="pill" id="needTilesOut">- 枚</div>
        </div>
        <div class="kv">
          <div>発注枚数(ロス込)</div>
          <div class="pill" id="orderTilesOut">- 枚</div>
        </div>
        <div class="hint">※簡易積算：施工面積÷タイル面積×(1+ロス率)</div>
      </div>

      <div class="section">
        <button class="btn btn-dark" id="basePointBtn">5. 基準点（交点スナップ）</button>
        <div class="hint">
          ✅ 下の表示は<br>
          X(左/右)：基準点の水平線と範囲境界の交点まで<br>
          Y(上/下)：基準点の垂直線と範囲境界の交点まで
        </div>
      </div>

      <button class="btn btn-black" id="saveImageBtn">📸 保存</button>
    </div>
  </div>

  <div id="container"></div>

  <div id="statusBar">
    <div id="statusLeft">図面を読み込んで開始</div>
    <div id="statusRight">X(左/右): - / -
Y(上/下): - / -</div>
  </div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js";

    // ========= Konva setup =========
    const stage = new Konva.Stage({ container: "container", width: window.innerWidth, height: window.innerHeight });
    const mainLayer = new Konva.Layer();
    const uiLayer = new Konva.Layer();
    const zoomLayer = new Konva.Layer({ visible: false });

    const photoGroup = new Konva.Group({ draggable: true });
    const bgImage = new Konva.Image({ listening: true });

    const gridGroup = new Konva.Group({ draggable: false, visible: false });

    const polyShape = new Konva.Line({
      stroke: "#fd7e14", strokeWidth: 2, fill: "rgba(253, 126, 20, 0.2)",
      closed: true, points: [], listening: false,
    });

    const alignLine = new Konva.Line({ stroke: "#6f42c1", strokeWidth: 2, dash: [5, 5], visible: false, listening: false });
    const scaleLine = new Konva.Line({ stroke: "red", strokeWidth: 2, dash: [4, 4], visible: false, listening: false });

    // zoom magnifier
    const zoomGroup = new Konva.Group();
    const zoomContent = new Konva.Image();
    zoomGroup.add(new Konva.Circle({ radius: 85, stroke: "#fff", strokeWidth: 3, fill: "#000" }), zoomContent);
    zoomGroup.add(
      new Konva.Line({ points: [-20, 0, 20, 0], stroke: "#0f0", strokeWidth: 2 }),
      new Konva.Line({ points: [0, -20, 0, 20], stroke: "#0f0", strokeWidth: 2 })
    );
    zoomLayer.add(zoomGroup);

    photoGroup.add(bgImage);
    mainLayer.add(photoGroup, gridGroup);
    uiLayer.add(polyShape, alignLine, scaleLine);
    stage.add(mainLayer, uiLayer, zoomLayer);

    // ========= State =========
    let mode = "idle"; // idle / aligning / measuring / drawing / polyAdjust / gridAdjust / settingBase
    let mmPerLocalPx = 0;
    let photoLocked = false;
    let dangerOn = true;

    let lastTileStageW = 0;
    let lastTileStageH = 0;

    const statusLeft = document.getElementById("statusLeft");
    const statusRight = document.getElementById("statusRight");

    const areaOut = document.getElementById("areaOut");
    const needTilesOut = document.getElementById("needTilesOut");
    const orderTilesOut = document.getElementById("orderTilesOut");

    function setStatus(left, right) {
      if (left != null) statusLeft.textContent = left;
      if (right != null) statusRight.textContent = right;
    }

    function lockPhoto(lock) {
      photoLocked = !!lock;
      photoGroup.draggable(!photoLocked);
      bgImage.listening(!photoLocked);
      document.getElementById("lockBtn").textContent = "図面ロック：" + (photoLocked ? "ON" : "OFF");
    }

    function setMode(next) {
      mode = next;
      const label = {
        idle: "待機",
        aligning: "水平合わせ（2点）",
        measuring: "縮尺合わせ（2点）",
        drawing: "施工範囲指定（点追加/ドラッグ）",
        polyAdjust: "範囲調整（点ドラッグ）",
        gridAdjust: "グリッド調整（グリッドドラッグ）",
        settingBase: "基準点（交点スナップ）",
      }[mode] || mode;
      setStatus("工程: " + label, null);
    }

    function getPhotoLocalPoint(stagePoint) {
      const inv = photoGroup.getAbsoluteTransform().copy().invert();
      return inv.point(stagePoint);
    }

    function stagePxToMmX(px) {
      if (!mmPerLocalPx) return 0;
      const sx = photoGroup.scaleX() || 1;
      return (px / sx) * mmPerLocalPx;
    }
    function stagePxToMmY(px) {
      if (!mmPerLocalPx) return 0;
      const sy = photoGroup.scaleY() || 1;
      return (px / sy) * mmPerLocalPx;
    }

    function updateZoom(pos) {
      if (!bgImage.image()) return;
      zoomLayer.visible(true);

      let zX = pos.x, zY = pos.y - 140;
      if (zX < 90) zX = 90;
      if (zX > stage.width() - 90) zX = stage.width() - 90;
      if (zY < 90) zY = pos.y + 140;

      zoomGroup.position({ x: zX, y: zY });

      const localPos = getPhotoLocalPoint(pos);
      const mag = 4;

      zoomContent.image(bgImage.image());
      zoomContent.width(bgImage.image().width);
      zoomContent.height(bgImage.image().height);

      zoomContent.scale({ x: photoGroup.scaleX() * mag, y: photoGroup.scaleY() * mag });
      zoomContent.rotation(photoGroup.rotation());

      zoomContent.position({
        x: -localPos.x * photoGroup.scaleX() * mag,
        y: -localPos.y * photoGroup.scaleY() * mag,
      });

      zoomContent.clipFunc((ctx) => {
        ctx.arc(
          localPos.x * photoGroup.scaleX() * mag,
          localPos.y * photoGroup.scaleY() * mag,
          85, 0, Math.PI * 2
        );
      });

      zoomLayer.batchDraw();
    }

    function destroyDots(name) {
      uiLayer.find("." + name).forEach((d) => d.destroy());
      uiLayer.draw();
    }

    function syncPoly() {
      const dots = uiLayer.find(".polyDot");
      const pts = [];
      dots.forEach((d) => pts.push(d.x(), d.y()));
      polyShape.points(pts);
      uiLayer.batchDraw();
      updateBaseDimsToPoly();
      updateAreaAndCount();
    }

    function setPolyDotsDraggable(on) {
      uiLayer.find(".polyDot").forEach(d => d.draggable(!!on));
    }

    function snapToGrid(stagePos) {
      if (!gridGroup.visible() || !lastTileStageW || !lastTileStageH) return stagePos;
      const localX = stagePos.x - gridGroup.x();
      const localY = stagePos.y - gridGroup.y();
      const snapX = Math.round(localX / lastTileStageW) * lastTileStageW;
      const snapY = Math.round(localY / lastTileStageH) * lastTileStageH;
      return { x: gridGroup.x() + snapX, y: gridGroup.y() + snapY };
    }

    function resnapBaseDot() {
      const base = uiLayer.findOne(".baseDot");
      if (!base) return;
      const s = snapToGrid({ x: base.x(), y: base.y() });
      base.position(s);
      uiLayer.draw();
      updateBaseDimsToPoly();
    }

    function createPoint(pos, color, dotName, { snapOnCreate = false, snapOnDragEnd = false } = {}) {
      const p0 = snapOnCreate ? snapToGrid(pos) : pos;

      const g = new Konva.Group({ x: p0.x, y: p0.y, draggable: true, name: dotName });
      g.add(new Konva.Circle({ radius: 35, fill: "transparent", listening: true }));
      g.add(new Konva.Line({ points: [-18, 0, 18, 0], stroke: color, strokeWidth: 2, listening: false }));
      g.add(new Konva.Line({ points: [0, -18, 0, 18], stroke: color, strokeWidth: 2, listening: false }));
      g.add(new Konva.Circle({ radius: 5, fill: color, stroke: "#fff", strokeWidth: 1, listening: false }));

      g.on("dragmove", () => {
        updateZoom(g.position());
        if (dotName === "polyDot") syncPoly();
        if (dotName === "baseDot") updateBaseDimsToPoly();
      });

      g.on("dragend", () => {
        zoomLayer.visible(false);
        if (snapOnDragEnd) {
          const s = snapToGrid({ x: g.x(), y: g.y() });
          g.position(s);
        }
        if (dotName === "polyDot") syncPoly();
        if (dotName === "baseDot") updateBaseDimsToPoly();
        uiLayer.draw();
      });

      uiLayer.add(g);
      return g;
    }

    // ========= 面積・枚数積算 =========
    function polygonAreaSigned(points) {
      // points: [x1,y1,x2,y2,...] stage coords
      const n = points.length / 2;
      if (n < 3) return 0;
      let sum = 0;
      for (let i = 0; i < n; i++) {
        const j = (i + 1) % n;
        const xi = points[i*2], yi = points[i*2+1];
        const xj = points[j*2], yj = points[j*2+1];
        sum += (xi * yj - xj * yi);
      }
      return sum / 2;
    }

    function updateAreaAndCount() {
      const poly = polyShape.points();
      if (!mmPerLocalPx || poly.length < 6) {
        areaOut.textContent = "- ㎡";
        needTilesOut.textContent = "- 枚";
        orderTilesOut.textContent = "- 枚";
        return;
      }

      // stage px^2 → local px^2 に戻す（scale補正）
      const sx = photoGroup.scaleX() || 1;
      const sy = photoGroup.scaleY() || 1;
      const areaStage = Math.abs(polygonAreaSigned(poly));
      const areaLocal = areaStage / (sx * sy);

      // local px^2 → mm^2 → m^2
      const areaMm2 = areaLocal * (mmPerLocalPx * mmPerLocalPx);
      const areaM2 = areaMm2 / 1e6;

      // tile
      const twMm = parseFloat(document.getElementById("tileWidthInput").value);
      const thMm = parseFloat(document.getElementById("tileHeightInput").value);
      const tileAreaMm2 = (isFinite(twMm) && isFinite(thMm) && twMm > 0 && thMm > 0) ? (twMm * thMm) : 0;

      let need = null;
      let order = null;

      if (tileAreaMm2 > 0) {
        need = areaMm2 / tileAreaMm2;

        const wastePct = parseFloat(document.getElementById("wastePctInput").value);
        const w = (isFinite(wastePct) ? wastePct : 0) / 100;
        order = Math.ceil(need * (1 + Math.max(0, w)));
      }

      areaOut.textContent = isFinite(areaM2) ? `${areaM2.toFixed(3)} ㎡` : "- ㎡";
      needTilesOut.textContent = (need == null || !isFinite(need)) ? "- 枚" : `${Math.ceil(need)} 枚`;
      orderTilesOut.textContent = (order == null || !isFinite(order)) ? "- 枚" : `${order} 枚`;
    }

    // ========= 寸法（基準点→ポリゴン境界交点まで） =========
    function updateBaseDimsToPoly() {
      const base = uiLayer.findOne(".baseDot");
      const poly = polyShape.points();
      if (!base || !mmPerLocalPx || !gridGroup.visible() || poly.length < 6) {
        setStatus(null, "X(左/右): - / -\nY(上/下): - / -");
        return;
      }

      const bx = base.x();
      const by = base.y();

      const xs = intersectionsWithHorizontalLine(poly, by);
      const ys = intersectionsWithVerticalLine(poly, bx);

      const leftX = maxLessThan(xs, bx);
      const rightX = minGreaterThan(xs, bx);
      const upY = maxLessThan(ys, by);
      const downY = minGreaterThan(ys, by);

      const dxL = (leftX == null) ? null : (bx - leftX);
      const dxR = (rightX == null) ? null : (rightX - bx);
      const dyU = (upY == null) ? null : (by - upY);
      const dyD = (downY == null) ? null : (downY - by);

      const xLmm = dxL == null ? null : Math.abs(stagePxToMmX(dxL));
      const xRmm = dxR == null ? null : Math.abs(stagePxToMmX(dxR));
      const yUmm = dyU == null ? null : Math.abs(stagePxToMmY(dyU));
      const yDmm = dyD == null ? null : Math.abs(stagePxToMmY(dyD));

      const fmt = (v) => (v == null || !isFinite(v)) ? "-" : v.toFixed(1) + "mm";
      setStatus(null, `X(左/右): ${fmt(xLmm)} / ${fmt(xRmm)}\nY(上/下): ${fmt(yUmm)} / ${fmt(yDmm)}`);
    }

    function intersectionsWithHorizontalLine(poly, y0) {
      const n = poly.length / 2;
      const xs = [];
      for (let i = 0; i < n; i++) {
        const j = (i + 1) % n;
        const x1 = poly[i * 2], y1 = poly[i * 2 + 1];
        const x2 = poly[j * 2], y2 = poly[j * 2 + 1];
        if (Math.abs(y2 - y1) < 1e-9) continue;
        const minY = Math.min(y1, y2);
        const maxY = Math.max(y1, y2);
        if (y0 < minY || y0 >= maxY) continue;
        const t = (y0 - y1) / (y2 - y1);
        xs.push(x1 + (x2 - x1) * t);
      }
      xs.sort((a,b)=>a-b);
      return xs;
    }

    function intersectionsWithVerticalLine(poly, x0) {
      const n = poly.length / 2;
      const ys = [];
      for (let i = 0; i < n; i++) {
        const j = (i + 1) % n;
        const x1 = poly[i * 2], y1 = poly[i * 2 + 1];
        const x2 = poly[j * 2], y2 = poly[j * 2 + 1];
        if (Math.abs(x2 - x1) < 1e-9) continue;
        const minX = Math.min(x1, x2);
        const maxX = Math.max(x1, x2);
        if (x0 < minX || x0 >= maxX) continue;
        const t = (x0 - x1) / (x2 - x1);
        ys.push(y1 + (y2 - y1) * t);
      }
      ys.sort((a,b)=>a-b);
      return ys;
    }

    function maxLessThan(arr, v) {
      let best = null;
      for (const a of arr) if (a < v && (best == null || a > best)) best = a;
      return best;
    }
    function minGreaterThan(arr, v) {
      let best = null;
      for (const a of arr) if (a > v && (best == null || a < best)) best = a;
      return best;
    }

    // ========= ポリゴン × 長方形 クリップ（Sutherland–Hodgman） =========
    function clipPolygonToRect(polyPts, rx0, ry0, rx1, ry1) {
      let output = polyPts;

      const edges = [
        { inside: (p) => p.x >= rx0, intersect: (a,b) => intersectWithVertical(a,b,rx0) }, // left
        { inside: (p) => p.x <= rx1, intersect: (a,b) => intersectWithVertical(a,b,rx1) }, // right
        { inside: (p) => p.y >= ry0, intersect: (a,b) => intersectWithHorizontal(a,b,ry0) }, // top
        { inside: (p) => p.y <= ry1, intersect: (a,b) => intersectWithHorizontal(a,b,ry1) }, // bottom
      ];

      for (const edge of edges) {
        const input = output;
        output = [];
        if (!input || input.length === 0) break;

        let S = input[input.length - 1];
        for (const E of input) {
          const Ein = edge.inside(E);
          const Sin = edge.inside(S);

          if (Ein) {
            if (!Sin) output.push(edge.intersect(S, E));
            output.push(E);
          } else if (Sin) {
            output.push(edge.intersect(S, E));
          }
          S = E;
        }
      }
      return output;

      function intersectWithVertical(a,b,x) {
        const dx = b.x - a.x;
        if (Math.abs(dx) < 1e-9) return { x, y: a.y };
        const t = (x - a.x) / dx;
        return { x, y: a.y + (b.y - a.y) * t };
      }
      function intersectWithHorizontal(a,b,y) {
        const dy = b.y - a.y;
        if (Math.abs(dy) < 1e-9) return { x: a.x, y };
        const t = (y - a.y) / dy;
        return { x: a.x + (b.x - a.x) * t, y };
      }
    }

    function getBBoxOfPoints(pts) {
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (const p of pts) {
        if (p.x < minX) minX = p.x;
        if (p.y < minY) minY = p.y;
        if (p.x > maxX) maxX = p.x;
        if (p.y > maxY) maxY = p.y;
      }
      if (!isFinite(minX)) return null;
      return { minX, minY, maxX, maxY };
    }

    // ========= Grid =========
    function isPointInPoly(x, y, poly) {
      let inside = false;
      const n = poly.length / 2;
      for (let i = 0, j = n - 1; i < n; j = i++) {
        const xi = poly[i * 2], yi = poly[i * 2 + 1];
        const xj = poly[j * 2], yj = poly[j * 2 + 1];
        const intersect = (yi > y) !== (yj > y) && x < ((xj - xi) * (y - yi)) / (yj - yi + 0.0) + xi;
        if (intersect) inside = !inside;
      }
      return inside;
    }

    function getPolyBounds(poly) {
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (let i = 0; i < poly.length; i += 2) {
        const x = poly[i], y = poly[i + 1];
        if (x < minX) minX = x;
        if (y < minY) minY = y;
        if (x > maxX) maxX = x;
        if (y > maxY) maxY = y;
      }
      return { minX, minY, maxX, maxY };
    }

    function updateGrid() {
      if (!mmPerLocalPx) return;
      const poly = polyShape.points();
      if (poly.length < 6) return;

      const twMm = parseFloat(document.getElementById("tileWidthInput").value);
      const thMm = parseFloat(document.getElementById("tileHeightInput").value);
      if (!isFinite(twMm) || !isFinite(thMm) || twMm <= 0 || thMm <= 0) return;

      const dangerMm = Math.max(0, parseFloat(document.getElementById("dangerMmInput").value || "0"));

      const tileLocalW = twMm / mmPerLocalPx;
      const tileLocalH = thMm / mmPerLocalPx;

      const tileStageW = tileLocalW * (photoGroup.scaleX() || 1);
      const tileStageH = tileLocalH * (photoGroup.scaleY() || 1);
      if (!isFinite(tileStageW) || !isFinite(tileStageH) || tileStageW <= 0 || tileStageH <= 0) return;

      lastTileStageW = tileStageW;
      lastTileStageH = tileStageH;

      gridGroup.destroyChildren();

      const b = getPolyBounds(poly);
      const gx = gridGroup.x();
      const gy = gridGroup.y();

      const extraI = Math.ceil(stage.width() / tileStageW) + 2;
      const extraJ = Math.ceil(stage.height() / tileStageH) + 2;

      const iMin = Math.floor((b.minX - gx) / tileStageW) - extraI;
      const iMax = Math.ceil((b.maxX - gx) / tileStageW) + extraI;
      const jMin = Math.floor((b.minY - gy) / tileStageH) - extraJ;
      const jMax = Math.ceil((b.maxY - gy) / tileStageH) + extraJ;

      const maxCells = 45000;
      const cells = (iMax - iMin + 1) * (jMax - jMin + 1);
      if (cells > maxCells) {
        alert("グリッドが細かすぎます（表示が重くなるため中止）。タイル寸法を見直してください。");
        return;
      }

      const hitRect = new Konva.Rect({
        x: iMin * tileStageW,
        y: jMin * tileStageH,
        width: (iMax - iMin + 1) * tileStageW,
        height: (jMax - jMin + 1) * tileStageH,
        fill: "rgba(0,0,0,0)",
        listening: true
      });
      gridGroup.add(hitRect);

      const polyObj = [];
      for (let k = 0; k < poly.length; k += 2) polyObj.push({ x: poly[k], y: poly[k+1] });

      for (let i = iMin; i <= iMax; i++) {
        for (let j = jMin; j <= jMax; j++) {
          const tx = i * tileStageW;
          const ty = j * tileStageH;

          const ax = tx + gx;
          const ay = ty + gy;

          const corners = [
            [ax, ay],
            [ax + tileStageW, ay],
            [ax, ay + tileStageH],
            [ax + tileStageW, ay + tileStageH],
          ];

          const insideCount = corners.filter((c) => isPointInPoly(c[0], c[1], poly)).length;
          if (insideCount === 0) continue;

          let stroke = "rgba(0,123,255,0.4)";
          let fill = "rgba(0,123,255,0.1)";

          if (dangerOn && dangerMm > 0) {
            if (insideCount < 4) {
              const rx0 = ax, ry0 = ay, rx1 = ax + tileStageW, ry1 = ay + tileStageH;
              const clipped = clipPolygonToRect(polyObj, rx0, ry0, rx1, ry1);
              const bb = (clipped && clipped.length >= 3) ? getBBoxOfPoints(clipped) : null;

              if (bb) {
                const wStage = Math.max(0, bb.maxX - bb.minX);
                const hStage = Math.max(0, bb.maxY - bb.minY);
                const wMm = Math.abs(stagePxToMmX(wStage));
                const hMm = Math.abs(stagePxToMmY(hStage));
                const minDim = Math.min(wMm, hMm);

                if (minDim < dangerMm) {
                  stroke = "red";
                  fill = "rgba(255,0,0,0.22)";
                }
              } else {
                const cx = ax + tileStageW / 2;
                const cy = ay + tileStageH / 2;
                if (!isPointInPoly(cx, cy, poly)) {
                  stroke = "red";
                  fill = "rgba(255,0,0,0.22)";
                }
              }
            }
          } else if (dangerOn) {
            const cx = ax + tileStageW / 2;
            const cy = ay + tileStageH / 2;
            if (insideCount < 4 && !isPointInPoly(cx, cy, poly)) {
              stroke = "red";
              fill = "rgba(255,0,0,0.2)";
            }
          }

          gridGroup.add(new Konva.Rect({
            x: tx, y: ty,
            width: tileStageW, height: tileStageH,
            stroke, fill,
            listening: false
          }));
        }
      }

      mainLayer.batchDraw();
      updateBaseDimsToPoly();
    }

    gridGroup.on("dragend", () => {
      updateGrid();
      resnapBaseDot();
    });

    // ========= file load =========
    document.getElementById("fileInput").onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async function () {
        if (file.type === "application/pdf") {
          const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
          const page = await pdf.getPage(1);
          const viewport = page.getViewport({ scale: 2.5 });

          const canvas = document.createElement("canvas");
          canvas.height = viewport.height;
          canvas.width = viewport.width;

          await page.render({ canvasContext: canvas.getContext("2d"), viewport }).promise;
          setupImage(canvas);
        } else {
          const img = new Image();
          img.onload = () => setupImage(img);
          img.src = reader.result;
        }
      };

      if (file.type === "application/pdf") reader.readAsArrayBuffer(file);
      else reader.readAsDataURL(file);
    };

    function setupImage(source) {
      bgImage.image(source);

      const sc = Math.min(stage.width() / source.width, stage.height() / source.height);
      photoGroup.scale({ x: sc, y: sc });
      photoGroup.position({ x: 0, y: 0 });
      photoGroup.rotation(0);
      photoGroup.offset({ x: 0, y: 0 });

      mmPerLocalPx = 0;
      lastTileStageW = 0;
      lastTileStageH = 0;

      lockPhoto(false);
      setMode("idle");

      destroyDots("alignDot");
      destroyDots("scaleDot");
      destroyDots("polyDot");
      destroyDots("baseDot");

      polyShape.points([]);
      alignLine.visible(false);
      scaleLine.visible(false);

      gridGroup.visible(false);
      gridGroup.draggable(false);
      gridGroup.position({ x: 0, y: 0 });
      gridGroup.destroyChildren();

      document.getElementById("alignInputArea").style.display = "none";
      document.getElementById("measureInputArea").style.display = "none";
      document.getElementById("polyControls").style.display = "none";
      document.getElementById("polyEditDoneBtn").style.display = "none";
      document.getElementById("polyEditBtn").style.display = "block";

      mainLayer.draw();
      uiLayer.draw();

      setStatus("図面読み込み完了", "X(左/右): - / -\nY(上/下): - / -");
      updateAreaAndCount();
    }

    // ========= UI =========
    document.getElementById("toggleBtn").onclick = () =>
      document.getElementById("controls").classList.toggle("minimized");

    document.getElementById("lockBtn").onclick = () => {
      lockPhoto(!photoLocked);
      mainLayer.draw();
    };

    // Align
    document.getElementById("alignBtn").onclick = () => {
      if (!bgImage.image()) return;
      setMode("aligning");
      destroyDots("alignDot");
      alignLine.visible(false);
      lockPhoto(false);
      document.getElementById("alignInputArea").style.display = "block";
    };

    document.getElementById("applyAlignBtn").onclick = () => {
      const dots = uiLayer.find(".alignDot");
      if (dots.length < 2) return;

      const dx = dots[1].x() - dots[0].x();
      const dy = dots[1].y() - dots[0].y();
      let angle = (Math.atan2(dy, dx) * 180) / Math.PI;
      if (angle > 90) angle -= 180;
      if (angle < -90) angle += 180;

      const centerStage = { x: stage.width() / 2, y: stage.height() / 2 };
      const centerLocal = getPhotoLocalPoint(centerStage);

      photoGroup.offset(centerLocal);
      photoGroup.position(centerStage);
      photoGroup.rotation(photoGroup.rotation() - angle);

      destroyDots("alignDot");
      alignLine.visible(false);
      document.getElementById("alignInputArea").style.display = "none";

      setMode("idle");
      mainLayer.draw();
      uiLayer.draw();

      if (gridGroup.visible()) updateGrid();
      updateBaseDimsToPoly();
      updateAreaAndCount();
    };

    // Scale
    document.getElementById("measureBtn").onclick = () => {
      if (!bgImage.image()) return;
      setMode("measuring");
      destroyDots("scaleDot");
      scaleLine.visible(false);
      lockPhoto(false);
      document.getElementById("measureInputArea").style.display = "block";
    };

    document.getElementById("applyScaleBtn").onclick = () => {
      const dots = uiLayer.find(".scaleDot");
      if (dots.length < 2) return;

      const realMm = parseFloat(document.getElementById("realDistInput").value);
      if (!isFinite(realMm) || realMm <= 0) return;

      const p0 = getPhotoLocalPoint({ x: dots[0].x(), y: dots[0].y() });
      const p1 = getPhotoLocalPoint({ x: dots[1].x(), y: dots[1].y() });
      const distLocalPx = Math.hypot(p1.x - p0.x, p1.y - p0.y);
      if (distLocalPx <= 0.00001) return;

      mmPerLocalPx = realMm / distLocalPx;

      document.getElementById("measureInputArea").style.display = "none";
      setMode("idle");
      setStatus(`縮尺確定：${mmPerLocalPx.toFixed(4)} mm/px(図面)`, null);

      if (gridGroup.visible()) updateGrid();
      updateBaseDimsToPoly();
      updateAreaAndCount();
    };

    // Polygon
    document.getElementById("polyBtn").onclick = () => {
      if (!bgImage.image()) return;
      setMode("drawing");
      lockPhoto(true);

      gridGroup.visible(false);
      gridGroup.draggable(false);

      setPolyDotsDraggable(true);

      document.getElementById("polyControls").style.display = "block";
      document.getElementById("polyEditDoneBtn").style.display = "none";
      document.getElementById("polyEditBtn").style.display = "block";
      mainLayer.draw();
      uiLayer.draw();
    };

    document.getElementById("undoBtn").onclick = () => {
      const ds = uiLayer.find(".polyDot");
      if (ds.length > 0) {
        ds[ds.length - 1].destroy();
        syncPoly();
      }
    };

    document.getElementById("closePolyBtn").onclick = () => {
      document.getElementById("polyControls").style.display = "none";
      setMode("idle");
      setPolyDotsDraggable(false);
      setStatus("施工範囲確定（範囲ロック）", null);
      uiLayer.draw();
      updateBaseDimsToPoly();
      updateAreaAndCount();
      if (gridGroup.visible()) updateGrid();
    };

    document.getElementById("polyEditBtn").onclick = () => {
      const poly = polyShape.points();
      if (poly.length < 6) { alert("先に施工範囲を完了してください。"); return; }

      setMode("polyAdjust");
      lockPhoto(true);
      setPolyDotsDraggable(true);

      document.getElementById("polyEditBtn").style.display = "none";
      document.getElementById("polyEditDoneBtn").style.display = "block";
      setStatus("範囲調整中：点ドラッグ → 調整完了でロック", null);
      uiLayer.draw();
    };

    document.getElementById("polyEditDoneBtn").onclick = () => {
      setMode("idle");
      setPolyDotsDraggable(false);
      document.getElementById("polyEditDoneBtn").style.display = "none";
      document.getElementById("polyEditBtn").style.display = "block";
      setStatus("範囲調整完了（範囲ロック）", null);
      uiLayer.draw();
      if (gridGroup.visible()) updateGrid();
      updateBaseDimsToPoly();
      updateAreaAndCount();
    };

    // Grid
    document.getElementById("showGridBtn").onclick = () => {
      if (!mmPerLocalPx) { alert("先に縮尺合わせを完了してください。"); return; }
      if (polyShape.points().length < 6) { alert("先に施工範囲（ポリゴン）を完了してください。"); return; }

      setMode("gridAdjust");
      lockPhoto(true);

      gridGroup.visible(true);
      gridGroup.draggable(true);

      if (gridGroup.x() === 0 && gridGroup.y() === 0) {
        gridGroup.position({ x: stage.width() / 2, y: stage.height() / 2 });
      }

      updateGrid();
      mainLayer.draw();
      updateAreaAndCount();
    };

    document.getElementById("confirmGridBtn").onclick = () => {
      if (!gridGroup.visible()) return;
      setMode("idle");
      gridGroup.draggable(false);
      lockPhoto(true);
      setPolyDotsDraggable(false);
      resnapBaseDot();
      setStatus("グリッド確定（固定）", null);
      mainLayer.draw();
      updateAreaAndCount();
    };

    // Danger + inputs
    document.getElementById("dangerToggleBtn").onclick = () => {
      dangerOn = !dangerOn;
      document.getElementById("dangerToggleBtn").textContent = "危険小片：" + (dangerOn ? "ON" : "OFF");
      if (gridGroup.visible()) updateGrid();
      updateBaseDimsToPoly();
    };
    document.getElementById("dangerMmInput").addEventListener("change", () => {
      if (gridGroup.visible()) updateGrid();
    });

    // Tile size / waste % change => recalc
    document.getElementById("tileWidthInput").addEventListener("change", () => { if (gridGroup.visible()) updateGrid(); updateAreaAndCount(); });
    document.getElementById("tileHeightInput").addEventListener("change", () => { if (gridGroup.visible()) updateGrid(); updateAreaAndCount(); });
    document.getElementById("wastePctInput").addEventListener("change", () => { updateAreaAndCount(); });

    // Base point
    document.getElementById("basePointBtn").onclick = () => {
      if (!gridGroup.visible()) { alert("先にグリッドを生成してください。"); return; }
      if (polyShape.points().length < 6) { alert("先に施工範囲（ポリゴン）を完了してください。"); return; }
      setMode("settingBase");
      lockPhoto(true);
      setStatus("基準点をタップ（交点スナップ）→下に境界までの寸法が出ます", null);
    };

    // ========= ★ズレ対策 pointerdown =========
    function getPointerPos(e){
      stage.setPointersPositions(e.evt);
      return stage.getPointerPosition();
    }

    stage.on("pointerdown", (e) => {
      if (mode === "idle") return;

      const layer = e.target && e.target.getLayer && e.target.getLayer();
      if (layer === uiLayer) return;

      if (mode === "drawing") {
        if (e.target !== bgImage && e.target !== stage) return;
      }

      const pos = getPointerPos(e);
      if (!pos) return;

      if (mode === "aligning") {
        if (uiLayer.find(".alignDot").length < 2) {
          createPoint(pos, "#6f42c1", "alignDot");
          const dots = uiLayer.find(".alignDot");
          if (dots.length === 2) {
            alignLine.points([dots[0].x(), dots[0].y(), dots[1].x(), dots[1].y()]);
            alignLine.visible(true);
          }
          uiLayer.draw();
        }
      }
      else if (mode === "measuring") {
        if (uiLayer.find(".scaleDot").length < 2) {
          createPoint(pos, "red", "scaleDot");
          const dots = uiLayer.find(".scaleDot");
          if (dots.length === 2) {
            scaleLine.points([dots[0].x(), dots[0].y(), dots[1].x(), dots[1].y()]);
            scaleLine.visible(true);
          }
          uiLayer.draw();
        }
      }
      else if (mode === "drawing") {
        createPoint(pos, "#fd7e14", "polyDot");
        syncPoly();
      }
      else if (mode === "settingBase") {
        destroyDots("baseDot");
        createPoint(pos, "#00bfff", "baseDot", { snapOnCreate: true, snapOnDragEnd: true });
        setMode("idle");
        updateBaseDimsToPoly();
        uiLayer.draw();
        setStatus("基準点 設置完了（境界までの寸法表示）", null);
      }
    });

    // Save
    document.getElementById("saveImageBtn").onclick = () => {
      const controls = document.getElementById("controls");
      controls.style.display = "none";
      setTimeout(() => {
        const link = document.createElement("a");
        link.download = "割付図.png";
        link.href = stage.toDataURL({ pixelRatio: 2 });
        link.click();
        controls.style.display = "block";
      }, 100);
    };

    // Resize
    window.addEventListener("resize", () => {
      stage.width(window.innerWidth);
      stage.height(window.innerHeight);
      mainLayer.draw();
      uiLayer.draw();
      zoomLayer.draw();
      if (gridGroup.visible()) {
        updateGrid();
        resnapBaseDot();
      }
      updateBaseDimsToPoly();
      updateAreaAndCount();
    });

    // init
    document.getElementById("alignInputArea").style.display = "none";
    document.getElementById("measureInputArea").style.display = "none";
    document.getElementById("polyControls").style.display = "none";
    document.getElementById("polyEditDoneBtn").style.display = "none";
    lockPhoto(false);
    setMode("idle");
    setStatus("図面を読み込んで開始", "X(左/右): - / -\nY(上/下): - / -");
    updateAreaAndCount();
  </script>
</body>
</html>
